<!-- index.html - Frontend مع Polling للإشعارات -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Stadium Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* نفس الأنماط السابقة */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 51, 51, 0.05) 0%, transparent 30%);
        }

        .dragon-card {
            background: linear-gradient(165deg, #121218, #08080c);
            border: 1px solid rgba(255, 51, 51, 0.2);
            border-radius: 28px;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 51, 51, 0.1) inset;
            backdrop-filter: blur(10px);
        }

        .dragon-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 51, 51, 0.4);
            box-shadow: 0 20px 40px -10px #ff333320;
        }

        .nav-btn {
            transition: all 0.2s ease;
            color: #888;
            font-weight: bold;
            font-size: 11px;
        }

        .nav-btn.active {
            color: #ff3333;
            transform: translateY(-3px);
            text-shadow: 0 0 10px #ff333380;
        }

        .nav-btn i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .loading-pulse {
            animation: pulse 1.5s infinite;
            background: linear-gradient(90deg, #1a1a1a, #2a2a2a, #1a1a1a);
            background-size: 200% 100%;
        }

        @keyframes pulse {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .tab-content {
            display: none;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dragon-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4d4d, #b30000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px #ff333380, 0 0 0 3px #ffaa00 inset;
            transition: all 0.3s ease;
            margin: 0 auto 15px;
            position: relative;
            overflow: hidden;
        }

        .dragon-avatar::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 70%);
            opacity: 0.6;
        }

        .xp-bar {
            background: #2a2a2a;
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px #00000080;
        }

        .xp-fill {
            background: linear-gradient(90deg, #ffd966, #ffaa00);
            height: 100%;
            border-radius: 30px;
            box-shadow: 0 0 10px #ffaa00;
            transition: width 0.3s ease;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 51, 51, 0.2);
            border-radius: 20px;
            padding: 10px 5px;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        .stat-box:hover {
            background: rgba(255, 51, 51, 0.1);
            border-color: #ff3333;
        }

        .btn-primary {
            background: linear-gradient(145deg, #ff3333, #cc0000);
            border: none;
            border-radius: 40px;
            padding: 14px 20px;
            font-weight: 900;
            font-size: 13px;
            color: white;
            box-shadow: 0 8px 0 #660000, 0 10px 20px #ff333380;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #660000, 0 8px 15px #ff333380;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ff3333;
            border-radius: 40px;
            padding: 14px 20px;
            font-weight: 900;
            font-size: 13px;
            color: #ff3333;
            transition: 0.2s;
        }

        .btn-secondary:active {
            background: #ff3333;
            color: white;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff3333;
            border-radius: 10px;
        }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 flex justify-between items-center bg-black/70 backdrop-blur-xl sticky top-0 z-[100] border-b border-red-900/30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-red-600 to-red-800 rounded-2xl flex items-center justify-center shadow-xl shadow-red-600/30 rotate-45">
                <i class="fas fa-dragon text-white text-xl -rotate-45"></i>
            </div>
            <div>
                <h1 id="header-title" class="text-base font-black tracking-wider uppercase" style="text-shadow: 0 0 10px red;">Dragon Stadium</h1>
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500"></span>
                    <span id="online-hub" class="text-[9px] text-zinc-400 font-bold uppercase tracking-widest">LIVE</span>
                </div>
            </div>
        </div>
        <button onclick="toggleLang()" class="bg-white/5 border border-white/10 px-4 py-2 rounded-2xl text-[11px] font-bold backdrop-blur-sm">
            <i class="fas fa-language text-red-500 ml-1"></i> <span id="btn-lang">EN</span>
        </button>
    </header>

    <main class="p-4 space-y-5">
        <!-- نفس التبويبات السابقة -->
        <section id="home" class="tab-content active space-y-4">...</section>
        <section id="dragon" class="tab-content space-y-5">...</section>
        <section id="league" class="tab-content space-y-4">...</section>
        <section id="store" class="tab-content space-y-4">...</section>
        <section id="guild" class="tab-content space-y-4">...</section>
        <section id="account" class="tab-content space-y-4">...</section>
    </main>

    <!-- نافذة تحويل الرصيد (نفس السابق) -->
    <div id="convert-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] hidden items-center justify-center p-4">...</div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-red-900/30 flex justify-around items-center py-2 px-1 z-[100]">...</nav>

    <script>
        // ================== الإعدادات العامة ==================
        const tg = window.Telegram.WebApp;
        const API = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev"; // استبدل بالرابط الصحيح
        let initDataStr = "";
        let currentLang = "ar";
        let storeItems = [];
        let energyInterval;
        let pollInterval = null; // مؤقت Polling

        // الترجمات (نفس السابق)
        const translations = { /* ... */ };

        // ================== دوال مساعدة ==================
        async function apiReq(path, method = 'GET', body = null) {
            if (!initDataStr) initDataStr = tg.initData || '';
            const options = { 
                method, 
                headers: { 
                    'Content-Type': 'application/json',
                    'x-telegram-init-data': initDataStr
                } 
            };
            if (body) options.body = JSON.stringify(body);
            const r = await fetch(API + path, options);
            return await r.json();
        }

        // ================== Polling للإشعارات ==================
        async function checkNotifications() {
            try {
                const r = await apiReq('/notifications');
                if (r.success && r.notifications && r.notifications.length > 0) {
                    r.notifications.forEach(n => {
                        // عرض الإشعار
                        tg.showAlert(n.message);
                        // تحديث البيانات إذا لزم الأمر
                        if (n.type === 'battle_result') {
                            loadDragonData(); // تحديث إحصائيات التنين
                        }
                    });
                }
            } catch (e) {
                console.error("Polling error", e);
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(checkNotifications, 5000); // كل 5 ثوانٍ
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // ================== التهيئة ==================
        let tgUser = null;
        async function init() {
            tg.ready(); 
            tg.expand();
            initDataStr = tg.initData || '';
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            const syncUrl = ref ? `/sync?ref=${ref}` : '/sync';
            const r = await apiReq(syncUrl, 'POST');
            if (r.success) {
                tgUser = r.user;
                renderUser(r.user);
                startPolling(); // بدء Polling بعد تسجيل الدخول
                // التحقق من المشرف
                if (isAdmin(r.user.userId)) {
                    document.getElementById('admin-panel-container').classList.remove('hidden');
                    const adminBtn = document.createElement('button');
                    adminBtn.id = 'admin-panel-btn';
                    adminBtn.className = 'w-full bg-purple-600 py-4 rounded-2xl text-sm font-black flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all';
                    adminBtn.innerHTML = '<i class="fas fa-crown"></i> ' + translations[currentLang].adminPanel;
                    adminBtn.onclick = showAdminPanel;
                    document.getElementById('admin-panel-container').appendChild(adminBtn);
                }
                if (r.challenge) {
                    if (confirm(currentLang === 'ar' ? `لديك تحدي من المستخدم ${r.challenge.from}. هل تريد قبول المعركة؟` : `You have a challenge from user ${r.challenge.from}. Accept battle?`)) {
                        startBattle(r.challenge.from, 0);
                    }
                }
            }
            loadMatches();
            loadLeaderboard();
            fetchPrice();
            loadReferralData();
            applyTranslations();
        }

        // إيقاف Polling عند مغادرة الصفحة
        window.addEventListener('beforeunload', () => {
            stopPolling();
        });

        // بقية الدوال (loadMatches, vote, renderUser, etc.) كما هي من الكود السابق
        // ...

        // بدء التطبيق
        init();
    </script>
</body>
</html>
