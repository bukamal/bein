<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dragon Stadium</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

body{
background:#000;
color:white;
font-family:Tajawal;
padding-bottom:80px;
}

.card{
background:#0a0a0a;
border:1px solid #1a1a1a;
border-radius:18px;
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.navbtn.active{
color:#ff3b3b;
}

</style>

</head>



<body class="p-3">

<header class="flex justify-between items-center mb-4">

<div class="flex items-center gap-2">

<i class="fa-solid fa-dragon text-red-600"></i>

<span class="font-black">Dragon Stadium</span>

</div>

</header>



<!-- TAB STADIUM -->

<div id="home" class="tab active">

<div id="matches" class="space-y-3"></div>

</div>



<!-- TAB LEADERBOARD -->

<div id="leaderboard" class="tab">

<div class="card p-4">

<h3 class="text-center text-red-500 font-black mb-4">

🏆 ترتيب اللاعبين

</h3>

<div id="leaderboardList"></div>

</div>

</div>



<!-- TAB ACCOUNT -->

<div id="account" class="tab space-y-3">

<div class="card p-4 text-center">

<div class="text-xs opacity-50">الرصيد الكلي</div>

<div id="totalBalance" class="text-3xl font-black">0</div>

<div id="rank" class="text-red-500 text-xs mt-1">BRONZE</div>

</div>



<div class="grid grid-cols-2 gap-3">

<div class="card p-3 text-center">

<div class="text-xs opacity-50">رصيد اللعبة</div>

<div id="gameBalance">0</div>

</div>

<div class="card p-3 text-center">

<div class="text-xs opacity-50">مكافآت</div>

<div id="pendingRewards">0</div>

</div>

</div>



<button onclick="claimRewards()"

class="w-full bg-red-600 py-3 rounded font-bold">

سحب المكافآت

</button>



<div class="card p-3">

<input id="wallet"

placeholder="0x BSC wallet"

class="w-full bg-white/10 p-2 rounded mb-2 text-xs">

<button onclick="updateWallet()"

class="w-full bg-white text-black py-2 rounded">

تحديث المحفظة

</button>

</div>

</div>



<!-- NAV -->

<nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/10 flex">

<button onclick="openTab('home')" class="navbtn active flex-1 py-3 text-center">

<i class="fa-solid fa-futbol"></i><br>الملعب

</button>

<button onclick="openTab('leaderboard')" class="navbtn flex-1 py-3 text-center">

<i class="fa-solid fa-trophy"></i><br>الدوري

</button>

<button onclick="openTab('account')" class="navbtn flex-1 py-3 text-center">

<i class="fa-solid fa-user"></i><br>الحساب

</button>

</nav>



<script>

const API="https://noisy-moon-4289.manhal-almasriiii199119.workers.dev"

const tg=window.Telegram.WebApp



async function api(path,method="GET",data=null){

let opt={method,headers:{"Content-Type":"application/json"}}

if(data)opt.body=JSON.stringify(data)

let r=await fetch(API+path,opt)

return await r.json()

}



function openTab(id){

document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"))

document.getElementById(id).classList.add("active")



document.querySelectorAll(".navbtn").forEach(e=>e.classList.remove("active"))

event.currentTarget.classList.add("active")

}



async function loadMatches(){

let d=await api("/get-matches")

if(!d.success)return



document.getElementById("matches").innerHTML=

d.matches.map(m=>`

<div class="card p-3">

<div class="text-xs opacity-50 mb-2">${m.league}</div>



<div class="flex justify-between items-center">

<div class="text-center w-1/3">

<img src="${m.logoA}" class="w-8 mx-auto">

<div class="text-xs">${m.teamA}</div>

</div>



<div class="text-red-500 font-black">VS</div>



<div class="text-center w-1/3">

<img src="${m.logoB}" class="w-8 mx-auto">

<div class="text-xs">${m.teamB}</div>

</div>

</div>



<div class="grid grid-cols-3 gap-2 mt-3">

<button onclick="vote('${m.id}','HOME')" class="bg-white/10 p-2 rounded">1</button>

<button onclick="vote('${m.id}','DRAW')" class="bg-white/10 p-2 rounded">X</button>

<button onclick="vote('${m.id}','AWAY')" class="bg-white/10 p-2 rounded">2</button>

</div>

</div>

`).join("")

}



async function vote(matchId,voteFor){

let r=await api("/vote","POST",{matchId,voteFor})

alert(r.message||"تم التصويت")

}



async function loadLeaderboard(){

let d=await api("/leaderboard")



document.getElementById("leaderboardList").innerHTML=

d.map((p,i)=>`

<div class="flex justify-between bg-white/5 p-2 rounded mb-2">

<div>#${i+1} ${p.username}</div>

<div class="text-red-500">${p.gameBalance+p.tokenBalance}</div>

</div>

`).join("")

}



async function sync(){

let r=await api("/sync","POST")

if(r.success){

let u=r.user

document.getElementById("gameBalance").innerText=u.gameBalance

document.getElementById("pendingRewards").innerText=u.pendingRewards

document.getElementById("totalBalance").innerText=u.gameBalance+u.tokenBalance

document.getElementById("rank").innerText=u.rank

if(u.wallet)document.getElementById("wallet").value=u.wallet

}

}



async function updateWallet(){

let wallet=document.getElementById("wallet").value

let r=await api("/check-balance","POST",{wallet})



if(r.success){

sync()

alert("تم تحديث المحفظة")

}else{

alert(r.message)

}

}



async function claimRewards(){

let r=await api("/claim-rewards","POST")



if(r.success){

sync()

alert("تم سحب المكافآت")

}else{

alert(r.message)

}

}



function init(){

tg.ready()

tg.expand()

loadMatches()

loadLeaderboard()

sync()

}



init()

</script>



</body>

</html>
