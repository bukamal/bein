<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Dashboard | لوحة تحكم التنين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050505; color: #eee; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); }
        .burn-gradient { background: linear-gradient(90deg, #ff4b2b, #ff416c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #F5C642); color: #000; font-weight: 900; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 flex justify-between items-center border-b border-yellow-900/20 sticky top-0 bg-black/50 backdrop-blur-lg z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-yellow-500 flex items-center justify-center text-black font-black">D</div>
            <h1 class="text-xl font-black text-yellow-500">DRAGON APP</h1>
        </div>
        <button onclick="connectWallet()" id="walletBtn" class="btn-gold px-4 py-2 rounded-xl text-sm transition-all active:scale-95">ربط المحفظة</button>
    </header>

    <main class="container mx-auto px-4 mt-8">
        
        <section class="glass p-8 rounded-[2.5rem] text-center mb-8 gold-glow relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-500/5 rounded-full blur-3xl"></div>
            <p class="text-gray-400 text-sm mb-2">سعر $DRGN المباشر</p>
            <h2 id="livePrice" class="text-5xl font-black text-yellow-500 mb-4 animate-pulse">$0.0000000</h2>
            <div class="flex justify-center gap-4 text-xs">
                <span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/30">شبكة BSC</span>
                <span class="bg-yellow-500/20 text-yellow-500 px-3 py-1 rounded-full border border-yellow-500/30">سيولة مقفلة</span>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-5 rounded-3xl text-center">
                <i class="fas fa-fire burn-gradient text-2xl mb-2"></i>
                <p class="text-xs text-gray-500">تم حرقه</p>
                <p class="text-lg font-bold">50,000,000</p>
            </div>
            <div class="glass p-5 rounded-3xl text-center">
                <i class="fas fa-users text-blue-400 text-2xl mb-2"></i>
                <p class="text-xs text-gray-500">حامل العملة</p>
                <p id="holdersCount" class="text-lg font-bold">جاري التحميل..</p>
            </div>
        </div>

        <section class="glass p-6 rounded-[2rem] mb-8 border-2 border-yellow-500/20">
            <h3 class="text-lg font-black mb-4 flex items-center gap-2">
                <span class="text-yellow-500">🔍</span> فحص الكنوز
            </h3>
            <div class="space-y-4">
                <input id="addrInput" type="text" placeholder="ضع عنوان محفظتك هنا" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-yellow-500 transition-all font-mono text-sm">
                <button onclick="checkUserBalance()" class="w-full py-4 bg-zinc-800 rounded-2xl font-bold hover:bg-zinc-700 transition">فحص الرصيد</button>
            </div>
            <div id="userResult" class="hidden mt-6 p-4 bg-yellow-500/5 rounded-2xl border border-yellow-500/10 text-center">
                <p class="text-gray-400 text-xs mb-1">تملك حالياً:</p>
                <p id="userBalText" class="text-2xl font-black text-yellow-500">0 DRGN</p>
                <p id="userValText" class="text-sm text-gray-500">$0.00</p>
            </div>
        </section>

        <section class="grid grid-cols-1 gap-4">
            <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" target="_blank" class="glass p-5 rounded-3xl flex justify-between items-center hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <span class="w-10 h-10 bg-green-500/20 rounded-full flex items-center justify-center text-green-500 font-bold">🛒</span>
                    <span class="font-bold">شراء من PancakeSwap</span>
                </div>
                <span class="text-gray-600">→</span>
            </a>
            <a href="https://www.pinksale.finance/pinklock/record/11?chain=BSC" target="_blank" class="glass p-5 rounded-3xl flex justify-between items-center hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <span class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-500 font-bold">🔒</span>
                    <span class="font-bold">شهادة القفل (2027)</span>
                </div>
                <span class="text-gray-600">→</span>
            </a>
        </section>

    </main>

    <script>
        const DRGN_ADDR = "0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        let dragonPrice = 0;

        async function updatePrice() {
            try {
                const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${DRGN_ADDR}`);
                const data = await res.json();
                if (data.pairs && data.pairs[0]) {
                    dragonPrice = parseFloat(data.pairs[0].priceUsd);
                    document.getElementById('livePrice').innerText = '$' + dragonPrice.toFixed(11);
                    // تحديث عدد الـ Holders بشكل تقريبي (أو جلبها من API آخر)
                    document.getElementById('holdersCount').innerText = "100+"; 
                }
            } catch (e) { console.error("Price error", e); }
        }

        async function checkUserBalance() {
            const addr = document.getElementById('addrInput').value;
            if(!ethers.utils.isAddress(addr)) return alert("العنوان غير صحيح");
            
            const provider = new ethers.providers.JsonRpcProvider("https://bsc-dataseed.binance.org/");
            const abi = ["function balanceOf(address) view returns (uint256)"];
            const contract = new ethers.Contract(DRGN_ADDR, abi, provider);
            
            const balBN = await contract.balanceOf(addr);
            const bal = ethers.utils.formatUnits(balBN, 18);
            
            document.getElementById('userResult').classList.remove('hidden');
            document.getElementById('userBalText').innerText = parseFloat(bal).toLocaleString() + " DRGN";
            document.getElementById('userValText').innerText = "$" + (parseFloat(bal) * dragonPrice).toFixed(2);
        }

        async function connectWallet() {
            if(window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = accounts[0].substring(0,6) + "...";
            }
        }

        setInterval(updatePrice, 10000);
        updatePrice();
    </script>
</body>
</html>
