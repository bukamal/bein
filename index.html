<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Dragon Stadium</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@400;900&display=swap');

body{
background:#000;
color:#fff;
font-family:'Tajawal',sans-serif;
}

.dragon-card{
background:linear-gradient(145deg,#0a0a0a,#020202);
border:1px solid #151515;
border-radius:24px;
}

.tab-content{
display:none;
padding-bottom:120px;
}

.tab-content.active{
display:block;
}

.nav-btn.active{
color:#ff3333;
border-top:2px solid #ff3333;
}

.lang-en{
font-family:'Orbitron',sans-serif;
direction:ltr;
}

</style>

</head>

<body>

<div id="loader"
class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">

<i class="fas fa-dragon text-4xl text-red-600 animate-pulse"></i>

</div>



<header
class="p-5 flex justify-between items-center sticky top-0 bg-black/80">

<div class="flex items-center gap-2">

<i class="fas fa-dragon text-red-600"></i>

<span id="txt-logo"
class="text-[10px] font-black tracking-widest uppercase">

DRAGON STADIUM

</span>

</div>

<button onclick="toggleLang()"
class="bg-white/5 p-2 rounded-lg text-[10px] font-bold">

<span id="btn-lang">EN</span>

</button>

</header>



<main class="p-4">

<div id="home"
class="tab-content active space-y-4">

<div id="match-container"></div>

</div>



<div id="leaderboard"
class="tab-content">

<div id="lb-list"></div>

</div>



<div id="wallet"
class="tab-content space-y-4">

<div class="dragon-card p-10 text-center">

<p class="text-[8px] text-zinc-500">رصيدك</p>

<h2 id="user-balance"
class="text-5xl font-black">0</h2>

<p id="rank-name"
class="text-[10px] text-red-600 font-black mt-3">

BRONZE

</p>

<input id="bsc-address"
type="text"
class="w-full bg-white/5 p-4 rounded-xl text-[10px] text-center">

<button onclick="verify()"
class="w-full py-4 bg-white text-black text-[10px] font-black rounded-xl">

تحديث

</button>

</div>

</div>

</main>



<nav
class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/5 flex justify-around p-4">

<button onclick="showTab('home')" class="nav-btn active" id="n-home">🏟</button>

<button onclick="showTab('leaderboard')" class="nav-btn" id="n-leaderboard">🏆</button>

<button onclick="showTab('wallet')" class="nav-btn" id="n-wallet">💰</button>

</nav>



<script>

const tg = window.Telegram.WebApp;

const WORKER_URL = "https://YOUR_WORKER_URL";

let uData = { balance:0,rank:"BRONZE" };



async function init(){

const user = tg.initDataUnsafe.user || { id:0, first_name:"Player" };

try{

const res = await fetch(`${WORKER_URL}/sync`,{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

userId:user.id,

username:user.username,

firstName:user.first_name

})

});

uData = await res.json();

render();

fetchMatches();

}catch(e){}

document.getElementById("loader").style.display="none";

}



async function fetchMatches(){

const res = await fetch(`${WORKER_URL}/get-matches`);

const matches = await res.json();

const container = document.getElementById("match-container");

container.innerHTML = matches.map(m=>`

<div class="dragon-card p-6">

<div class="flex justify-around">

<div class="text-center">

<img src="${m.logoA}" class="w-12 h-12">

<p>${m.teamA}</p>

</div>

<div>VS</div>

<div class="text-center">

<img src="${m.logoB}" class="w-12 h-12">

<p>${m.teamB}</p>

</div>

</div>

<div class="grid grid-cols-2 gap-2 mt-4">

<button onclick="vote('${m.id}','A')" class="bg-red-600 p-3 rounded-xl">

WIN ${m.teamA}

</button>

<button onclick="vote('${m.id}','B')" class="bg-blue-600 p-3 rounded-xl">

WIN ${m.teamB}

</button>

</div>

</div>

`).join("");

}



async function vote(matchId,team){

const user = tg.initDataUnsafe.user || { id:0 };

const res = await fetch(`${WORKER_URL}/vote`,{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

userId:user.id,

matchId:matchId,

team:team

})

});

const data = await res.json();

tg.showAlert(data.success ? "Vote Saved" : "Already Voted");

}



async function verify(){

const addr = document.getElementById("bsc-address").value;

const user = tg.initDataUnsafe.user;

const res = await fetch(`${WORKER_URL}/check-balance`,{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

walletAddress:addr,

userId:user.id,

username:user.username,

firstName:user.first_name

})

});

uData = await res.json();

render();

}



async function loadLB(){

const res = await fetch(`${WORKER_URL}/leaderboard`);

const data = await res.json();

const list = document.getElementById("lb-list");

list.innerHTML = data.map((p,i)=>`

<div class="dragon-card p-4 flex justify-between">

<span>${i+1}. ${p.username}</span>

<span>${Math.floor(p.balance)}</span>

</div>

`).join("");

}



function render(){

document.getElementById("user-balance").innerText = Math.floor(uData.balance);

document.getElementById("rank-name").innerText = uData.rank;

}



function showTab(id){

document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));

document.getElementById(id).classList.add("active");

if(id==="leaderboard") loadLB();

}



init();

tg.expand();

</script>

</body>
</html>
