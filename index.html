<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin - Pro Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 10px 20px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 1000; transition: 0.3s; pointer-events: none; white-space: nowrap; font-size: 12px; }
        #toast.show { opacity: 1; }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; border: 1px dashed #444; }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; }
        .token-data { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white"></i>
            </div>
            <div>
                <h1 class="text-[10px] font-black italic uppercase leading-none">DRAGON<span class="text-red-600">COIN</span></h1>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-tighter" id="rankLabel">RANK: EGG</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-bold bg-white/5 px-2.5 py-1.5 rounded border border-white/10" id="langBtn">EN</button>
            <div class="text-right">
                <p id="pointsHeader" class="text-sm font-black text-white leading-none">0</p>
                <p class="text-[7px] text-yellow-500 font-bold uppercase tracking-widest">DRAGON POINTS</p>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-5">
        
        <div id="home-tab" class="tab-content active space-y-5">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="dragon-card p-4 rounded-2xl relative overflow-hidden">
                    <p class="text-[9px] text-gray-500 uppercase font-bold mb-1" data-ar="السعر المباشر" data-en="Live Price">السعر المباشر</p>
                    <p class="text-sm font-black text-green-500 token-data">$0.000000412</p>
                    <div class="absolute -right-2 -bottom-2 opacity-5"><i class="fas fa-chart-line text-4xl"></i></div>
                </div>
                <div class="dragon-card p-4 rounded-2xl relative overflow-hidden">
                    <p class="text-[9px] text-gray-500 uppercase font-bold mb-1" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p class="text-sm font-black text-white token-data">$41.00</p>
                    <div class="absolute -right-2 -bottom-2 opacity-5"><i class="fas fa-tint text-4xl"></i></div>
                </div>
            </div>

            <div class="dragon-card p-3 rounded-xl flex justify-between items-center border-dashed border-red-900/30">
                <div class="truncate">
                    <p class="text-[7px] text-gray-500 uppercase font-bold" data-ar="عنوان العقد (CA)" data-en="Contract Address (CA)">عنوان العقد (CA)</p>
                    <p class="text-[9px] font-mono text-gray-300 truncate">0x1234...abcd56789effg</p>
                </div>
                <button onclick="copyCA()" class="bg-red-600/20 text-red-500 p-2 rounded-lg"><i class="fas fa-copy"></i></button>
            </div>

            <div class="flex gap-2">
                <a href="https://dexscreener.com" target="_blank" class="flex-1 bg-white text-black text-center py-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">
                    <i class="fas fa-chart-pie"></i> <span data-ar="الشارت" data-en="Chart">الشارت</span>
                </a>
                <a href="https://pancakeswap.finance" target="_blank" class="flex-1 bg-red-600 text-white text-center py-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">
                    <i class="fas fa-random"></i> <span data-ar="تداول الآن" data-en="Trade Now">تداول الآن</span>
                </a>
            </div>

            <section>
                <div class="flex justify-between items-end mb-3">
                    <h3 class="text-blue-400 text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                        <i class="fab fa-twitter"></i> X Missions
                    </h3>
                    <span class="text-[8px] text-gray-600 uppercase font-bold" data-ar="أحدث 3" data-en="Latest 3">أحدث 3</span>
                </div>
                <div id="x-tasks" class="space-y-3">
                    <div class="p-5 text-center text-[9px] text-gray-700 animate-pulse">DRAGON IS BREATHING...</div>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-3">
                    <h3 class="text-pink-500 text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                        <i class="fab fa-tiktok"></i> TikTok Missions
                    </h3>
                    <span class="text-[8px] text-gray-600 uppercase font-bold" data-ar="أحدث 3" data-en="Latest 3">أحدث 3</span>
                </div>
                <div id="tk-tasks" class="space-y-3">
                    <div class="p-5 text-center text-[9px] text-gray-700 animate-pulse">DRAGON IS BREATHING...</div>
                </div>
            </section>
        </div>

        <div id="wallet-tab" class="tab-content">
            <div class="dragon-card p-8 rounded-[2rem] text-center border-red-600/20">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/10">
                    <i class="fas fa-wallet text-2xl text-gray-400"></i>
                </div>
                <h2 class="text-lg font-black mb-1 uppercase" data-ar="محفظة التنين" data-en="Dragon Wallet">محفظة التنين</h2>
                <p id="walletAddr" class="text-[9px] text-gray-500 font-mono mb-6" data-ar="لم يتم الربط" data-en="Disconnected">لم يتم الربط</p>
                
                <button onclick="connectWallet()" class="w-full bg-red-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-red-900/20 mb-3">
                    <i class="fas fa-link mr-2"></i> Connect Wallet
                </button>
                <p class="text-[8px] text-gray-600 uppercase font-bold tracking-widest" data-ar="يدعم محفظة تليجرام و TON" data-en="Supports Telegram & TON Wallets">يدعم محفظة تليجرام و TON</p>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 active py-1 px-4" id="btn-home">
            <i class="fas fa-fire-alt text-xs"></i>
            <span class="text-[8px] font-bold uppercase">Missions</span>
        </button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-600 py-1 px-4" id="btn-wallet">
            <i class="fas fa-wallet text-xs"></i>
            <span class="text-[8px] font-bold uppercase">Wallet</span>
        </button>
    </nav>

    <div id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentLang = localStorage.getItem('dragon_lang') || 'ar';
        let points = parseInt(localStorage.getItem('dragon_pts')) || 0;
        let doneTasks = JSON.parse(localStorage.getItem('dragon_done')) || [];

        const JSON_X = "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json";
        const JSON_TK = "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json";

        function init() {
            tg.ready();
            tg.expand();
            document.getElementById('pointsHeader').innerText = points.toLocaleString();
            document.getElementById('rankLabel').innerText = points >= 10000 ? (currentLang==='ar'?"رتبة: تنين":"RANK: DRAGON") : (currentLang==='ar'?"رتبة: بيضة":"RANK: EGG");
            updateUI();
            
            // جلب المهام (أحدث 3)
            loadFeed('x', JSON_X, 'x-tasks');
            loadFeed('tk', JSON_TK, 'tk-tasks');
        }

        async function loadFeed(platform, url, containerId) {
            const container = document.getElementById(containerId);
            try {
                // استخدام AllOrigins لتخطي حجب تليجرام
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                if (data && data.items) {
                    container.innerHTML = '';
                    // عرض أحدث 3 مهام فقط
                    data.items.slice(0, 3).forEach((item, index) => {
                        const taskId = `${platform}_${item.id || index}`;
                        const isDone = doneTasks.includes(taskId);
                        const icon = platform === 'x' ? 'fab fa-twitter text-blue-400' : 'fab fa-tiktok text-pink-500';
                        const reward = 1000;

                        container.innerHTML += `
                            <div class="dragon-card p-4 rounded-2xl flex justify-between items-center ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                                        <i class="${icon} text-lg"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-black uppercase">${platform} New Task</p>
                                        <p class="text-[9px] text-yellow-500 font-bold">+${reward} PTS</p>
                                    </div>
                                </div>
                                <button onclick="doTask('${taskId}', ${reward}, '${item.url}')" class="bg-white text-black text-[9px] font-black px-5 py-2 rounded-lg uppercase shadow-lg shadow-white/5">GO</button>
                            </div>`;
                    });
                }
            } catch (e) {
                container.innerHTML = '<p class="text-center py-4 text-[9px] text-red-900 uppercase italic">Dragon Fire Syncing...</p>';
                if(platform === 'x') setTimeout(() => loadFeed(platform, url, containerId), 3000);
            }
        }

        function doTask(id, reward, url) {
            tg.openLink(url); // فتح الرابط داخل تليجرام باحترافية
            showToast(currentLang === 'ar' ? "تحقق من المهمة..." : "Verifying Task...");
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('dragon_pts', points);
                    localStorage.setItem('dragon_done', JSON.stringify(doneTasks));
                    init();
                    showToast("+1,000 PTS! 🔥");
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 5000);
        }

        function connectWallet() {
            // محاولة فتح محفظة تليجرام (TON Connect)
            showToast(currentLang === 'ar' ? "جاري الاتصال بمحفظة TON..." : "Connecting to TON Wallet...");
            tg.HapticFeedback.impactOccurred('medium');
            setTimeout(() => {
                document.getElementById('walletAddr').innerText = "UQAz...90fX";
                showToast("Wallet Linked! ✅");
            }, 1500);
        }

        function copyCA() {
            const ca = "0x1234...abcd56789effg";
            navigator.clipboard.writeText(ca);
            showToast(currentLang === 'ar' ? "تم نسخ العنوان!" : "Address Copied!");
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('dragon_lang', currentLang);
            init();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-white'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-600'));
            
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('btn-' + t).classList.add('active', 'text-white');
            tg.HapticFeedback.impactOccurred('light');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
