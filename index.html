<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin - Auto Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .nav-item.active { color: #ff4d4d; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 1000; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }
        .done-task { opacity: 0.4; filter: grayscale(1); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center">
        <div class="dragon-card p-8 rounded-[2.5rem] border-b-4 border-red-600 shadow-2xl shadow-red-900/20">
            <p class="text-[10px] font-black text-gray-500 tracking-[0.2em] mb-2 uppercase">حساب التنين</p>
            <h1 id="userPoints" class="text-5xl font-black italic">0</h1>
            <div class="mt-4 inline-block bg-white/5 px-4 py-1 rounded-full text-[10px] font-bold text-yellow-500 uppercase tracking-tighter">
                Rank: <span id="rankTitle">Egg</span>
            </div>
        </div>
    </header>

    <main class="px-4">
        
        <div id="home-tab" class="tab-content active space-y-8">
            <section>
                <h3 class="text-blue-400 text-[11px] font-black mb-4 flex items-center gap-2 uppercase tracking-widest">
                    <i class="fab fa-twitter"></i> مهام منصة X
                </h3>
                <div id="x-tasks" class="space-y-3"></div>
            </section>

            <section>
                <h3 class="text-pink-500 text-[11px] font-black mb-4 flex items-center gap-2 uppercase tracking-widest">
                    <i class="fab fa-tiktok"></i> مهام تيك توك
                </h3>
                <div id="tk-tasks" class="space-y-3"></div>
            </section>
        </div>

        <div id="stats-tab" class="tab-content">
            <div class="dragon-card p-6 rounded-3xl text-center space-y-4">
                <p class="text-xs text-gray-500">إجمالي الأصدقاء الذين انضموا عبر رابطك</p>
                <h2 id="friendsCount" class="text-4xl font-black">0</h2>
                <div class="bg-black/50 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] text-gray-400 mb-2">رابط الإحالة (+2000 نقطة)</p>
                    <input id="refUrl" readonly class="w-full bg-transparent text-center text-[10px] text-red-500 font-mono mb-3">
                    <button onclick="copyLink()" class="w-full bg-white text-black py-2 rounded-lg text-xs font-bold uppercase">نسخ الرابط</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-item active flex flex-col items-center" id="nav-home">
            <i class="fas fa-tasks"></i><span class="text-[8px] mt-1 font-bold tracking-tighter">TASKS</span>
        </button>
        <button onclick="switchTab('stats')" class="nav-item flex flex-col items-center text-gray-600" id="nav-stats">
            <i class="fas fa-users"></i><span class="text-[8px] mt-1 font-bold tracking-tighter">FRIENDS</span>
        </button>
    </nav>

    <div id="toast"></div>

    <script>
        const API_URL = "https://noisy-moon-4289.manhal-almasrillll199119.workers.dev";
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "788903767";
        const startParam = tg.initDataUnsafe.start_param || "";

        async function initApp() {
            try {
                const response = await fetch(`${API_URL}?userId=${userId}&referrer=${startParam}`);
                const data = await response.json();
                
                // 1. تحديث الواجهة الأساسية
                document.getElementById('userPoints').innerText = (data.points || 0).toLocaleString();
                document.getElementById('friendsCount').innerText = data.friends || 0;
                document.getElementById('rankTitle').innerText = data.points >= 10000 ? "Young Dragon" : "Egg";
                document.getElementById('refUrl').value = `https://t.me/Drgncoin_bot?start=${userId}`;

                // 2. بناء المهام تلقائياً
                renderTasks(data.tasks, data.done || []);
            } catch (e) { console.error("Load Error:", e); }
        }

        function renderTasks(tasks, doneList) {
            const xBox = document.getElementById('x-tasks');
            const tkBox = document.getElementById('tk-tasks');
            xBox.innerHTML = ''; tkBox.innerHTML = '';

            tasks.forEach(task => {
                const isDone = doneList.includes(task.id);
                const taskHtml = `
                    <div class="dragon-card p-4 rounded-2xl flex justify-between items-center ${isDone ? 'done-task' : ''}">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-lg">
                                <i class="${task.platform === 'x' ? 'fab fa-twitter text-blue-400' : 'fab fa-tiktok text-pink-500'}"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold">${task.title}</p>
                                <p class="text-[9px] text-yellow-500 font-black">+${task.reward.toLocaleString()} PTS</p>
                            </div>
                        </div>
                        ${isDone ? '<i class="fas fa-check-circle text-green-500"></i>' : 
                        `<button onclick="runTask('${task.id}', '${task.url}')" class="bg-white text-black text-[10px] font-black px-4 py-2 rounded-lg uppercase">GO</button>`}
                    </div>
                `;
                if (task.platform === 'x') xBox.innerHTML += taskHtml;
                else tkBox.innerHTML += taskHtml;
            });
        }

        async function runTask(taskId, url) {
            window.open(url, '_blank');
            showToast("جاري التحقق من التنفيذ...");
            setTimeout(async () => {
                await fetch(`${API_URL}?userId=${userId}&action=complete&taskId=${taskId}`);
                initApp(); // إعادة التحديث تلقائياً
                showToast("تمت إضافة النقاط بنجاح! 🔥");
            }, 5000);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.add('text-gray-600'));
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('nav-' + t).classList.remove('text-gray-600');
            document.getElementById('nav-' + t).classList.add('active');
        }

        function copyLink() {
            const copyText = document.getElementById("refUrl");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            showToast("تم نسخ رابط الدعوة!");
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // إطلاق التطبيق
        initApp();
        tg.expand();
    </script>
</body>
</html>
