<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin Hub Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; transition: all 0.3s ease; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #ff4d4d; }
        .task-done { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 9999; pointer-events: none; transition: 0.3s; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="pb-32">

    <header class="p-4 flex justify-between items-center sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-lg uppercase tracking-tighter">DRAGON<span class="text-red-600">COIN</span></h1>
                <p id="totalPoints" class="text-[10px] font-bold text-yellow-500 uppercase">POINTS: 0</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLang()" class="bg-white/5 text-[10px] px-3 py-2 rounded-lg font-bold border border-white/10" id="langSwitch">EN</button>
            <button id="walletBtn" onclick="smartConnect()" class="bg-white text-black text-[10px] font-black px-4 py-2 rounded-full uppercase" data-en="Connect" data-ar="ربط">ربط</button>
        </div>
    </header>

    <div id="home-tab" class="tab-content active p-4 space-y-5">
        
        <div class="bg-yellow-600/10 border border-yellow-600/30 p-4 rounded-2xl flex gap-3 items-start">
            <i class="fas fa-exclamation-triangle text-yellow-500 mt-1"></i>
            <div>
                <p class="text-[11px] font-black text-yellow-500 uppercase mb-1" data-en="Trading Notice" data-ar="تنبيه التداول">تنبيه التداول</p>
                <p class="text-[10px] text-gray-300 leading-relaxed" data-en="Due to early liquidity, please buy in small amounts (max $2) with 15%+ slippage." data-ar="بسبب السيولة المبكرة، يرجى الشراء بمبالغ صغيرة (بحد أقصى 2$) مع ضبط السلابيج على 15% أو أكثر.">بسبب السيولة المبكرة، يرجى الشراء بمبالغ صغيرة (بحد أقصى 2$) مع ضبط السلابيج على 15% أو أكثر.</p>
            </div>
        </div>

        <div class="dragon-card p-6 rounded-[2rem]">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest" data-en="Live Burn 🔥" data-ar="الحرق المباشر 🔥">الحرق المباشر 🔥</h3>
                <span id="burnPercent" class="text-red-500 font-black text-xs font-mono">0.1000%</span>
            </div>
            <div class="w-full bg-[#111] h-2.5 rounded-full overflow-hidden">
                <div id="burnFill" class="bg-red-600 h-full w-[10%] transition-all duration-[2s]"></div>
            </div>
            <p class="text-[9px] text-gray-500 mt-2 font-mono">DRGN Burned: 1,000,000</p>
        </div>

        <div class="space-y-3">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest px-1" data-en="Tasks ⚔️" data-ar="المهام ⚔️">المهام ⚔️</h3>
            
            <div id="task-tiktok" class="dragon-card p-4 rounded-2xl flex items-center justify-between border-r-4 border-red-600">
                <div class="flex items-center gap-3">
                    <i class="fab fa-tiktok text-lg"></i>
                    <div>
                        <p class="text-[11px] font-black" data-en="Support TikTok" data-ar="دعم تيك توك">دعم تيك توك</p>
                        <p class="text-[9px] text-gray-500">Pts 1000+</p>
                    </div>
                </div>
                <button onclick="executeTask('tiktok', 1000, 'https://www.tiktok.com/@thedragonsport')" class="bg-red-600 text-[10px] font-bold px-4 py-2 rounded-lg" data-en="GO" data-ar="نفذ">نفذ</button>
            </div>

            <div id="task-x" class="dragon-card p-4 rounded-2xl flex items-center justify-between border-r-4 border-blue-400">
                <div class="flex items-center gap-3">
                    <i class="fab fa-twitter text-lg text-blue-400"></i>
                    <div>
                        <p class="text-[11px] font-black" data-en="Follow on X" data-ar="دعم تغريدة XY">دعم تغريدة XY</p>
                        <p class="text-[9px] text-gray-500">Pts 500+</p>
                    </div>
                </div>
                <button onclick="executeTask('x', 500, 'https://x.com/XY_signals')" class="bg-blue-500 text-[10px] font-bold px-4 py-2 rounded-lg" data-en="SUPPORT" data-ar="دعم">دعم</button>
            </div>
        </div>
    </div>

    <script>
        // الكود البرمجي المحدث لضمان ظهور النقاط وحفظ المهام
        let currentLang = localStorage.getItem('lang') || 'ar';
        const PAIR_ADDRESS = "0x787a2d398f58b091f046461c35e9556501068037"; 

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            applyLang();
        }

        function applyLang() {
            const isEn = currentLang === 'en';
            document.getElementById('mainHtml').dir = isEn ? 'ltr' : 'rtl';
            document.getElementById('langSwitch').innerText = isEn ? 'AR' : 'EN';
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = isEn ? el.getAttribute('data-en') : el.getAttribute('data-ar');
            });
        }

        let points = parseInt(localStorage.getItem('dragonPoints')) || 0;
        function updatePointsDisplay() { 
            document.getElementById('totalPoints').innerText = `POINTS: ${points.toLocaleString()}`; 
        }

        function executeTask(id, reward, url) {
            if(localStorage.getItem('done_'+id)) return showToast(currentLang === 'ar' ? "تم التنفيذ مسبقاً" : "Already done!");
            window.open(url, '_blank');
            setTimeout(() => {
                points += reward;
                localStorage.setItem('dragonPoints', points);
                localStorage.setItem('done_'+id, 'true');
                updatePointsDisplay();
                checkTasks();
                showToast(`+${reward} Points!`);
            }, 3000);
        }

        function checkTasks() {
            if(localStorage.getItem('done_tiktok')) document.getElementById('task-tiktok').classList.add('task-done');
            if(localStorage.getItem('done_x')) document.getElementById('task-x').classList.add('task-done');
        }

        // تشغيل الوظائف عند التحميل
        applyLang();
        updatePointsDisplay();
        checkTasks();
    </script>
</body>
</html>
