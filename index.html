<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Stadium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; }
        .dragon-card { background: linear-gradient(145deg, #0a0a0a, #020202); border: 1px solid #151515; border-radius: 24px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; padding-bottom: 110px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { color: #ff3333; border-top: 2px solid #ff3333; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600 text-xl"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">ملعب التنين</span>
        </div>
        <div class="text-[9px] font-bold text-zinc-500 uppercase">Ver 2.0 Security</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div id="match-container" class="space-y-4"></div>
        </div>

        <div id="wallet" class="tab-content space-y-4 text-center">
            <div class="dragon-card p-8">
                <p class="text-[8px] text-zinc-500 font-black uppercase mb-1">إجمالي الأصول</p>
                <h2 id="total-balance" class="text-4xl font-black italic">0</h2>
                <p id="rank-name" class="text-[9px] text-red-600 font-black mt-2 tracking-widest uppercase">BRONZE MEMBER</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="dragon-card p-5">
                    <p class="text-[7px] text-zinc-500 font-black uppercase">رصيد اللعبة</p>
                    <h3 id="game-balance" class="text-xl font-black text-white">0</h3>
                </div>
                <div class="dragon-card p-5">
                    <p class="text-[7px] text-zinc-500 font-black uppercase">مكافآت معلقة</p>
                    <h3 id="pending-rewards" class="text-xl font-black text-yellow-500">0</h3>
                </div>
            </div>

            <button onclick="claimRewards()" class="w-full py-4 bg-red-600 text-white text-[10px] font-black rounded-2xl uppercase shadow-lg shadow-red-900/20 active:scale-95 transition-all">سحب المكافآت</button>

            <div class="dragon-card p-5">
                <input id="bsc-address" type="text" placeholder="BSC Wallet (0x...)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[9px] text-center mb-3 outline-none focus:border-red-600">
                <button onclick="updateWallet()" class="w-full py-4 bg-white text-black text-[10px] font-black rounded-xl uppercase">تحديث المحفظة</button>
            </div>

            <div id="admin-section" style="display:none;" class="pt-6 border-t border-white/5">
                <button onclick="adminPanel()" class="w-full py-3 border border-red-600 text-red-600 text-[9px] font-black rounded-xl">لوحة الإدارة 🐉</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home">
            <i class="fas fa-th-large mb-1 text-lg"></i><span class="text-[8px] font-black">الملعب</span>
        </button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet">
            <i class="fas fa-user mb-1 text-lg"></i><span class="text-[8px] font-black">الحساب</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        const ADMIN_ID = 788903767;

        async function request(path, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json', 'x-telegram-init-data': tg.initData }
            };
            if (body) options.body = JSON.stringify(body);
            return await (await fetch(`${API}${path}`, options)).json();
        }

        async function init() {
            tg.ready(); tg.expand();
            const data = await request('/sync', 'POST');
            if (data.success) {
                render(data.user);
                if (data.user.userId == ADMIN_ID) document.getElementById('admin-section').style.display = 'block';
            }
            fetchMatches();
        }

        async function fetchMatches() {
            const data = await request('/get-matches');
            if (data.success) {
                document.getElementById('match-container').innerHTML = data.matches.map(m => `
                    <div class="dragon-card p-4">
                        <div class="flex justify-between text-[7px] font-black opacity-30 uppercase mb-3"><span>${m.league}</span><span>ID: ${m.id}</span></div>
                        <div class="flex items-center justify-around mb-4">
                            <div class="text-center w-1/3"><img src="${m.logoA}" class="w-10 h-10 mx-auto mb-1"><p class="text-[8px] font-bold">${m.teamA}</p></div>
                            <div class="text-red-600 font-black italic text-[10px]">VS</div>
                            <div class="text-center w-1/3"><img src="${m.logoB}" class="w-10 h-10 mx-auto mb-1"><p class="text-[8px] font-bold">${m.teamB}</p></div>
                        </div>
                        ${m.canVote ? `<div class="grid grid-cols-3 gap-2">
                            <button onclick="vote('${m.id}', 'HOME')" class="bg-white/5 py-2 rounded-lg text-[9px] font-black hover:bg-red-600 transition-colors">1</button>
                            <button onclick="vote('${m.id}', 'DRAW')" class="bg-white/5 py-2 rounded-lg text-[9px] font-black hover:bg-red-600 transition-colors">X</button>
                            <button onclick="vote('${m.id}', 'AWAY')" class="bg-white/5 py-2 rounded-lg text-[9px] font-black hover:bg-red-600 transition-colors">2</button>
                        </div>` : `<div class="text-center text-[8px] opacity-20 py-2 border border-white/5 rounded-lg">مغلق</div>`}
                    </div>
                `).join('');
            }
        }

        async function vote(matchId, choice) {
            const res = await request('/vote', 'POST', { matchId, voteFor: choice });
            tg.showAlert(res.success ? "تم التسجيل! 🐉" : res.message);
        }

        async function updateWallet() {
            const wallet = document.getElementById('bsc-address').value;
            const res = await request('/check-balance', 'POST', { wallet });
            if (res.success) { render(res.user); tg.showAlert("تم التحديث!"); }
            else tg.showAlert(res.message);
        }

        async function claimRewards() {
            const res = await request('/claim-rewards', 'POST');
            if (res.success) { tg.showAlert("تم السحب بنجاح!"); init(); }
            else tg.showAlert(res.message);
        }

        function render(u) {
            document.getElementById('total-balance').innerText = Math.floor((u.gameBalance || 0) + (u.tokenBalance || 0)).toLocaleString();
            document.getElementById('game-balance').innerText = Math.floor(u.gameBalance || 0).toLocaleString();
            document.getElementById('pending-rewards').innerText = Math.floor(u.pendingRewards || 0).toLocaleString();
            document.getElementById('rank-name').innerText = `${u.rank} MEMBER`;
            if (u.wallet) document.getElementById('bsc-address').value = u.wallet;
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        async function adminPanel() {
            const mId = prompt("Match ID:");
            const win = prompt("Winner (HOME/DRAW/AWAY):");
            if(mId && win) {
                const res = await request('/admin-distribute', 'POST', { matchId: mId, winner: win.toUpperCase() });
                alert(res.success ? `تم! الرابحون: ${res.winnersCount}` : res.message);
            }
        }

        init();
    </script>
</body>
</html>
