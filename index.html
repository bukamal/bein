<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dragon Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', system-ui; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #ff4d4d; }
        .burn-fill { background: linear-gradient(90deg, #ff1a1a, #800000); transition: width 1.5s ease-in-out; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 1000; font-size: 12px; font-weight: bold; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="pb-32">

    <header class="p-4 flex justify-between items-center sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white"></i>
            </div>
            <div>
                <span class="font-black text-lg uppercase">DRAGON<span class="text-red-600 font-italic italic">COIN</span></span>
            </div>
        </div>
        <button id="walletBtn" onclick="smartConnect()" class="bg-white text-black text-[10px] font-black px-5 py-2 rounded-full uppercase shadow-md active:scale-95 transition-transform">
            Connect Wallet
        </button>
    </header>

    <div id="home-tab" class="tab-content active p-4 space-y-5">
        <div class="dragon-card p-6 rounded-[2rem]">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">معدل الحرق المباشر 🔥</h3>
                <span id="burnPercent" class="text-red-500 font-black text-xs font-mono">0.00%</span>
            </div>
            <div class="w-full bg-[#111] h-3 rounded-full overflow-hidden border border-white/5 shadow-inner">
                <div id="burnFill" class="burn-fill h-full w-0 shadow-[0_0_15px_rgba(255,0,0,0.4)]"></div>
            </div>
            <p id="burnValue" class="text-[9px] text-gray-500 mt-3 font-mono">0 $DRGN Burned</p>
        </div>

        <div class="space-y-3">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-1">مهام تعزيز العرين ⚔️</h3>
            <div class="dragon-card p-4 rounded-2xl flex items-center justify-between border-r-4 border-red-600">
                <div class="flex items-center gap-3">
                    <i class="fab fa-tiktok text-lg"></i>
                    <div>
                        <p class="text-xs font-bold">دعم @thedragonsport</p>
                        <p class="text-[9px] text-gray-500">+1000 Point</p>
                    </div>
                </div>
                <button onclick="window.open('https://www.tiktok.com/@thedragonsport', '_blank')" class="bg-red-600 text-[9px] font-bold px-4 py-2 rounded-lg">تنفيذ</button>
            </div>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-4 space-y-4">
        <div class="dragon-card p-6 rounded-[2rem] text-center border-b-4 border-red-600">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">Contract Address</p>
            <p id="contractShort" class="text-[10px] font-mono text-white bg-black/50 p-2 rounded-lg break-all">0x583787E29Bb2D92FcBc713389FD66807602c72F3</p>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div class="dragon-card p-4 rounded-2xl">
                <p class="text-[9px] text-gray-500 uppercase">الشبكة</p>
                <p class="text-xs font-bold text-yellow-500">BSC (BEP20)</p>
            </div>
            <div class="dragon-card p-4 rounded-2xl">
                <p class="text-[9px] text-gray-500 uppercase">العملة</p>
                <p class="text-xs font-bold text-white">$DRGN</p>
            </div>
        </div>
    </div>

    <div id="ranks-tab" class="tab-content p-4">
        <div class="dragon-card p-10 rounded-[3rem] text-center bg-gradient-to-b from-[#1a1a1a] to-black">
            <div id="rankIcon" class="text-8xl mb-4 drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]">🥚</div>
            <h2 id="rankTitle" class="text-2xl font-black italic uppercase tracking-tighter">Dragon Egg</h2>
            <p id="rankBadge" class="text-gray-500 text-[10px] font-black uppercase mt-2 tracking-widest">Connect to Reveal Rank</p>
        </div>
    </div>

    <div id="assets-tab" class="tab-content p-4">
        <div class="dragon-card p-8 rounded-[2.5rem] text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">رصيدك الحالي</p>
            <div id="userBalance" class="text-4xl font-black font-mono tracking-tighter">0.00</div>
            <p class="text-[10px] text-red-600 font-bold mt-1">$DRGN Coins</p>
            
            <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" target="_blank" class="block mt-8 w-full bg-red-600 py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-red-900/40 active:scale-95 transition-transform">
                شراء $DRGN الآن
            </a>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#050505]/95 backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-item flex flex-col items-center active" id="nav-home">
            <i class="fas fa-home text-lg"></i><span class="text-[8px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="switchTab('data')" class="nav-item flex flex-col items-center text-gray-500" id="nav-data">
            <i class="fas fa-chart-bar text-lg"></i><span class="text-[8px] mt-1 font-bold">DATA</span>
        </button>
        <button onclick="switchTab('ranks')" class="nav-item flex flex-col items-center text-gray-500" id="nav-ranks">
            <i class="fas fa-shield-alt text-lg"></i><span class="text-[8px] mt-1 font-bold">RANKS</span>
        </button>
        <button onclick="switchTab('assets')" class="nav-item flex flex-col items-center text-gray-500" id="nav-assets">
            <i class="fas fa-wallet text-lg"></i><span class="text-[8px] mt-1 font-bold">WALLET</span>
        </button>
    </nav>

    <div id="toast"></div>

    <script>
        // تهيئة Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // توسيع التطبيق لملء الشاشة
        tg.ready();

        const RPC = "https://bsc-dataseed1.binance.org/";
        const CONTRACT = "0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        const DEAD = "0x000000000000000000000000000000000000dEaD";
        const TOTAL_SUPPLY = 1000000000;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active', 'text-red-500'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.add('text-gray-500'));
            
            document.getElementById(tabName + '-tab').classList.add('active');
            const currentNav = document.getElementById('nav-' + tabName);
            currentNav.classList.add('active', 'text-red-500');
            currentNav.classList.remove('text-gray-500');
            
            // اهتزاز خفيف عند التنقل (Telegram Haptic Feedback)
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        async function fetchRealStats() {
            try {
                const provider = new ethers.providers.JsonRpcProvider(RPC);
                const abi = ["function balanceOf(address) view returns (uint256)"];
                const contract = new ethers.Contract(CONTRACT, abi, provider);
                
                const deadBal = await contract.balanceOf(DEAD);
                const burned = parseFloat(ethers.utils.formatUnits(deadBal, 18));
                const burnP = ((burned / TOTAL_SUPPLY) * 100).toFixed(4);

                document.getElementById('burnFill').style.width = burnP + "%";
                document.getElementById('burnPercent').innerText = burnP + "%";
                document.getElementById('burnValue').innerText = burned.toLocaleString() + " $DRGN Burned";
            } catch(e) { console.error("Data Fetch Error"); }
        }

        async function updateUserData(address) {
            try {
                const provider = new ethers.providers.JsonRpcProvider(RPC);
                const abi = ["function balanceOf(address) view returns (uint256)"];
                const contract = new ethers.Contract(CONTRACT, abi, provider);
                
                const balance = await contract.balanceOf(address);
                const fmt = parseFloat(ethers.utils.formatUnits(balance, 18));
                
                document.getElementById('userBalance').innerText = fmt.toLocaleString(undefined, {minimumFractionDigits: 2});
                
                // تحديث الرتبة
                const rIcon = document.getElementById('rankIcon');
                const rTitle = document.getElementById('rankTitle');
                const rBadge = document.getElementById('rankBadge');
                
                if (fmt >= 1000000) { rIcon.innerText = "👑"; rTitle.innerText = "Dragon King"; rBadge.innerText = "Top Tier Holder"; }
                else if (fmt >= 100000) { rIcon.innerText = "⚔️"; rTitle.innerText = "Warrior Dragon"; rBadge.innerText = "Verified Warrior"; }
                else { rIcon.innerText = "🥚"; rTitle.innerText = "Dragon Egg"; rBadge.innerText = "Young Dragon"; }
                
            } catch(e) { console.error(e); }
        }

        function smartConnect() {
            // محاولة الربط عبر Provider (مثل MetaMask أو Telegram Wallet)
            if (window.ethereum) {
                window.ethereum.request({ method: 'eth_requestAccounts' }).then(acc => {
                    const addr = acc[0];
                    document.getElementById('walletBtn').innerText = addr.substring(0,6) + "...";
                    showToast("تم ربط العرين بنجاح 🐉");
                    updateUserData(addr);
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }).catch(() => showToast("فشل الربط"));
            } else {
                showToast("افتح التطبيق من داخل محفظة Web3");
                // رابط لفتح المحفظة في حال عدم وجودها
                window.open("https://metamask.app.link/dapp/" + window.location.href.replace("https://", ""), "_blank");
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        fetchRealStats();
        setInterval(fetchRealStats, 20000);
    </script>
</body>
</html>
