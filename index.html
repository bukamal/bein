<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dragon Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .dragon-card { background: #111; border: 1px solid #d4af3733; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-yellow-500 font-bold">DRAGON 🐉</h1>
        <button onclick="connect()" id="btn" class="bg-yellow-500 text-black px-4 py-2 rounded-lg text-xs font-bold">ربط المحفظة</button>
    </div>

    <div class="dragon-card p-6 mb-4 text-center">
        <p class="text-gray-400 text-xs">سعر التنين</p>
        <h2 id="price" class="text-2xl font-bold text-yellow-500">$0.0000000000</h2>
    </div>

    <div class="dragon-card p-6">
        <input id="addr" type="text" placeholder="العنوان" class="w-full bg-black border border-gray-800 p-3 rounded-lg mb-4 text-sm">
        <button onclick="check()" class="w-full bg-zinc-800 py-3 rounded-lg font-bold">فحص الرصيد</button>
        
        <div id="res" class="hidden mt-4 text-center border-t border-gray-800 pt-4">
            <p id="bal" class="text-xl font-bold text-yellow-500"></p>
            <p id="val" class="text-xs text-gray-400"></p>
        </div>
    </div>

    <script>
        const DRGN = "0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        let pUSD = 0;

        async function getP() {
            const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${DRGN}`);
            const d = await r.json();
            if(d.pairs) {
                pUSD = d.pairs[0].priceUsd;
                document.getElementById('price').innerText = '$' + parseFloat(pUSD).toFixed(11);
            }
        }

        async function connect() {
            if(window.ethereum) {
                const acc = await window.ethereum.request({method:'eth_requestAccounts'});
                document.getElementById('btn').innerText = acc[0].substring(0,6)+'...';
                document.getElementById('addr').value = acc[0];
                check();
            }
        }

        async function check() {
            const a = document.getElementById('addr').value;
            if(!ethers.utils.isAddress(a)) return;
            
            // استخدام Web3 من الميتاماسك مباشرة
            const provider = window.ethereum ? new ethers.providers.Web3Provider(window.ethereum) : new ethers.providers.JsonRpcProvider("https://bsc-dataseed.binance.org/");
            const abi = ["function balanceOf(address) view returns (uint256)"];
            const contract = new ethers.Contract(DRGN, abi, provider);
            
            const b = await contract.balanceOf(a);
            const formatted = ethers.utils.formatUnits(b, 18);
            
            document.getElementById('res').classList.remove('hidden');
            document.getElementById('bal').innerText = parseFloat(formatted).toLocaleString() + " DRGN";
            document.getElementById('val').innerText = "$" + (parseFloat(formatted) * pUSD).toFixed(2);
        }

        getP();
        setInterval(getP, 20000);
    </script>
</body>
</html>
