<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: linear-gradient(145deg, #111, #080808); border: 1px solid #1a1a1a; border-radius: 18px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; }
        .loading-shimmer { background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 sticky top-0 bg-black/95 backdrop-blur-md z-50 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-dragon text-white"></i></div>
            <h1 class="text-[10px] font-black italic uppercase">DRAGON<span class="text-red-600">PRO</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-bold bg-white/5 px-3 py-1.5 rounded border border-white/10 uppercase" id="langBtn">EN</button>
            <div class="text-right">
                <p id="pointsHeader" class="text-sm font-black text-white">0</p>
                <p class="text-[7px] text-yellow-500 font-bold uppercase" id="pointsLabel">D-POINTS</p>
            </div>
        </div>
    </header>

    <main class="p-4">
        <div id="home-tab" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p id="live-liq" class="text-xs font-black text-green-500 animate-pulse">---</p>
                </div>
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="القيمة السوقية" data-en="Market Cap">القيمة السوقية</p>
                    <p id="live-mcap" class="text-xs font-black text-white animate-pulse">---</p>
                </div>
            </div>
            <div class="dragon-card p-5 space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-gray-400 font-bold uppercase" data-ar="سعر العملة" data-en="Token Price">سعر العملة</span>
                    <span id="live-price" class="text-xs font-mono font-bold text-red-500 animate-pulse">---</span>
                </div>
                <div class="flex justify-between items-center border-t border-white/5 pt-3">
                    <span class="text-[10px] text-gray-400 font-bold uppercase" data-ar="الحجم (24س)" data-en="Volume (24h)">الحجم (24س)</span>
                    <span id="live-vol" class="text-xs font-mono font-bold text-white animate-pulse">---</span>
                </div>
            </div>
        </div>

        <div id="missions-tab" class="tab-content space-y-6">
            <section id="x-tasks-container">
                <h3 class="text-blue-400 text-[10px] font-black mb-3 tracking-widest uppercase flex items-center gap-2"><i class="fab fa-twitter"></i> X Missions</h3>
                <div id="x-tasks" class="space-y-3"></div>
            </section>
            <section id="tk-tasks-container">
                <h3 class="text-pink-500 text-[10px] font-black mb-3 tracking-widest uppercase flex items-center gap-2"><i class="fab fa-tiktok"></i> TikTok Missions</h3>
                <div id="tk-tasks" class="space-y-3"></div>
            </section>
        </div>

        <div id="trade-tab" class="tab-content space-y-4 text-center">
            <iframe width="100%" height="380" src="https://dexscreener.com/bsc/0x583787E29Bb2D92FcBc713389FD66807602c72F3?embed=1&theme=dark" style="border-radius:18px;"></iframe>
            <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" target="_blank" class="block bg-white text-black py-4 rounded-2xl font-black uppercase text-xs">Trade on PancakeSwap</a>
        </div>

        <div id="wallet-tab" class="tab-content text-center space-y-6 p-8">
            <i class="fas fa-wallet text-5xl text-red-600"></i>
            <h2 class="text-lg font-black uppercase" data-ar="اربط المحفظة" data-en="Connect Wallet">اربط المحفظة</h2>
            <div id="ton-connect-button" class="flex justify-center"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 active"><i class="fas fa-chart-pie text-xs"></i><span class="text-[8px] font-bold">HOME</span></button>
        <button onclick="switchTab('missions')" class="nav-btn flex flex-col items-center gap-1 text-gray-600"><i class="fas fa-tasks text-xs"></i><span class="text-[8px] font-bold">TASKS</span></button>
        <button onclick="switchTab('trade')" class="nav-btn flex flex-col items-center gap-1 text-gray-600"><i class="fas fa-random text-xs"></i><span class="text-[8px] font-bold">TRADE</span></button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-600"><i class="fas fa-wallet text-xs"></i><span class="text-[8px] font-bold">WALLET</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const CA = "0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        let points = parseInt(localStorage.getItem('d_pts')) || 0;
        let doneTasks = JSON.parse(localStorage.getItem('d_done')) || [];
        let currentLang = localStorage.getItem('d_lang') || 'ar';

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/test/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function fetchTokenData() {
            try {
                // جلب مباشر من DexScreener API
                const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CA}`);
                const data = await res.json();
                if (data.pairs && data.pairs.length > 0) {
                    const pair = data.pairs[0];
                    document.getElementById('live-price').innerText = `$${pair.priceUsd}`;
                    document.getElementById('live-liq').innerText = `$${pair.liquidity.usd.toLocaleString()}`;
                    document.getElementById('live-mcap').innerText = `$${(pair.fdv || 0).toLocaleString()}`;
                    document.getElementById('live-vol').innerText = `$${(pair.volume.h24 || 0).toLocaleString()}`;
                    document.querySelectorAll('.animate-pulse').forEach(el => el.classList.remove('animate-pulse'));
                }
            } catch (e) { console.error("DexScreener Offline"); }
        }

        async function fetchMissions(platform, url, containerId) {
            const container = document.getElementById(containerId);
            try {
                // استخدام وسيط AllOrigins مع كسر الكاش لسرعة فائقة
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`);
                const result = await response.json();
                const data = JSON.parse(result.contents);
                if (data && data.items) {
                    container.innerHTML = '';
                    data.items.slice(0, 3).forEach((item, index) => {
                        const taskId = `${platform}_${index}`;
                        const isDone = doneTasks.includes(taskId);
                        container.innerHTML += `
                            <div class="dragon-card p-4 flex justify-between items-center ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <i class="fab fa-${platform==='x'?'twitter text-blue-400':'tiktok text-pink-500'}"></i>
                                    <div><p class="text-[9px] font-black uppercase">${platform} TASK</p><p class="text-[8px] text-yellow-500">+1000 PTS</p></div>
                                </div>
                                <button onclick="doTask('${taskId}', 1000, '${item.url}')" class="bg-white text-black text-[8px] font-black px-4 py-2 rounded-lg uppercase">GO</button>
                            </div>`;
                    });
                }
            } catch (e) { container.innerHTML = '<p class="text-center text-[8px] text-gray-700">WAITING FOR DRAGON FIRE...</p>'; }
        }

        function doTask(id, reward, url) {
            tg.openLink(url);
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('d_pts', points);
                    localStorage.setItem('d_done', JSON.stringify(doneTasks));
                    document.getElementById('pointsHeader').innerText = points.toLocaleString();
                    tg.HapticFeedback.notificationOccurred('success');
                    switchTab('missions');
                }
            }, 6000);
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('d_lang', currentLang);
            updateUI();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.getElementById('pointsLabel').innerText = isAr ? 'نقاط التنين' : 'D-POINTS';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-white'));
            document.getElementById(t + '-tab').classList.add('active');
            event.currentTarget.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        tg.expand();
        updateUI();
        fetchTokenData();
        fetchMissions('x', "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json", 'x-tasks');
        fetchMissions('tk', "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json", 'tk-tasks');
        document.getElementById('pointsHeader').innerText = points.toLocaleString();
        setInterval(fetchTokenData, 15000);
    </script>
</body>
</html>
