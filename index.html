<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Elite Dashboard 🐉</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #f59e0b; --dark: #050505; --card: #0f0f0f; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: #fff; }
        .font-v { font-family: 'Orbitron', sans-serif; }
        .dragon-border { border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 2rem; }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #78350f 100%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); }
        .stat-box { border-left: 3px solid var(--gold); background: rgba(245, 158, 11, 0.05); }
        .animate-glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(245, 158, 11, 0.2); } to { box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); } }
    </style>
</head>
<body class="p-4 pb-20 max-w-2xl mx-auto">

    <header class="flex justify-between items-center py-6 px-2">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 gold-gradient rounded-full flex items-center justify-center text-2xl shadow-xl animate-glow">🐉</div>
            <h1 class="font-v font-black text-xl text-yellow-500 tracking-widest">DRAGON</h1>
        </div>
        <button onclick="connectWallet()" id="walletBtn" class="glass border border-yellow-500/30 px-5 py-2 rounded-2xl text-[10px] font-bold hover:bg-yellow-500 hover:text-black transition-all">CONNECT WALLET</button>
    </header>

    <main class="space-y-6">
        <div class="dragon-border p-8 glass relative">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs text-gray-500 font-bold uppercase tracking-widest italic">Live Market Cap</span>
                <span id="priceChange" class="text-xs font-bold text-green-500">+0.00%</span>
            </div>
            <h2 id="priceDisplay" class="font-v text-4xl font-black text-yellow-500 mb-6 tracking-tighter">$0.0000000000</h2>
            <canvas id="mainChart" class="w-full h-48"></canvas>
        </div>

        <div class="dragon-border p-6 glass">
            <h3 class="text-sm font-black text-yellow-500 mb-4">🧮 حاسبة أرباح التنين</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-gray-500">كمية العملات لديك</label>
                    <input id="calcAmount" type="number" placeholder="0" class="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-sm outline-none mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500">السعر المستهدف ($)</label>
                    <input id="targetPrice" type="number" placeholder="0.001" class="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-sm outline-none mt-1">
                </div>
            </div>
            <button onclick="calculateProfit()" class="w-full mt-4 py-3 gold-gradient rounded-xl text-black font-black text-xs uppercase shadow-lg shadow-yellow-500/10">احسب الأرباح المتوقعة</button>
            <div id="profitRes" class="hidden mt-4 p-4 stat-box rounded-xl text-center">
                <p class="text-[10px] text-gray-400">قيمة استثمارك ستصبح:</p>
                <p id="totalProfit" class="text-2xl font-black text-green-500 font-v">$0.00</p>
            </div>
        </div>

        <div class="dragon-border p-6 glass border-2 border-yellow-500/20">
            <h3 class="text-sm font-black text-yellow-500 mb-4 flex items-center gap-2 italic">
                <span>⚡</span> فاحص البيانات الفوري
            </h3>
            <input id="scanInput" type="text" placeholder="أدخل عنوان أي محفظة..." 
                   class="w-full bg-black/60 border border-yellow-500/10 p-4 rounded-2xl outline-none focus:border-yellow-500 text-xs mb-4 font-mono">
            <button onclick="scanWallet()" class="w-full py-4 bg-zinc-900 rounded-2xl font-black text-xs hover:bg-zinc-800 border border-white/5 uppercase tracking-widest transition-all">Scan Network</button>
            
            <div id="scanRes" class="hidden mt-6 space-y-4">
                <div class="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <span class="text-xs text-gray-400">الرصيد</span>
                    <span id="scanBal" class="text-sm font-black text-yellow-500">0.00 DRGN</span>
                </div>
                <div class="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <span class="text-xs text-gray-400">القيمة المالية</span>
                    <span id="scanVal" class="text-sm font-black text-green-500">$0.00</span>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-10 pb-10 text-center">
        <div class="flex justify-center gap-6 text-gray-600 mb-4">
            <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" class="hover:text-yellow-500 transition">BUY</a>
            <a href="https://www.pinksale.finance/pinklock/record/11?chain=BSC" class="hover:text-yellow-500 transition">LOCK</a>
            <a href="#" class="hover:text-yellow-500 transition">CHART</a>
        </div>
        <p class="text-[10px] text-gray-800 uppercase font-bold tracking-widest">Powered by Dragon Intelligence Engine</p>
    </footer>

    <script>
        const CONTRACT = "0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        const RPC = "https://bsc-dataseed1.binance.org/";
        const ABI = ["function balanceOf(address) view returns (uint256)"];
        let price = 0;

        // 1. نظام جلب السعر مع مؤشر التغير
        async function loadPrice() {
            try {
                const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${CONTRACT}`);
                const d = await r.json();
                if(d.pairs) {
                    price = parseFloat(d.pairs[0].priceUsd);
                    const change = d.pairs[0].priceChange.h24;
                    document.getElementById('priceDisplay').innerText = '$' + price.toFixed(11);
                    const chEl = document.getElementById('priceChange');
                    chEl.innerText = (change > 0 ? '+' : '') + change + '% (24h)';
                    chEl.className = change > 0 ? 'text-xs font-bold text-green-500' : 'text-xs font-bold text-red-500';
                    updateMainChart(price);
                }
            } catch(e) {}
        }

        // 2. الرسم البياني المتطور
        const ctx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels: new Array(12).fill(''), datasets: [{ data: [], borderColor: '#f59e0b', borderWidth: 3, tension: 0.3, fill: true, backgroundColor: 'rgba(245, 158, 11, 0.05)', pointRadius: 0 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });

        function updateMainChart(p) {
            mainChart.data.datasets[0].data.push(p);
            if(mainChart.data.datasets[0].data.length > 12) mainChart.data.datasets[0].data.shift();
            mainChart.update();
        }

        // 3. حاسبة الأرباح
        function calculateProfit() {
            const amt = document.getElementById('calcAmount').value;
            const target = document.getElementById('targetPrice').value;
            if(!amt || !target) return;
            const result = amt * target;
            document.getElementById('profitRes').classList.remove('hidden');
            document.getElementById('totalProfit').innerText = '$' + result.toLocaleString();
        }

        // 4. الفحص العميق
        async function scanWallet() {
            const addr = document.getElementById('scanInput').value.trim();
            if(!ethers.utils.isAddress(addr)) return alert("العنوان غير صحيح");
            
            const provider = new ethers.providers.JsonRpcProvider(RPC);
            const contract = new ethers.Contract(CONTRACT, ABI, provider);
            const bal = await contract.balanceOf(addr);
            const fmt = ethers.utils.formatUnits(bal, 18);

            document.getElementById('scanRes').classList.remove('hidden');
            document.getElementById('scanBal').innerText = parseFloat(fmt).toLocaleString() + " DRGN";
            document.getElementById('scanVal').innerText = "$" + (parseFloat(fmt) * price).toFixed(2);
        }

        // 5. ربط المحفظة
        async function connectWallet() {
            if(window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = accounts[0].substring(0,8) + "...";
                document.getElementById('scanInput').value = accounts[0];
                scanWallet();
            } else { alert("يرجى استخدام MetaMask Browser"); }
        }

        setInterval(loadPrice, 15000);
        loadPrice();
    </script>
</body>
</html>
