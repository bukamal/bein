<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dragon Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #ff4d4d; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 1000; font-size: 12px; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="pb-32">

    <header class="p-4 flex justify-between items-center sticky top-0 bg-[#050505]/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center"><i class="fas fa-dragon"></i></div>
            <span class="font-black text-lg uppercase gold-text">DRAGON<span class="text-red-600">HUB</span></span>
        </div>
        <button id="walletBtn" onclick="smartConnect()" class="bg-white text-black text-[10px] font-bold px-4 py-2 rounded-full uppercase">Connect</button>
    </header>

    <div id="home-tab" class="tab-content active animate-in fade-in transition-all">
        <div class="p-4">
            <div class="dragon-card p-5 rounded-3xl mb-4">
                <div class="flex justify-between mb-2"><span class="text-xs text-gray-400">معدل الحرق</span> <span id="burnPercent" class="text-red-500 font-bold">0%</span></div>
                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden"><div id="burnFill" class="bg-red-600 h-full w-0 transition-all duration-1000"></div></div>
            </div>
            
            <h3 class="text-xs font-bold text-gray-500 mb-3 uppercase px-1">آخر المواجهات ⚔️</h3>
            <div class="dragon-card rounded-3xl overflow-hidden mb-6">
                <div class="aspect-video bg-gray-900 flex items-center justify-center relative">
                    <img src="https://via.placeholder.com/400x225/111/fff?text=Dragon+Sport+TikTok" class="opacity-40">
                    <a href="https://www.tiktok.com/@thedragonsport" target="_blank" class="absolute bg-white/10 p-4 rounded-full backdrop-blur-md"><i class="fas fa-play"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4 text-center">إحصائيات الشبكة 📊</h2>
        <div class="space-y-3">
            <div class="dragon-card p-4 rounded-2xl flex justify-between"><span>العدد الإجمالي:</span> <span class="text-red-500">1,000,000,000</span></div>
            <div class="dragon-card p-4 rounded-2xl flex justify-between"><span>الشبكة:</span> <span class="text-yellow-500">BSC (BEP-20)</span></div>
            <div id="burnTotalDisplay" class="dragon-card p-4 rounded-2xl flex justify-between font-mono text-xs">جاري جلب البيانات...</div>
        </div>
    </div>

    <div id="ranks-tab" class="tab-content p-4">
        <div id="rankSection" class="dragon-card p-8 rounded-3xl text-center border-yellow-600/30">
            <div id="rankIcon" class="text-7xl mb-4">🥚</div>
            <h2 id="rankTitle" class="text-2xl font-black">اربط المحفظة</h2>
            <p id="rankBadge" class="text-gray-500 mt-2">لم يتم الكشف عن الرتبة بعد</p>
        </div>
    </div>

    <div id="assets-tab" class="tab-content p-4 text-center">
        <i class="fas fa-wallet text-5xl mb-4 text-gray-700"></i>
        <h2 class="text-xl font-bold mb-2">محفظة التنين</h2>
        <p class="text-gray-500 text-sm">سيتم عرض رصيدك من $DRGN هنا فور الربط</p>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-item flex flex-col items-center active" id="nav-home">
            <i class="fas fa-home"></i><span class="text-[9px] mt-1">HOME</span>
        </button>
        <button onclick="switchTab('data')" class="nav-item flex flex-col items-center text-gray-500" id="nav-data">
            <i class="fas fa-chart-pie"></i><span class="text-[9px] mt-1">DATA</span>
        </button>
        <button onclick="switchTab('ranks')" class="nav-item flex flex-col items-center text-gray-500" id="nav-ranks">
            <i class="fas fa-trophy"></i><span class="text-[9px] mt-1">RANKS</span>
        </button>
        <button onclick="switchTab('assets')" class="nav-item flex flex-col items-center text-gray-500" id="nav-assets">
            <i class="fas fa-wallet"></i><span class="text-[9px] mt-1">ASSETS</span>
        </button>
    </nav>

    <div id="toast"></div>

    <script>
        // وظيفة التنقل بين التبويبات
        function switchTab(tabName) {
            // إخفاء كل المحتوى
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // إزالة اللون الأحمر من كل الأزرار
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('text-red-500', 'active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.add('text-gray-500'));

            // إظهار المحتوى المختار
            document.getElementById(tabName + '-tab').classList.add('active');
            // تلوين الزر المختار
            const activeNav = document.getElementById('nav-' + tabName);
            activeNav.classList.remove('text-gray-500');
            activeNav.classList.add('text-red-500', 'active');
        }

        // المنطق البرمجي (نفس الكود السابق مع ربط البيانات)
        const RPC = "https://bsc-dataseed.binance.org/";
        const CONTRACT = "0x84606890ad8d13e5a092c25abe59e2ec8ade7805";
        const DEAD = "0x000000000000000000000000000000000000dEaD";

        async function fetchMarketData() {
            try {
                const provider = new ethers.providers.JsonRpcProvider(RPC);
                const abi = ["function balanceOf(address) view returns (uint256)"];
                const contract = new ethers.Contract(CONTRACT, abi, provider);
                const deadBal = await contract.balanceOf(DEAD);
                const burned = parseFloat(ethers.utils.formatUnits(deadBal, 18));
                const burnP = ((burned / 1000000000) * 100).toFixed(4);

                document.getElementById('burnFill').style.width = burnP + "%";
                document.getElementById('burnPercent').innerText = burnP + "%";
                if(document.getElementById('burnTotalDisplay')) {
                    document.getElementById('burnTotalDisplay').innerText = "المحروق: " + burned.toLocaleString() + " DRGN";
                }
            } catch(e) { console.log("Blockchain Error"); }
        }

        // استدعاء البيانات عند الفتح
        fetchMarketData();
        setInterval(fetchMarketData, 30000);

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ذكاء اصطناعي بسيط لربط المحفظة
        function smartConnect() {
            if (window.ethereum) {
                window.ethereum.request({ method: 'eth_requestAccounts' }).then(acc => {
                    document.getElementById('walletBtn').innerText = acc[0].substring(0,6) + "...";
                    showToast("تم ربط المحفظة بنجاح 🐉");
                    switchTab('ranks'); // نقله لصفحة الرتب فور الربط
                });
            } else {
                showToast("يرجى استخدام متصفح المحفظة");
            }
        }
    </script>
</body>
</html>
