<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon VIP Sports | التنين الرياضي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        :root { --dragon-red: #ff4d4d; --dragon-gold: #f3ba2f; }
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; user-select: none; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid #1a1a1a; border-radius: 24px; position: relative; }
        .raid-active { border: 1px solid var(--dragon-red); box-shadow: 0 0 20px rgba(255, 77, 77, 0.15); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: var(--dragon-red); border-top: 2px solid var(--dragon-red); background: linear-gradient(to bottom, rgba(255,77,77,0.05), transparent); }
        .prediction-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; transition: 0.2s; }
        .prediction-btn:active { background: var(--dragon-red); transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center">
        <i class="fas fa-dragon text-5xl text-red-600 animate-bounce"></i>
    </div>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600"></i>
            <span style="font-family: 'Orbitron';" class="text-[10px] font-black tracking-widest uppercase">DRAGON SPORTS</span>
        </div>
        <div id="status-badge" class="px-3 py-1 bg-zinc-800 rounded-full text-[8px] font-black uppercase">الانتظار</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div id="match-area" class="dragon-card p-6 text-center raid-active">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[8px] font-black text-red-500 uppercase animate-pulse">● المباراة القادمة</span>
                    <span id="match-timer" style="font-family: 'Orbitron';" class="text-xs text-yellow-500">00:00:00</span>
                </div>
                <div class="flex items-center justify-around py-4">
                    <div class="text-center">
                        <div class="w-14 h-14 bg-zinc-900 rounded-full mx-auto mb-2 flex items-center justify-center border border-white/10"><i class="fas fa-shield-halved text-2xl"></i></div>
                        <p id="team-a" class="text-[10px] font-black uppercase">فريق A</p>
                    </div>
                    <div class="text-xl font-black italic text-zinc-800">VS</div>
                    <div class="text-center">
                        <div class="w-14 h-14 bg-zinc-900 rounded-full mx-auto mb-2 flex items-center justify-center border border-white/10"><i class="fas fa-shield-halved text-2xl"></i></div>
                        <p id="team-b" class="text-[10px] font-black uppercase">فريق B</p>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-6">
                    <button onclick="predict('A')" class="prediction-btn py-4 text-[9px] font-black uppercase">فوز A</button>
                    <button onclick="predict('D')" class="prediction-btn py-4 text-[9px] font-black uppercase">تعادل</button>
                    <button onclick="predict('B')" class="prediction-btn py-4 text-[9px] font-black uppercase">فوز B</button>
                </div>
            </div>
            <button onclick="tg.openLink('https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3')" class="w-full py-4 bg-yellow-500 text-black rounded-2xl text-[11px] font-black uppercase shadow-lg">تفعيل رتبة VIP وشراء $DRGN 👑</button>
        </div>

        <div id="missions" class="tab-content space-y-3">
             <div class="dragon-card p-4 flex justify-between items-center">
                <div><p class="text-[10px] font-black">شاهد تحليل المباراة الأخير</p><p class="text-[8px] text-yellow-500">+10,000 PTS</p></div>
                <button onclick="tg.openLink('https://tiktok.com')" class="bg-white text-black px-4 py-1 rounded-lg text-[9px] font-black uppercase">GO</button>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-2">
            <div id="lb-list" class="space-y-2"></div>
        </div>

        <div id="wallet" class="tab-content space-y-4">
            <div class="dragon-card p-8 text-center">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-2">رصيدك الحالي</p>
                <h2 id="user-pts" class="text-4xl font-black">0</h2>
                <p id="rank-name" class="text-[10px] text-red-500 font-black mt-2">BRONZE MEMBER</p>
                <div class="mt-8">
                    <input id="bsc-address" type="text" placeholder="عنوان محفظة BSC" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-[10px] text-center mb-3">
                    <button onclick="verify()" class="w-full py-3 bg-white text-black text-[10px] font-black rounded-xl uppercase">التحقق من الرصيد</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-3 z-50 backdrop-blur-xl">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home"><i class="fas fa-futbol text-lg mb-1"></i><span class="text-[8px] font-black uppercase">الملعب</span></button>
        <button onclick="showTab('missions')" class="nav-btn flex-1 flex flex-col items-center" id="n-missions"><i class="fas fa-tasks text-lg mb-1"></i><span class="text-[8px] font-black uppercase">المهام</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex-1 flex flex-col items-center" id="n-leaderboard"><i class="fas fa-trophy text-lg mb-1"></i><span class="text-[8px] font-black uppercase">الدوري</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet"><i class="fas fa-user-circle text-lg mb-1"></i><span class="text-[8px] font-black uppercase">عضويتي</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        let uData = { pts: 0, rank: 'BRONZE' };

        async function init() {
            const user = tg.initDataUnsafe.user;
            if(!user) return;
            try {
                const res = await fetch(`${WORKER_URL}/sync`, { method: 'POST', body: JSON.stringify({ userId: user.id, username: user.first_name }) });
                const d = await res.json();
                uData = { pts: d.points, rank: d.rank };
                render();
                fetchMatch();
            } catch(e) {}
            document.getElementById('loader').style.display = 'none';
        }

        async function fetchMatch() {
            const res = await fetch(`${WORKER_URL}/get-next-match`);
            const m = await res.json();
            const teams = m.title.split(/vs|ضد/i);
            document.getElementById('team-a').innerText = teams[0] ? teams[0].trim() : "فريق A";
            document.getElementById('team-b').innerText = teams[1] ? teams[1].trim() : "فريق B";
            
            const timer = setInterval(() => {
                const diff = m.startTime - new Date().getTime();
                if(diff <= 0) { document.getElementById('match-timer').innerText = "LIVE"; clearInterval(timer); return; }
                const h = Math.floor(diff / 3600000), m_ = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                document.getElementById('match-timer').innerText = `${String(h).padStart(2,'0')}:${String(m_).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        async function verify() {
            const addr = document.getElementById('bsc-address').value;
            if(!addr.startsWith('0x')) return tg.showAlert("أدخل عنوان صحيح");
            const res = await fetch(`${WORKER_URL}/check-balance`, { method: 'POST', body: JSON.stringify({ walletAddress: addr }) });
            const { balance } = await res.json();
            if(balance >= 1000000) { tg.showAlert(`✅ تم التحقق! رصيدك ${balance.toFixed(0)} عملة. أنت VIP الآن!`); uData.rank = "VIP"; render(); }
            else tg.showAlert(`رصيدك ${balance.toFixed(0)} فقط. تحتاج لمليون عملة.`);
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        function predict(c) { tg.HapticFeedback.impactOccurred('medium'); tg.showConfirm("تأكيد التوقع؟", (ok) => { if(ok) tg.showAlert("تم التسجيل! انتظر النتيجة ⚽"); }); }
        function render() { document.getElementById('user-pts').innerText = uData.pts.toLocaleString(); document.getElementById('rank-name').innerText = uData.rank + " MEMBER"; }

        tg.expand();
        init();
    </script>
</body>
</html>
