<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Stadium Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { background: #050505; color: #fff; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: linear-gradient(160deg, #111, #070707); border: 1px solid #222; border-radius: 20px; transition: 0.3s; }
        .nav-btn.active { color: #ff3333; transform: translateY(-3px); }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .tab-content { display: none; animation: slideUp 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center bg-black/50 backdrop-blur-lg sticky top-0 z-[100] border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/20">
                <i class="fas fa-dragon text-white"></i>
            </div>
            <div>
                <h1 id="txt-logo" class="text-sm font-black tracking-tighter uppercase italic">Dragon Stadium</h1>
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[8px] text-zinc-500 font-bold uppercase">Online Hub</span>
                </div>
            </div>
        </div>
        <button onclick="toggleLang()" class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-lg text-[10px] font-bold">
            <i class="fas fa-language text-red-500"></i> <span id="btn-lang">EN</span>
        </button>
    </header>

    <main class="p-4 space-y-6">
        <section id="home" class="tab-content active space-y-4">
            <div id="match-loader" class="hidden space-y-4">
                <div class="dragon-card p-10 loading-pulse bg-zinc-900"></div>
                <div class="dragon-card p-10 loading-pulse bg-zinc-900"></div>
            </div>
            <div id="match-container" class="space-y-4"></div>
        </section>

        <section id="league" class="tab-content space-y-4">
            <div class="dragon-card p-5 border-red-900/30">
                <h2 id="txt-lb-title" class="text-center text-red-600 font-black italic mb-4">LEADERBOARD</h2>
                <div id="lb-list" class="space-y-2"></div>
            </div>
        </section>

        <section id="account" class="tab-content space-y-4">
            <div class="dragon-card p-6 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-red-600"></div>
                <p id="txt-bal-label" class="text-[10px] text-zinc-500 font-black uppercase tracking-widest">Total Assets</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <h2 id="total-balance" class="text-4xl font-black italic">0</h2>
                    <span class="text-red-600 font-bold text-xs uppercase italic">DRGN</span>
                </div>
                <div id="rank-name" class="inline-block mt-3 px-4 py-1 bg-white/5 rounded-full text-[9px] font-black border border-white/10 tracking-widest">BRONZE MEMBER</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="dragon-card p-4 text-center">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Game Wallet</p>
                    <p id="game-balance" class="text-lg font-black mt-1">0</p>
                </div>
                <div class="dragon-card p-4 text-center">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Pending</p>
                    <p id="pending-rewards" class="text-lg font-black mt-1 text-yellow-500">0</p>
                </div>
            </div>

            <button onclick="claimRewards()" id="btn-claim" class="w-full py-4 bg-red-600 text-white font-black rounded-2xl shadow-xl shadow-red-900/40 active:scale-95 transition-all">CLAIM REWARDS</button>

            <div class="dragon-card p-5 space-y-3">
                <p class="text-[9px] text-zinc-500 font-bold text-center italic">Connect your BSC Wallet to update Rank & Balance</p>
                <input id="bsc-address" type="text" placeholder="0x..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-xs text-center outline-none focus:border-red-600 transition-all">
                <button onclick="updateWallet()" id="btn-update" class="w-full py-3 bg-white text-black text-[11px] font-black rounded-xl uppercase active:scale-95 transition-all">Update Wallet</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-xl border-t border-white/5 flex justify-around p-3 z-[100]">
        <button onclick="showTab('home')" id="n-home" class="nav-btn active flex-1 flex flex-col items-center">
            <i class="fas fa-gamepad text-xl mb-1"></i><span id="nav-home" class="text-[9px] font-bold">Stadium</span>
        </button>
        <button onclick="showTab('league')" id="n-league" class="nav-btn flex-1 flex flex-col items-center">
            <i class="fas fa-trophy text-xl mb-1"></i><span id="nav-league" class="text-[9px] font-bold">League</span>
        </button>
        <button onclick="showTab('account')" id="n-account" class="nav-btn flex-1 flex flex-col items-center">
            <i class="fas fa-wallet text-xl mb-1"></i><span id="nav-acc" class="text-[9px] font-bold">Account</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";

        const i18n = {
            ar: { logo: "ملعب التنين", home: "الملعب", league: "الدوري", acc: "الحساب", update: "تحديث المحفظة", claim: "سحب المكافآت", lb: "قائمة المتصدرين", bal: "إجمالي الأصول" },
            en: { logo: "DRAGON STADIUM", home: "STADIUM", league: "LEAGUE", acc: "ACCOUNT", update: "UPDATE WALLET", claim: "CLAIM REWARDS", lb: "LEADERBOARD", bal: "TOTAL ASSETS" }
        };

        async function apiReq(path, method = 'GET', body = null) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json', 'x-telegram-init-data': tg.initData } };
                if (body) options.body = JSON.stringify(body);
                const r = await fetch(API + path, options);
                return await r.json();
            } catch (e) { return { success: false, message: "Network Error" }; }
        }

        async function init() {
            tg.ready(); tg.expand();
            tg.enableClosingConfirmation();
            const r = await apiReq('/sync', 'POST');
            if (r.success) renderUser(r.user);
            loadMatches();
            loadLeaderboard();
        }

        async function loadMatches() {
            document.getElementById('match-loader').classList.remove('hidden');
            const d = await apiReq('/get-matches');
            document.getElementById('match-loader').classList.add('hidden');
            
            if (!d.success) {
                document.getElementById('match-container').innerHTML = `<div class="dragon-card p-6 text-center text-red-500">خطأ في تحميل المباريات<br><small>${d.message || ''}</small></div>`;
                return;
            }
            document.getElementById('match-container').innerHTML = d.matches.map(m => {
                const time = new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                <div class="dragon-card p-4 border-l-4 ${m.isOpen ? 'border-l-green-600' : 'border-l-zinc-800'}">
                    <div class="flex justify-between items-center mb-4 text-[9px] font-bold uppercase tracking-widest text-zinc-500">
                        <span>${m.league}</span>
                        <span class="\( {m.isOpen ? 'text-green-500' : ''}"> \){m.isOpen ? '● LIVE VOTING' : time}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-1 text-center"><img src="\( {m.logoA}" class="w-12 h-12 mx-auto mb-2 drop-shadow-lg"><p class="text-[10px] font-black uppercase"> \){m.teamA}</p></div>
                        <div class="text-red-600 font-black italic">VS</div>
                        <div class="flex-1 text-center"><img src="\( {m.logoB}" class="w-12 h-12 mx-auto mb-2 drop-shadow-lg"><p class="text-[10px] font-black uppercase"> \){m.teamB}</p></div>
                    </div>
                    ${m.isOpen ? `
                    <div class="grid grid-cols-3 gap-2 mt-4" id="v-${m.id}">
                        <button onclick="vote('\( {m.id}','HOME', \){m.time})" class="bg-white/5 py-3 rounded-xl hover:bg-red-600 transition-all font-black italic text-xs">1</button>
                        <button onclick="vote('\( {m.id}','DRAW', \){m.time})" class="bg-white/5 py-3 rounded-xl hover:bg-red-600 transition-all font-black italic text-xs">X</button>
                        <button onclick="vote('\( {m.id}','AWAY', \){m.time})" class="bg-white/5 py-3 rounded-xl hover:bg-red-600 transition-all font-black italic text-xs">2</button>
                    </div>` : `
                    <div class="mt-4 py-2 bg-black/40 rounded-xl text-center text-[9px] text-zinc-600 font-black italic uppercase">Voting Closed</div>
                    `}
                </div>`;
            }).join('');
        }

        async function vote(id, side, time) {
            tg.MainButton.setText("SENDING VOTE...").show();
            const r = await apiReq('/vote', 'POST', { matchId: id, voteFor: side, matchTime: time });
            tg.MainButton.hide();
            if (r.success) {
                tg.HapticFeedback.notificationOccurred('success');
                document.getElementById(`v-${id}`).innerHTML = `<div class="col-span-3 py-2 text-center text-green-500 font-black italic text-xs animate-bounce">VOTE REGISTERED ✓</div>`;
            } else tg.showAlert(r.message);
        }

        function renderUser(u) {
            document.getElementById('total-balance').innerText = Math.floor((u.gameBalance || 0) + (u.tokenBalance || 0)).toLocaleString();
            document.getElementById('game-balance').innerText = Math.floor(u.gameBalance || 0).toLocaleString();
            document.getElementById('pending-rewards').innerText = Math.floor(u.pendingRewards || 0).toLocaleString();
            document.getElementById('rank-name').innerText = `${u.rank} MEMBER`;
            if (u.wallet) document.getElementById('bsc-address').value = u.wallet;
        }

        async function updateWallet() {
            const wallet = document.getElementById('bsc-address').value.trim();
            if (!wallet.startsWith('0x') || wallet.length !== 42) return tg.showAlert("Invalid BSC Address");
            const r = await apiReq('/check-balance', 'POST', { wallet });
            if (r.success) { 
                renderUser(r.user); 
                tg.showConfirm("Wallet & Rank Updated!"); 
            } else tg.showAlert(r.message);
        }

        async function claimRewards() {
            const r = await apiReq('/claim-rewards', 'POST');
            if (r.success) { 
                renderUser(r.user); 
                tg.showAlert("Rewards moved to Game Wallet!"); 
            } else tg.showAlert(r.message || "Error");
        }

        async function loadLeaderboard() {
            const data = await apiReq('/leaderboard');
            if (!data || !data.length) {
                document.getElementById('lb-list').innerHTML = `<div class="text-center text-zinc-500 py-8">لا يوجد لاعبين بعد</div>`;
                return;
            }
            document.getElementById('lb-list').innerHTML = data.map((p, i) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-zinc-600 font-black italic text-xs">#${i + 1}</span>
                        <span class="font-bold text-xs">${p.username}</span>
                    </div>
                    <span class="font-black text-red-600 italic text-xs">${Math.floor(p.score).toLocaleString()} DRGN</span>
                </div>`).join('');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleLang() {
            let currentLang = document.body.dir === 'rtl' ? 'ar' : 'en';
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            Object.keys(i18n[currentLang]).forEach(key => {
                const el = document.getElementById(`nav-\( {key}`) || document.getElementById(`txt- \){key}`) || document.getElementById(`btn-${key}`);
                if (el) el.innerText = i18n[currentLang][key];
            });
            document.getElementById('btn-lang').innerText = currentLang === 'ar' ? 'EN' : 'AR';
        }

        init();
    </script>
</body>
</html>
