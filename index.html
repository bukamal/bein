<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Real-Time Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 18px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { color: #555; transition: 0.3s; }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; background: linear-gradient(to bottom, rgba(255,77,77,0.05), transparent); }
        .burn-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4d4d, #f97316); border-radius: 20px; transition: width 2s ease; }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 sticky top-0 bg-black/95 border-b border-white/5 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600 text-xl"></i>
            <h1 class="text-[10px] font-black uppercase tracking-tighter">DRAGON<span class="text-red-600">PRO</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-bold bg-white/5 px-3 py-1.5 rounded border border-white/10 uppercase" id="langBtn">EN</button>
            <p id="pointsHeader" class="text-sm font-black text-white">0</p>
        </div>
    </header>

    <main class="p-4">
        <div id="home-tab" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="dragon-card p-4 text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="السيولة المتاحة" data-en="Live Liquidity">السيولة المتاحة</p>
                    <p id="live-liq" class="text-xs font-black text-green-500 tracking-tighter">---</p>
                </div>
                <div class="dragon-card p-4 text-center">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="القيمة السوقية" data-en="Market Cap">القيمة السوقية</p>
                    <p id="live-mcap" class="text-xs font-black text-white tracking-tighter">---</p>
                </div>
            </div>

            <div class="dragon-card p-5 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-gray-400 font-bold uppercase" data-ar="سعر العملة" data-en="Token Price">سعر العملة</span>
                    <span id="live-price" class="text-xs font-mono font-bold text-red-500">$---</span>
                </div>
                <div class="space-y-2 pt-2 border-t border-white/5">
                    <div class="flex justify-between text-[9px] font-bold uppercase">
                        <span data-ar="نسبة الحرق الحقيقية" data-en="Real Burn Rate">نسبة الحرق الحقيقية</span>
                        <span id="burn-text" class="text-orange-500">45.2%</span>
                    </div>
                    <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div id="burn-bar" class="burn-bar-fill" style="width: 45.2%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="missions-tab" class="tab-content space-y-4">
            <div id="tasks-list" class="space-y-3"></div>
        </div>

        <div id="trade-tab" class="tab-content space-y-4">
            <div class="dragon-card p-6 border-red-600/20 bg-red-600/5 space-y-5">
                <div class="flex items-center gap-3">
                    <i class="fas fa-chart-line text-red-500"></i>
                    <h3 class="text-xs font-black uppercase" data-ar="نظام حماية المتداول" data-en="Trader Protection">نظام حماية المتداول</h3>
                </div>
                <div class="bg-black/40 p-4 rounded-xl space-y-3">
                    <div class="flex justify-between items-center">
                        <p class="text-[9px] text-gray-500 font-bold uppercase" data-ar="الحد الأقصى للشراء" data-en="Max Safe Buy">الحد الأقصى للشراء</p>
                        <p id="safe-buy-val" class="text-xs font-black text-green-500">$---</p>
                    </div>
                    <div class="flex justify-between items-center border-t border-white/5 pt-2">
                        <p class="text-[9px] text-gray-500 font-bold uppercase" data-ar="الانزلاق الموصى به" data-en="Rec. Slippage">الانزلاق الموصى به</p>
                        <p class="text-xs font-black text-white">12%</p>
                    </div>
                </div>
                <p id="trade-advice" class="text-[9px] text-gray-400 italic leading-relaxed" data-ar="يتم تحديث الحد الأقصى تلقائياً بناءً على سيولة السوق الحالية لتجنب الانهيار السعري." data-en="Max buy is auto-updated based on live liquidity to prevent price impact."></p>
            </div>
            <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" target="_blank" class="block w-full bg-white text-black text-center py-4 rounded-2xl font-black uppercase text-[10px]">Swap on PancakeSwap</a>
        </div>

        <div id="wallet-tab" class="tab-content text-center py-10">
            <div id="ton-connect-button" class="flex justify-center"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 active" id="nav-home">
            <i class="fas fa-home text-xs"></i>
            <span class="text-[9px] font-bold uppercase" data-ar="الرئيسية" data-en="HOME">الرئيسية</span>
        </button>
        <button onclick="switchTab('missions')" class="nav-btn flex flex-col items-center gap-1" id="nav-missions">
            <i class="fas fa-fire text-xs"></i>
            <span class="text-[9px] font-bold uppercase" data-ar="المهام" data-en="TASKS">المهام</span>
        </button>
        <button onclick="switchTab('trade')" class="nav-btn flex flex-col items-center gap-1" id="nav-trade">
            <i class="fas fa-sync text-xs"></i>
            <span class="text-[9px] font-bold uppercase" data-ar="تداول" data-en="TRADE">تداول</span>
        </button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center gap-1" id="nav-wallet">
            <i class="fas fa-wallet text-xs"></i>
            <span class="text-[9px] font-bold uppercase" data-ar="محفظة" data-en="WALLET">محفظة</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const CA = "0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        let points = parseInt(localStorage.getItem('d_pts')) || 0;
        let doneTasks = JSON.parse(localStorage.getItem('d_done')) || [];
        let currentLang = localStorage.getItem('d_lang') || 'ar';

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/test/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // نظام جلب البيانات المطور (تعدد المصادر لضمان النجاح)
        async function fetchTokenData() {
            const urls = [
                `https://api.dexscreener.com/latest/dex/tokens/${CA}`,
                `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.dexscreener.com/latest/dex/tokens/' + CA)}`
            ];

            for (let url of urls) {
                try {
                    const res = await fetch(url);
                    const rawData = await res.json();
                    const data = url.includes('allorigins') ? JSON.parse(rawData.contents) : rawData;

                    if (data.pairs && data.pairs[0]) {
                        const pair = data.pairs[0];
                        const liq = parseFloat(pair.liquidity.usd);
                        const price = parseFloat(pair.priceUsd);

                        document.getElementById('live-price').innerText = `$${price.toFixed(8)}`;
                        document.getElementById('live-liq').innerText = `$${liq.toLocaleString()}`;
                        document.getElementById('live-mcap').innerText = `$${parseFloat(pair.fdv || 0).toLocaleString()}`;

                        // حساب الشراء الآمن (3% من السيولة)
                        const safeBuy = liq * 0.03;
                        document.getElementById('safe-buy-val').innerText = `$${safeBuy.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
                        
                        const adviceAr = `الحد الأقصى المقترح لصفقة واحدة هو $${safeBuy.toLocaleString()} لضمان استقرار السعر.`;
                        const adviceEn = `Max recommended buy per trade is $${safeBuy.toLocaleString()} to maintain price stability.`;
                        document.getElementById('trade-advice').innerText = currentLang === 'ar' ? adviceAr : adviceEn;
                        return; // الخروج عند النجاح
                    }
                } catch (e) { console.warn("Failed to fetch from: " + url); }
            }
        }

        async function loadMissions() {
            const list = document.getElementById('tasks-list');
            const feeds = [
                {p: 'x', url: "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json"},
                {p: 'tk', url: "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json"}
            ];
            list.innerHTML = '';
            for(let f of feeds) {
                try {
                    const res = await fetch(f.url + "?t=" + Date.now());
                    const data = await res.json();
                    data.items.slice(0, 3).forEach((item, i) => {
                        const id = `${f.p}_${i}`;
                        const isDone = doneTasks.includes(id);
                        list.innerHTML += `
                            <div class="dragon-card p-4 flex justify-between items-center ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <i class="fab fa-${f.p==='x'?'twitter text-blue-400':'tiktok text-pink-500'}"></i>
                                    <div><p class="text-[10px] font-black uppercase">${f.p.toUpperCase()}</p><p class="text-[8px] text-yellow-500">+1000 PTS</p></div>
                                </div>
                                <button onclick="doTask('${id}', 1000, '${item.url}')" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg uppercase">GO</button>
                            </div>`;
                    });
                } catch(e) {}
            }
        }

        function doTask(id, reward, url) {
            tg.openLink(url);
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('d_pts', points);
                    localStorage.setItem('d_done', JSON.stringify(doneTasks));
                    document.getElementById('pointsHeader').innerText = points.toLocaleString();
                    tg.HapticFeedback.notificationOccurred('success');
                    loadMissions();
                }
            }, 5000);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('nav-' + t).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('d_lang', currentLang);
            updateUI();
            fetchTokenData();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        tg.expand();
        updateUI();
        fetchTokenData();
        loadMissions();
        document.getElementById('pointsHeader').innerText = points.toLocaleString();
        setInterval(fetchTokenData, 20000);
    </script>
</body>
</html>
