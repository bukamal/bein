<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon VIP Sports</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; user-select: none; }
        .dragon-card { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid #1a1a1a; border-radius: 24px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; background: linear-gradient(to bottom, rgba(255,77,77,0.05), transparent); }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <i class="fas fa-dragon text-4xl text-red-600 animate-pulse"></i>
    </div>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600"></i>
            <span style="font-family: 'Orbitron';" class="text-[9px] font-black uppercase">DRAGON SPORTS</span>
        </div>
        <div id="status-badge" class="px-3 py-1 bg-zinc-800 rounded-full text-[8px] font-black">متصل</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div class="dragon-card p-6 text-center border border-red-900/30">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[8px] font-black text-red-500 uppercase">● البث القادم</span>
                    <span id="match-timer" style="font-family: 'Orbitron';" class="text-xs text-yellow-500">جاري التحميل..</span>
                </div>
                <div class="flex items-center justify-around py-4">
                    <div class="text-center flex-1">
                        <div class="w-14 h-14 bg-zinc-900 rounded-full mx-auto mb-2 flex items-center justify-center border border-white/5 text-zinc-600"><i class="fas fa-shield-halved text-2xl"></i></div>
                        <p id="team-a" class="text-[10px] font-black uppercase">--</p>
                    </div>
                    <div class="px-4 text-xl font-black italic text-zinc-800">VS</div>
                    <div class="text-center flex-1">
                        <div class="w-14 h-14 bg-zinc-900 rounded-full mx-auto mb-2 flex items-center justify-center border border-white/5 text-zinc-600"><i class="fas fa-shield-halved text-2xl"></i></div>
                        <p id="team-b" class="text-[10px] font-black uppercase">--</p>
                    </div>
                </div>
            </div>
            <button onclick="tg.openLink('https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3')" class="w-full py-4 bg-yellow-500 text-black rounded-2xl text-[11px] font-black">شراء $DRGN 👑</button>
        </div>

        <div id="wallet" class="tab-content space-y-4 text-center">
            <div class="dragon-card p-8">
                <p class="text-[8px] text-gray-500 font-bold mb-2">رصيد النقاط</p>
                <h2 id="user-pts" class="text-4xl font-black">0</h2>
                <p id="rank-name" class="text-[10px] text-red-500 font-black mt-2">BRONZE MEMBER</p>
                <div class="mt-8 space-y-3">
                    <input id="bsc-address" type="text" placeholder="عنوان محفظة BSC (0x...)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] text-center outline-none focus:border-red-600">
                    <button id="verify-btn" onclick="verify()" class="w-full py-4 bg-white text-black text-[10px] font-black rounded-xl uppercase">التحقق من العضوية</button>
                </div>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-2">
            <div id="lb-list" class="space-y-2"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/5 flex justify-around p-3 z-50">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home"><i class="fas fa-volleyball-ball text-lg mb-1"></i><span class="text-[8px] font-black">الملعب</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex-1 flex flex-col items-center" id="n-leaderboard"><i class="fas fa-award text-lg mb-1"></i><span class="text-[8px] font-black">الدوري</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet"><i class="fas fa-id-badge text-lg mb-1"></i><span class="text-[8px] font-black">الحساب</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        let uData = { pts: 0, rank: 'BRONZE' };

        async function init() {
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'لاعب' };
            try {
                const res = await fetch(`${WORKER_URL}/sync`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: user.id, username: user.first_name }) 
                });
                const d = await res.json();
                uData = d;
                render();
                fetchMatch();
            } catch(e) {}
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
        }

        async function fetchMatch() {
            try {
                const res = await fetch(`${WORKER_URL}/get-next-match?t=` + Date.now());
                const m = await res.json();
                if (m.title) {
                    const teams = m.title.split(/vs|ضد/i);
                    document.getElementById('team-a').innerText = teams[0].trim();
                    document.getElementById('team-b').innerText = teams[1] ? teams[1].trim() : "--";
                    startTimer(m.startTime);
                }
            } catch(e) {}
        }

        function startTimer(target) {
            setInterval(() => {
                const diff = target - new Date().getTime();
                if(diff <= 0) { document.getElementById('match-timer').innerText = "LIVE NOW"; return; }
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('match-timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        async function verify() {
            const addr = document.getElementById('bsc-address').value.trim();
            const btn = document.getElementById('verify-btn');
            if (addr.length < 40) return tg.showAlert("❌ العنوان غير صحيح");
            
            btn.disabled = true;
            btn.innerText = "جاري التحقق بنظام V2...";

            try {
                const res = await fetch(`${WORKER_URL}/check-balance`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ walletAddress: addr }) 
                });
                const data = await res.json();
                
                if (data.balance >= 1000000) {
                    tg.showAlert(`✅ رائع! رصيدك ${data.balance.toLocaleString()} $DRGN. تم تفعيل VIP.`);
                    uData.rank = "VIP";
                    render();
                    await fetch(`${WORKER_URL}/sync`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, rank: "VIP", username: tg.initDataUnsafe.user.first_name }) 
                    });
                } else {
                    tg.showAlert(`رصيدك: ${data.balance.toLocaleString()} عملة.\nنظام V2 يؤكد أنك تحتاج للمزيد.`);
                }
            } catch(e) { tg.showAlert("❌ خطأ في النظام الجديد"); }
            finally { btn.disabled = false; btn.innerText = "التحقق من العضوية"; }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
        }

        function render() { 
            document.getElementById('user-pts').innerText = uData.pts.toLocaleString(); 
            document.getElementById('rank-name').innerText = uData.rank + " MEMBER"; 
        }

        tg.expand();
        init();
    </script>
</body>
</html>
