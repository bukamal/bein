<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dragon Sports</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
}

.card{
background:#111;
border-radius:20px;
padding:20px;
}

</style>

</head>

<body>

<div class="p-4 space-y-4">

<div class="card text-center">

<p id="match-timer" class="text-yellow-400 mb-4">--:--</p>

<div class="flex justify-around items-center">

<div>
<img id="logo-a" class="w-16 mx-auto mb-2">
<p id="team-a"></p>
</div>

<div class="text-xl font-bold">VS</div>

<div>
<img id="logo-b" class="w-16 mx-auto mb-2">
<p id="team-b"></p>
</div>

</div>

</div>


<div class="card">

<p class="text-center mb-3">Live Vote Battle</p>

<div class="flex justify-between text-xs mb-1">
<span id="vote-a-percent">0%</span>
<span id="vote-b-percent">0%</span>
</div>

<div class="w-full h-2 bg-gray-700 rounded">

<div id="vote-bar-a"
class="bg-red-600 h-2 rounded"
style="width:50%">
</div>

</div>

<div class="flex gap-2 mt-3">

<button onclick="vote('A')"
class="flex-1 bg-red-600 p-2 rounded">
تصويت للفريق الأول
</button>

<button onclick="vote('B')"
class="flex-1 bg-blue-600 p-2 rounded">
تصويت للفريق الثاني
</button>

</div>

</div>


<div class="card text-center">

<p>توقع الفائز</p>

<div class="flex gap-2 mt-3">

<button onclick="predict('A')"
class="flex-1 bg-yellow-600 p-2 rounded">
توقع الفريق الأول
</button>

<button onclick="predict('B')"
class="flex-1 bg-yellow-600 p-2 rounded">
توقع الفريق الثاني
</button>

</div>

<p id="prediction-status"
class="text-yellow-400 text-xs mt-2">
</p>

</div>

</div>


<script>

const tg = window.Telegram.WebApp

const WORKER_URL = "YOUR_WORKER_URL"


let uData = {balance:0}

let userPrediction = null


const TEAM_LOGOS = {

"barcelona":"https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg",

"real madrid":"https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg",

"manchester city":"https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg",

"manchester united":"https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg"

}



function getLogo(name){

const key = name.toLowerCase()

return TEAM_LOGOS[key] ||

"https://cdn-icons-png.flaticon.com/512/53/53283.png"

}



async function init(){

fetchMatch()

loadVotes()

setInterval(loadVotes,5000)

}



async function fetchMatch(){

const r = await fetch(`${WORKER_URL}/get-next-match`)

const m = await r.json()

if(!m.title) return

const t = m.title.split(/vs|ضد/i)

document.getElementById("team-a").innerText = t[0]

document.getElementById("team-b").innerText = t[1]

document.getElementById("logo-a").src = getLogo(t[0])

document.getElementById("logo-b").src = getLogo(t[1])

startTimer(m.startTime)

}



function startTimer(target){

setInterval(()=>{

const diff = target - Date.now()

if(diff<=0){

document.getElementById("match-timer").innerText="LIVE"

return

}

const m = Math.floor(diff/60000)

const s = Math.floor((diff%60000)/1000)

document.getElementById("match-timer").innerText = m+":"+s

},1000)

}



async function vote(team){

if(uData.balance <= 0){

tg.showAlert("يجب امتلاك DRGN للتصويت")

return

}

await fetch(`${WORKER_URL}/vote`,{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({team})

})

loadVotes()

}



async function loadVotes(){

const r = await fetch(`${WORKER_URL}/votes`)

const v = await r.json()

const total = v.A + v.B

const pa = total ? Math.round(v.A/total*100) : 50

const pb = 100 - pa

document.getElementById("vote-a-percent").innerText = pa+"%"

document.getElementById("vote-b-percent").innerText = pb+"%"

document.getElementById("vote-bar-a").style.width = pa+"%"

}



async function predict(team){

if(userPrediction){

tg.showAlert("لقد توقعت بالفعل")

return

}

const user = tg.initDataUnsafe.user || {id:0}

const r = await fetch(`${WORKER_URL}/predict`,{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

userId:user.id,

team:team

})

})

const res = await r.json()

if(res.status==="already"){

tg.showAlert("لقد توقعت مسبقاً")

return

}

userPrediction = team

document.getElementById("prediction-status").innerText="تم تسجيل توقعك"

}



init()

</script>

</body>
</html>
