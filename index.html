<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon VIP Pro | Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* بطاقات التنين */
        .dragon-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; position: relative; overflow: hidden; transition: all 0.3s ease; }
        .dragon-card:hover { border-color: #333; }
        
        /* التبويبات */
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* الأزرار والتنقل */
        .nav-btn { color: #444; transition: 0.3s; flex: 1; text-align: center; padding: 12px 0; border: none; background: none; outline: none; }
        .nav-btn.active { color: #ff4d4d; border-top: 3px solid #ff4d4d; background: linear-gradient(to bottom, rgba(255,77,77,0.1), transparent); }
        
        /* مؤشرات التحميل والبصريات */
        .loading-shimmer { background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; color: transparent !important; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .burn-bar { height: 100%; background: linear-gradient(90deg, #ff4d4d, #f97316); border-radius: 20px; box-shadow: 0 0 10px rgba(255,77,77,0.5); transition: width 1.5s ease; }
        .completed-task { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        
        /* تصميم المحفظة */
        .wallet-gradient { background: linear-gradient(135deg, #1a0000 0%, #050505 100%); border: 1px solid #300; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/95 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-600/30">
                <i class="fas fa-dragon text-white text-sm"></i>
            </div>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-[11px] font-black tracking-widest text-red-600 uppercase">Dragon App</h1>
        </div>
        <button onclick="toggleLang()" id="langBtn" class="text-[9px] font-black border border-white/10 px-4 py-2 rounded-full hover:bg-white/5 transition-all">EN</button>
    </header>

    <main class="p-4">
        
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p id="live-liq" class="text-sm font-black text-green-500 loading-shimmer">$---</p>
                </div>
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="القيمة السوقية" data-en="Market Cap">القيمة السوقية</p>
                    <p id="live-mcap" class="text-sm font-black loading-shimmer">$---</p>
                </div>
            </div>
            
            <div class="dragon-card p-6 border-t-2 border-red-600/40">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] text-gray-400 font-bold uppercase" data-ar="سعر التنين المباشر" data-en="Live Dragon Price">سعر التنين المباشر</span>
                    <span id="live-price" class="text-sm font-mono font-bold text-red-500 loading-shimmer">$---</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-orange-500 font-black uppercase" data-ar="العملات المحروقة" data-en="Tokens Burned">العملات المحروقة</span>
                        <span id="burn-text" class="text-[10px] font-black">458,291,000 (45.8%)</span>
                    </div>
                    <div class="w-full h-2.5 bg-white/5 rounded-full border border-white/5">
                        <div id="burn-progress" class="burn-bar" style="width: 45.8%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="trade" class="tab-content space-y-4">
            <div class="dragon-card p-6 border-orange-600/30 bg-orange-600/5">
                <div class="flex items-center gap-2 mb-5">
                    <i class="fas fa-shield-virus text-orange-500"></i>
                    <h3 class="text-[10px] font-black uppercase" data-ar="توصيات التداول الآمن" data-en="Safe Trade Protocol">توصيات التداول الآمن</h3>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-black/60 p-4 rounded-2xl border border-white/5">
                        <span class="text-[9px] text-gray-400 font-bold uppercase" data-ar="المبلغ المستحسن" data-en="Safe Buy">المبلغ المستحسن</span>
                        <span id="safe-buy" class="text-xs font-black text-green-500 loading-shimmer">$---</span>
                    </div>
                    <div class="flex justify-between items-center bg-black/60 p-4 rounded-2xl border border-white/5">
                        <span class="text-[9px] text-gray-400 font-bold uppercase">SLIPPAGE</span>
                        <span class="text-xs font-black text-white">12% - 15%</span>
                    </div>
                </div>
                <div class="mt-4 p-3 bg-red-600/10 rounded-xl border border-red-600/20">
                    <p class="text-[9px] text-gray-400 leading-relaxed italic" data-ar="⚠️ تنبيه: نظراً لحجم السيولة، يرجى الالتزام بالمبالغ المستحسنة." data-en="⚠️ Alert: Due to liquidity, stick to recommended buy limits."></p>
                </div>
            </div>
            <button onclick="tg.openLink('https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3')" class="w-full py-5 bg-white text-black rounded-2xl font-black text-[11px] uppercase tracking-wider active:scale-95 transition-transform shadow-2xl">Trade on PancakeSwap</button>
        </div>

        <div id="wallet" class="tab-content space-y-5">
            <div class="dragon-card wallet-gradient p-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <i class="fas fa-dragon text-8xl"></i>
                </div>
                <div class="relative z-10">
                    <div class="flex justify-between items-center mb-10">
                        <span class="bg-red-600 text-[8px] font-black px-3 py-1 rounded-full uppercase">Dragon VIP</span>
                        <i class="fas fa-wifi text-green-500 text-[8px] animate-pulse"> ONLINE</i>
                    </div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-1" data-ar="رصيد نقاط المهام" data-en="Task Points Balance">رصيد نقاط المهام</p>
                    <div class="flex items-baseline gap-2">
                        <h2 id="wallet-pts" class="text-5xl font-black tracking-tighter">0</h2>
                        <span class="text-sm text-yellow-500 font-black uppercase">Pts</span>
                    </div>
                </div>
            </div>
            
            <button onclick="shareReferral()" class="w-full py-4 dragon-card border-dashed border-red-600/50 flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fas fa-user-plus text-red-500"></i>
                <span class="text-[10px] font-black uppercase" data-ar="دعوة الأصدقاء" data-en="Invite Friends">دعوة الأصدقاء</span>
            </button>
            
            <div id="ton-connect-button" class="flex justify-center"></div>
        </div>

        <div id="missions" class="tab-content space-y-3">
            <div id="tasks-container" class="space-y-3"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-3 z-50 backdrop-blur-xl">
        <button onclick="showTab('home')" class="nav-btn active" id="n-home"><i class="fas fa-th-large text-sm mb-1"></i><p class="text-[8px] font-black uppercase" data-ar="الرئيسية" data-en="HOME">الرئيسية</p></button>
        <button onclick="showTab('missions')" class="nav-btn" id="n-missions"><i class="fas fa-bolt text-sm mb-1"></i><p class="text-[8px] font-black uppercase" data-ar="المهام" data-en="TASKS">المهام</p></button>
        <button onclick="showTab('trade')" class="nav-btn" id="n-trade"><i class="fas fa-sync text-sm mb-1"></i><p class="text-[8px] font-black uppercase" data-ar="تداول" data-en="TRADE">تداول</p></button>
        <button onclick="showTab('wallet')" class="nav-btn" id="n-wallet"><i class="fas fa-wallet text-sm mb-1"></i><p class="text-[8px] font-black uppercase" data-ar="المحفظة" data-en="WALLET">المحفظة</p></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const pool = "0x84606890ad8d13e5a092c25abe59e2ec8ade7805";
        
        // State Management
        let appData = {
            points: parseInt(localStorage.getItem('d_pts')) || 0,
            doneTasks: JSON.parse(localStorage.getItem('d_tasks')) || [],
            lang: localStorage.getItem('d_lang') || 'ar'
        };

        // 1. Fetch Real Stats
        async function updateMarketData() {
            try {
                const res = await fetch(`https://api.dexscreener.com/latest/dex/pools/bsc/${pool}`);
                const data = await res.json();
                
                if (data.pair) {
                    const p = data.pair;
                    const priceEl = document.getElementById('live-price');
                    const liqEl = document.getElementById('live-liq');
                    const mcapEl = document.getElementById('live-mcap');
                    const safeEl = document.getElementById('safe-buy');

                    [priceEl, liqEl, mcapEl, safeEl].forEach(el => el.classList.remove('loading-shimmer'));

                    priceEl.innerText = `$${parseFloat(p.priceUsd).toFixed(10)}`;
                    liqEl.innerText = `$${parseFloat(p.liquidity.usd).toLocaleString()}`;
                    mcapEl.innerText = `$${parseFloat(p.fdv).toLocaleString()}`;
                    
                    const safeVal = parseFloat(p.liquidity.usd) * 0.03;
                    safeEl.innerText = `$${safeVal.toFixed(2)}`;
                }
            } catch (e) { console.error("Update failed"); }
        }

        // 2. Real-Time Mission System
        async function loadMissions() {
            const container = document.getElementById('tasks-container');
            const sources = [
                {id: 'X', url: "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json", icon: 'twitter'},
                {id: 'TikTok', url: "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json", icon: 'tiktok'}
            ];
            
            container.innerHTML = '<p class="text-center text-[10px] py-10 opacity-50">Fetching Missions...</p>';
            
            let allItems = [];
            for (let s of sources) {
                try {
                    const res = await fetch(s.url);
                    const d = await res.json();
                    d.items.slice(0, 3).forEach((item, i) => {
                        allItems.push({ ...item, platform: s.id, icon: s.icon, taskId: btoa(item.link).substring(0, 10) });
                    });
                } catch(e) {}
            }

            container.innerHTML = '';
            allItems.forEach(task => {
                const isCompleted = appData.doneTasks.includes(task.taskId);
                container.innerHTML += `
                    <div class="dragon-card p-4 flex justify-between items-center border-l-4 ${isCompleted ? 'border-gray-800' : 'border-red-600'} ${isCompleted ? 'completed-task' : ''}">
                        <div class="flex items-center gap-4">
                            <i class="fab fa-${task.icon} ${isCompleted ? 'text-gray-600' : 'text-red-500'} text-lg"></i>
                            <div>
                                <p class="text-[10px] font-black uppercase">${task.platform} MISSION</p>
                                <p class="text-[8px] text-yellow-500 font-bold">+1,000 PTS</p>
                            </div>
                        </div>
                        <button onclick="executeTask('${task.taskId}', '${task.link}')" class="px-6 py-2 rounded-xl text-[9px] font-black uppercase ${isCompleted ? 'bg-black text-gray-600' : 'bg-white text-black shadow-lg'}">
                            ${isCompleted ? 'DONE' : 'GO'}
                        </button>
                    </div>`;
            });
        }

        function executeTask(id, url) {
            if (appData.doneTasks.includes(id)) return;
            tg.openLink(url);
            
            tg.showConfirm("Did you complete the mission?", (ok) => {
                if (ok) {
                    tg.showScanQrPopup({ text: "Verifying Task Status..." });
                    setTimeout(() => {
                        tg.closeScanQrPopup();
                        appData.points += 1000;
                        appData.doneTasks.push(id);
                        saveAppData();
                        updateUI();
                        tg.HapticFeedback.notificationOccurred('success');
                    }, 3000);
                }
            });
        }

        // 3. UI & Localization
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
            if(id === 'missions') loadMissions();
        }

        function toggleLang() {
            appData.lang = appData.lang === 'ar' ? 'en' : 'ar';
            saveAppData();
            updateUI();
        }

        function updateUI() {
            const isAr = appData.lang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
            document.getElementById('wallet-pts').innerText = appData.points.toLocaleString();
        }

        function saveAppData() {
            localStorage.setItem('d_pts', appData.points);
            localStorage.setItem('d_tasks', JSON.stringify(appData.doneTasks));
            localStorage.setItem('d_lang', appData.lang);
        }

        function shareReferral() {
            const uid = tg.initDataUnsafe?.user?.id || "000";
            const url = `https://t.me/share/url?url=https://t.me/YourBot?start=${uid}&text=Join%20Dragon%20VIP%20and%20earn%20points!%20🐲`;
            tg.openTelegramLink(url);
        }

        // Init
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/test/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        tg.expand();
        updateUI();
        updateMarketData();
        loadMissions();
        setInterval(updateMarketData, 30000);
    </script>
</body>
</html>
