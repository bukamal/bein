<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Stadium Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>/* نفس التنسيقات السابقة */</style>
</head>
<body class="pb-24">
    <!-- نفس الهيكل مع إزالة قسم txCount -->
    <header>...</header>
    <main class="p-4 space-y-6">
        <!-- تبويب المباريات -->
        <section id="home" class="tab-content active space-y-4">
            <div id="match-loader" class="hidden space-y-4">...</div>
            <div id="match-container" class="space-y-4"></div>
        </section>

        <!-- تبويب الدوري -->
        <section id="league" class="tab-content space-y-4">
            <div class="dragon-card p-5 border-red-900/30">
                <h2 id="leaderboard-title" class="text-center text-red-600 font-black italic mb-4">قائمة المتصدرين</h2>
                <div id="lb-list" class="space-y-2"></div>
            </div>
        </section>

        <!-- تبويب المتجر -->
        <section id="store" class="tab-content space-y-4">
            <div class="dragon-card p-5 border-purple-900/30">
                <h2 class="text-center text-purple-600 font-black italic mb-4">المتجر</h2>
                <div id="store-items" class="space-y-3"></div>
            </div>
        </section>

        <!-- تبويب الحساب (بدون txCount) -->
        <section id="account" class="tab-content space-y-4">
            <div class="dragon-card p-6 text-center relative overflow-hidden">...</div>
            <div class="grid grid-cols-2 gap-4">...</div>

            <!-- عرض الرصيد الحقيقي فقط (بدون txCount) -->
            <div class="dragon-card p-4 text-center">
                <p class="text-[8px] text-zinc-500 font-bold uppercase">الرصيد الحقيقي (Token)</p>
                <p id="token-balance-display" class="text-lg font-black mt-1 text-blue-500">0</p>
                <button onclick="showConvertModal()" class="mt-2 w-full py-2 bg-blue-600 text-white text-[9px] font-black rounded-lg active:scale-95 transition-all">
                    <i class="fas fa-exchange-alt ml-1"></i> تحويل إلى رصيد اللعبة
                </button>
            </div>

            <!-- نظام الإحالة -->
            <div class="dragon-card p-5 border-blue-600/30">...</div>

            <button id="claim-btn" onclick="claimRewards()" class="w-full py-4 bg-red-600 text-white font-black rounded-2xl shadow-xl shadow-red-900/40 active:scale-95 transition-all">سحب المكافآت</button>

            <div class="dragon-card p-5 space-y-3">
                <p id="connect-wallet-label" class="text-[9px] text-zinc-500 font-bold text-center italic">ربط محفظة BSC لتحديث الرتبة والرصيد</p>
                <input id="bsc-address" type="text" placeholder="0x..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-xs text-center outline-none focus:border-red-600 transition-all">
                <button onclick="updateWallet()" id="update-wallet-btn" class="w-full py-3 bg-white text-black text-[11px] font-black rounded-xl uppercase active:scale-95 transition-all">تحديث المحفظة</button>

                <div class="flex gap-2 mt-2">
                    <button onclick="openBuyLink()" class="flex-1 py-3 bg-yellow-600 text-white text-[11px] font-black rounded-xl uppercase active:scale-95 transition-all">
                        <i class="fas fa-shopping-cart ml-1"></i> اشترِ DRGN
                    </button>
                </div>
                <div id="price-container" class="text-center text-[9px] text-zinc-500 mt-2 hidden">
                    السعر الحالي: <span id="drgn-price">...</span> USD
                </div>
            </div>
        </section>
    </main>

    <!-- نافذة تحويل الرصيد (اختياري) -->
    <div id="convert-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">...</div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-xl border-t border-white/5 flex justify-around p-3 z-[100]">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center"><i class="fas fa-gamepad text-xl mb-1"></i><span id="nav-stadium">الملعب</span></button>
        <button onclick="showTab('league')" class="nav-btn flex-1 flex flex-col items-center"><i class="fas fa-trophy text-xl mb-1"></i><span id="nav-league">الدوري</span></button>
        <button onclick="showTab('store')" class="nav-btn flex-1 flex flex-col items-center"><i class="fas fa-store text-xl mb-1"></i><span id="nav-store">المتجر</span></button>
        <button onclick="showTab('account')" class="nav-btn flex-1 flex flex-col items-center"><i class="fas fa-wallet text-xl mb-1"></i><span id="nav-account">الحساب</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://your-worker.workers.dev"; // <-- عدّل هنا
        let initDataStr = "";
        let currentLang = "ar";
        let storeItems = [];

        const translations = {
            ar: {
                headerTitle: "Dragon Stadium",
                onlineHub: "Online Hub",
                totalAssets: "إجمالي الأصول",
                gameWallet: "محفظة اللعبة",
                pending: "معلق",
                claimRewards: "سحب المكافآت",
                connectWallet: "ربط محفظة BSC لتحديث الرتبة والرصيد",
                updateWallet: "تحديث المحفظة",
                leaderboardTitle: "قائمة المتصدرين",
                navStadium: "الملعب",
                navLeague: "الدوري",
                navStore: "المتجر",
                navAccount: "الحساب"
            },
            en: { /* ... */ }
        };

        async function apiReq(path, method = 'GET', body = null) {
            if (!initDataStr) initDataStr = tg.initData || '';
            const options = { 
                method, 
                headers: { 
                    'Content-Type': 'application/json',
                    'x-telegram-init-data': initDataStr
                } 
            };
            if (body) options.body = JSON.stringify(body);
            const r = await fetch(API + path, options);
            return await r.json();
        }

        function applyTranslations() { /* ... */ }

        async function init() {
            tg.ready(); tg.expand();
            initDataStr = tg.initData || '';
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            const syncUrl = ref ? `/sync?ref=${ref}` : '/sync';
            const r = await apiReq(syncUrl, 'POST');
            if (r.success) renderUser(r.user);
            loadMatches();
            loadLeaderboard();
            fetchPrice();
            loadReferralData();
            applyTranslations();
        }

        function renderUser(u) {
            document.getElementById('total-balance').innerText = Math.floor((u.gameBalance || 0) + (u.tokenBalance || 0) + (u.pendingRewards || 0)).toLocaleString();
            document.getElementById('game-balance').innerText = Math.floor(u.gameBalance || 0).toLocaleString();
            document.getElementById('pending-rewards').innerText = Math.floor(u.pendingRewards || 0).toLocaleString();
            document.getElementById('rank-name').innerText = `${u.rank} MEMBER`;
            document.getElementById('token-balance-display').innerText = Math.floor(u.tokenBalance || 0).toLocaleString();
            if (u.wallet) document.getElementById('bsc-address').value = u.wallet;
        }

        async function loadMatches() { /* كما كانت سابقاً */ }
        async function vote(id, side, time) {
            tg.MainButton.setText(currentLang === 'ar' ? "جاري إرسال التصويت (1000 DRGN)..." : "Sending vote (1000 DRGN)...").show();
            const r = await apiReq('/vote', 'POST', { matchId: id, voteFor: side, matchTime: time });
            tg.MainButton.hide();
            if (r.success) {
                tg.HapticFeedback.notificationOccurred('success');
                const v = document.getElementById(`v-${id}`);
                if (v) v.innerHTML = `<div class="col-span-3 py-2 text-center text-green-500 font-black italic text-xs animate-bounce">تم تسجيل التصويت ✓</div>`;
            } else {
                tg.showAlert(r.message || "خطأ");
            }
        }

        async function updateWallet() { /* كما كانت */ }
        async function claimRewards() { /* كما كانت */ }
        async function loadLeaderboard() { /* كما كانت */ }
        async function loadReferralData() { /* كما كانت */ }
        function copyReferralLink() { /* كما كانت */ }
        async function loadStoreItems() { /* كما كانت */ }
        async function purchaseItem(itemId) { /* كما كانت مع التحقق المحلي */ }

        // دوال التحويل
        function showConvertModal() {
            const available = parseInt(document.getElementById('token-balance-display').innerText.replace(/,/g, '')) || 0;
            document.getElementById('available-token').innerText = available.toLocaleString();
            document.getElementById('convert-modal').classList.remove('hidden');
            document.getElementById('convert-modal').classList.add('flex');
        }
        function hideConvertModal() {
            document.getElementById('convert-modal').classList.add('hidden');
            document.getElementById('convert-modal').classList.remove('flex');
        }
        async function convertToGame() {
            const amount = parseInt(document.getElementById('convert-amount').value);
            if (!amount || amount <= 0) {
                tg.showAlert(currentLang === 'ar' ? "الرجاء إدخال كمية صحيحة" : "Please enter a valid amount");
                return;
            }
            const available = parseInt(document.getElementById('token-balance-display').innerText.replace(/,/g, '')) || 0;
            if (amount > available) {
                tg.showAlert(currentLang === 'ar' ? "الكمية أكبر من الرصيد المتاح" : "Amount exceeds available balance");
                return;
            }
            tg.MainButton.setText(currentLang === 'ar' ? "جاري التحويل..." : "Converting...").show();
            const r = await apiReq('/convert-to-game', 'POST', { amount });
            tg.MainButton.hide();
            if (r.success) {
                renderUser(r.user);
                hideConvertModal();
                tg.showAlert(currentLang === 'ar' ? "✅ تم التحويل بنجاح!" : "✅ Conversion successful!");
            } else {
                tg.showAlert(r.message || (currentLang === 'ar' ? "فشل التحويل" : "Conversion failed"));
            }
        }

        function openBuyLink() { /* كما كانت */ }
        async function fetchPrice() { /* كما كانت */ }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const activeBtn = document.querySelector(`button[onclick="showTab('${id}')"]`);
            if (activeBtn) activeBtn.classList.add('active');
            if (id === 'league') loadLeaderboard();
            else if (id === 'store') loadStoreItems();
            else if (id === 'account') loadReferralData();
        }

        function toggleLang() { /* كما كانت */ }

        init();
    </script>
</body>
</html>
