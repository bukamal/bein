<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin - Live Missions</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 1000; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; border: 1px dashed #444; }
        .nav-btn.active { color: #ff4d4d; }
        .burn-fill { background: linear-gradient(90deg, #ff4d4d, #991b1b); width: 15.5%; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white text-sm"></i>
            </div>
            <h1 class="text-xs font-black italic uppercase">DRAGON<span class="text-red-600">COIN</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-bold bg-white/5 px-2.5 py-1.5 rounded border border-white/10 uppercase" id="langBtn">EN</button>
            <div class="text-right">
                <p id="pointsHeader" class="text-sm font-black text-white">0</p>
                <p id="rankLabel" class="text-[8px] text-yellow-500 font-bold uppercase tracking-widest">RANK: EGG</p>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6">
        <div id="home-tab" class="tab-content active space-y-6">
            
            <div class="bg-red-600/10 border border-red-600/30 p-4 rounded-2xl flex gap-3 items-start animate-pulse">
                <i class="fas fa-shield-alt text-red-500 mt-1"></i>
                <div class="text-[10px] text-gray-300 leading-relaxed">
                    <b class="text-red-500 block mb-1 uppercase" data-ar="تنبيه الأمان" data-en="Security Alert">تنبيه الأمان</b>
                    <span data-ar="اضبط الانزلاق 15%+. الشراء بمبالغ صغيرة ($1-$2)." data-en="Set Slippage 15%+. Buy with small amounts ($1-$2).">اضبط الانزلاق 15%+. الشراء بمبالغ صغيرة ($1-$2).</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="dragon-card p-4 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold" data-ar="السعر" data-en="Price">السعر</p>
                    <p class="text-sm font-black text-green-500 font-mono">$0.000000412</p>
                </div>
                <div class="dragon-card p-4 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p class="text-sm font-black text-white font-mono">$41</p>
                </div>
            </div>

            <section>
                <h3 class="text-blue-400 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-widest"><i class="fab fa-twitter"></i> X Missions</h3>
                <div id="x-tasks" class="space-y-3">
                    <div class="text-center py-4 text-[9px] text-gray-600 loading-dots" data-ar="جاري جلب مهام تويتر" data-en="Fetching X Missions">جاري جلب مهام تويتر</div>
                </div>
            </section>

            <section>
                <h3 class="text-pink-500 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-widest"><i class="fab fa-tiktok"></i> TikTok Missions</h3>
                <div id="tk-tasks" class="space-y-3">
                    <div class="text-center py-4 text-[9px] text-gray-600 loading-dots" data-ar="جاري جلب مهام تيك توك" data-en="Fetching TikTok Missions">جاري جلب مهام تيك توك</div>
                </div>
            </section>
        </div>

        <div id="wallet-tab" class="tab-content">
            <div class="dragon-card p-10 rounded-[2.5rem] text-center">
                <i class="fas fa-wallet text-4xl mb-4 text-gray-800"></i>
                <h2 class="text-xl font-black mb-2 uppercase italic" data-ar="المحفظة" data-en="Wallet">المحفظة</h2>
                <p id="walletDisplay" class="text-[10px] text-gray-500 mb-8 truncate" data-ar="غير مربوطة" data-en="Not Connected">غير مربوطة</p>
                <button onclick="connectWallet()" class="w-full bg-white text-black py-4 rounded-2xl text-xs font-black uppercase">Connect Wallet</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 active" id="btn-home"><i class="fas fa-bolt"></i><span class="text-[8px] font-bold uppercase">Missions</span></button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-600" id="btn-wallet"><i class="fas fa-wallet"></i><span class="text-[8px] font-bold uppercase">Wallet</span></button>
    </nav>

    <div id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentLang = localStorage.getItem('lang') || 'ar';
        let points = parseInt(localStorage.getItem('pts')) || 0;
        let doneTasks = JSON.parse(localStorage.getItem('done')) || [];

        const RSS_X = "https://rss.app/feeds/tYaEQs8TqBTzCA29.xml";
        const RSS_TK = "https://rss.app/feeds/L4M8dUSeMhVKhLS2.xml";

        async function init() {
            document.getElementById('pointsHeader').innerText = points.toLocaleString();
            document.getElementById('rankLabel').innerText = points >= 10000 ? (currentLang==='ar'?"رتبة: تنين":"RANK: DRAGON") : (currentLang==='ar'?"رتبة: بيضة":"RANK: EGG");
            updateLanguageUI();
            
            // محرك الجلب المباشر (تجاوز السيرفر)
            fetchMissions('x', RSS_X, 'x-tasks');
            fetchMissions('tk', RSS_TK, 'tk-tasks');
        }

        async function fetchMissions(platform, url, containerId) {
            const container = document.getElementById(containerId);
            try {
                // نستخدم محول عام مستقر جداً
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&api_key=yh7k0p8j5m2n4q6s8t9v&t=${Date.now()}`);
                const data = await response.json();
                
                if (data.status === 'ok' && data.items.length > 0) {
                    container.innerHTML = ''; // مسح جملة التحميل
                    data.items.slice(0, 4).forEach((item, index) => {
                        const taskId = `${platform}_${item.guid || index}`;
                        const isDone = doneTasks.includes(taskId);
                        const icon = platform === 'x' ? 'fab fa-twitter text-blue-400' : 'fab fa-tiktok text-pink-500';
                        const titleText = currentLang === 'ar' ? `دعم منشور جديد #${index+1}` : `Support New Post #${index+1}`;

                        container.innerHTML += `
                            <div class="dragon-card p-4 rounded-2xl flex justify-between items-center ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <i class="${icon} text-lg"></i>
                                    <div>
                                        <p class="text-[10px] font-bold">${titleText}</p>
                                        <p class="text-[9px] text-yellow-500 font-black">+1,000 PTS</p>
                                    </div>
                                </div>
                                <button onclick="doTask('${taskId}', 1000, '${item.link}')" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg uppercase">GO</button>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<div class="text-center py-4 text-[9px] text-gray-600">NO ACTIVE MISSIONS</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="text-center py-4 text-[9px] text-gray-600 italic">Offline...</div>';
            }
        }

        function doTask(id, reward, url) {
            window.open(url, '_blank');
            showToast(currentLang === 'ar' ? "جاري التحقق..." : "Verifying...");
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('pts', points);
                    localStorage.setItem('done', JSON.stringify(doneTasks));
                    init();
                    showToast("+1,000 PTS! 🔥");
                }
            }, 5000);
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            init();
        }

        function updateLanguageUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-600'));
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('btn-' + t).classList.remove('text-gray-600').classList.add('active');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function connectWallet() {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletDisplay').innerText = accs[0];
                showToast("Connected!");
            } else { showToast("Use DApp Browser"); }
        }

        init();
        tg.expand();
    </script>
</body>
</html>
