<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dragon Sports</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
margin:0;
padding:20px;
}

.card{
background:#111;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

button{
background:#ff3b3b;
border:none;
padding:12px;
width:100%;
color:#fff;
border-radius:10px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.rank{
color:gold;
font-weight:bold;
}

</style>

</head>

<body>

<h2>🐉 Dragon VIP</h2>

<div class="card">

رصيد النقاط

<h1 id="points">0</h1>

<div id="rank">BRONZE</div>

</div>

<div class="card">

<input id="wallet" placeholder="BSC Wallet 0x...">

<button onclick="verify()">
تحقق من العضوية
</button>

</div>

<div class="card">

<h3>🏆 Leaderboard</h3>

<div id="leaders"></div>

</div>

<script>

const tg = window.Telegram.WebApp;

const API="PUT_WORKER_URL_HERE";

let user;

async function init(){

const u=tg.initDataUnsafe.user || {id:1,first_name:"Player"};

const res=await fetch(API+"/sync",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userId:u.id,

username:u.first_name

})

});

user=await res.json();

render();

loadLeaders();

}

function render(){

document.getElementById("points").innerText=user.balance || 0;

document.getElementById("rank").innerText=user.rank;

}

async function verify(){

const wallet=document.getElementById("wallet").value;

if(wallet.length<40){

tg.showAlert("Wallet wrong");

return;

}

const res=await fetch(API+"/check-balance",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

walletAddress:wallet,

userId:tg.initDataUnsafe.user.id,

username:tg.initDataUnsafe.user.first_name

})

});

const data=await res.json();

if(data.error){

tg.showAlert(data.error);

return;

}

user=data;

render();

tg.showAlert("Rank: "+data.rank);

}

async function loadLeaders(){

const res=await fetch(API+"/leaderboard");

const list=await res.json();

let html="";

list.forEach((p,i)=>{

html+=`<div>

${i+1}. ${p.username} — ${Math.floor(p.balance)}

</div>`;

});

document.getElementById("leaders").innerHTML=html;

}

tg.expand();

init();

</script>

</body>

</html>
