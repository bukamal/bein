<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin - Live Auto Missions</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 1000; transition: 0.3s; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; border: 1px dashed #444; }
        .nav-btn.active { color: #ff4d4d; }
        .loading-shimmer { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white text-sm"></i>
            </div>
            <h1 class="text-xs font-black italic uppercase">DRAGON<span class="text-red-600">COIN</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-bold bg-white/5 px-2.5 py-1.5 rounded border border-white/10 uppercase" id="langBtn">EN</button>
            <div class="text-right">
                <p id="pointsHeader" class="text-sm font-black text-white">0</p>
                <p id="rankLabel" class="text-[8px] text-yellow-500 font-bold uppercase tracking-widest">RANK: EGG</p>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6">
        <div id="home-tab" class="tab-content active space-y-6">
            
            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="dragon-card p-4 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold" data-ar="السعر" data-en="Price">السعر</p>
                    <p class="text-sm font-black text-green-500 font-mono">$0.000000412</p>
                </div>
                <div class="dragon-card p-4 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p class="text-sm font-black text-white font-mono">$41</p>
                </div>
            </div>

            <section>
                <h3 class="text-blue-400 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-widest"><i class="fab fa-twitter"></i> X Auto-Tasks</h3>
                <div id="x-tasks" class="space-y-3">
                    <div class="h-20 rounded-2xl loading-shimmer opacity-10"></div>
                    <div class="h-20 rounded-2xl loading-shimmer opacity-10"></div>
                </div>
            </section>

            <section>
                <h3 class="text-pink-500 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-widest"><i class="fab fa-tiktok"></i> TikTok Auto-Tasks</h3>
                <div id="tk-tasks" class="space-y-3">
                    <div class="h-20 rounded-2xl loading-shimmer opacity-10"></div>
                    <div class="h-20 rounded-2xl loading-shimmer opacity-10"></div>
                </div>
            </section>
        </div>

        <div id="wallet-tab" class="tab-content">
            <div class="dragon-card p-10 rounded-[2.5rem] text-center">
                <i class="fas fa-wallet text-4xl mb-4 text-gray-800"></i>
                <h2 class="text-xl font-black mb-2 uppercase italic">Wallet</h2>
                <button class="w-full bg-white text-black py-4 rounded-2xl text-xs font-black uppercase">Coming Soon</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 active" id="btn-home"><i class="fas fa-fire"></i><span class="text-[8px] font-bold uppercase">Missions</span></button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-600" id="btn-wallet"><i class="fas fa-wallet"></i><span class="text-[8px] font-bold uppercase">Wallet</span></button>
    </nav>

    <div id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentLang = localStorage.getItem('lang') || 'ar';
        let points = parseInt(localStorage.getItem('pts')) || 0;
        let doneTasks = JSON.parse(localStorage.getItem('done')) || [];

        const RSS_X = "https://rss.app/feeds/tYaEQs8TqBTzCA29.xml";
        const RSS_TK = "https://rss.app/feeds/L4M8dUSeMhVKhLS2.xml";

        async function init() {
            document.getElementById('pointsHeader').innerText = points.toLocaleString();
            updateLanguageUI();
            
            // جلب المهام باستخدام وسيط "AllOrigins" لتجاوز الحظر
            fetchWithProxy('x', RSS_X, 'x-tasks');
            fetchWithProxy('tk', RSS_TK, 'tk-tasks');
        }

        async function fetchWithProxy(platform, rssUrl, containerId) {
            const container = document.getElementById(containerId);
            try {
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;
                // استخدام وسيط AllOrigins لكسر حماية CORS
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                if (data.status === 'ok' && data.items.length > 0) {
                    container.innerHTML = '';
                    data.items.slice(0, 4).forEach((item, index) => {
                        const taskId = `${platform}_${item.guid || index}`;
                        const isDone = doneTasks.includes(taskId);
                        const icon = platform === 'x' ? 'fab fa-twitter text-blue-400' : 'fab fa-tiktok text-pink-500';
                        
                        container.innerHTML += `
                            <div class="dragon-card p-4 rounded-2xl flex justify-between items-center mb-3 ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <i class="${icon} text-lg"></i>
                                    <div>
                                        <p class="text-[10px] font-bold">${currentLang === 'ar' ? 'مهمة جديدة' : 'New Mission'}</p>
                                        <p class="text-[9px] text-yellow-500 font-black">+1,000 PTS</p>
                                    </div>
                                </div>
                                <button onclick="doTask('${taskId}', 1000, '${item.link}')" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg uppercase">GO</button>
                            </div>`;
                    });
                } else {
                    container.innerHTML = '<div class="text-center py-4 text-[9px] text-gray-600 uppercase italic">No Missions Found</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="text-center py-4 text-[9px] text-gray-600 italic">Connection Error...</div>';
            }
        }

        function doTask(id, reward, url) {
            window.open(url, '_blank');
            showToast(currentLang === 'ar' ? "تحقق خلال 5 ثوانٍ..." : "Verifying...");
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('pts', points);
                    localStorage.setItem('done', JSON.stringify(doneTasks));
                    init();
                    showToast("+1,000 PTS! 🔥");
                }
            }, 5000);
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            init();
        }

        function updateLanguageUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-600'));
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('btn-' + t).classList.remove('text-gray-600').classList.add('active');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
        tg.expand();
    </script>
</body>
</html>
