<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Sports Stadium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; user-select: none; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #0a0a0a, #020202); border: 1px solid #151515; border-radius: 28px; }
        .tab-content { display: none; animation: slideUp 0.3s ease-out; padding-bottom: 120px; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #ff3333; filter: drop-shadow(0 0 8px rgba(255,51,51,0.5)); border-top: 2px solid #ff3333; }
        .is-default { color: #444 !important; font-style: italic; }
        .logo-glow { filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-dragon text-5xl text-red-600 animate-bounce mb-4"></i>
            <p class="text-[10px] font-black tracking-[0.3em] text-white/50 uppercase">Loading Stadium</p>
        </div>
    </div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600 text-xl"></i>
            <span style="font-family: 'Orbitron';" class="text-[10px] font-black tracking-widest text-white">DRAGON STADIUM</span>
        </div>
        <div class="px-3 py-1 bg-red-600/20 rounded-full text-[8px] font-black text-red-500 border border-red-600/30 uppercase">Live Feed</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div id="match-container" class="grid gap-4"></div>
            <button onclick="tg.openLink('https://pancakeswap.finance/swap')" class="w-full py-5 bg-gradient-to-r from-yellow-600 to-yellow-400 text-black rounded-2xl text-[11px] font-black uppercase shadow-lg shadow-yellow-600/20">Buy $DRGN Token 👑</button>
        </div>

        <div id="leaderboard" class="tab-content space-y-2">
            <div id="lb-list" class="space-y-2"></div>
        </div>

        <div id="wallet" class="tab-content space-y-4">
            <div class="dragon-card p-10 text-center">
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-3">Balance</p>
                <h2 id="user-balance" class="text-5xl font-black text-white italic tracking-tighter">0</h2>
                <p id="rank-name" class="text-[10px] text-red-600 font-black mt-3 tracking-[0.2em] uppercase">Checking Rank...</p>
                <div class="mt-10 space-y-4">
                    <input id="bsc-address" type="text" placeholder="BSC Wallet Address" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-[10px] text-center outline-none focus:border-red-600 transition-all">
                    <button onclick="verify()" class="w-full py-4 bg-white text-black text-[10px] font-black rounded-2xl uppercase">Update Stats</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home"><i class="fas fa-gamepad text-xl mb-1"></i><span class="text-[8px] font-black uppercase">Home</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex-1 flex flex-col items-center" id="n-leaderboard"><i class="fas fa-trophy text-xl mb-1"></i><span class="text-[8px] font-black uppercase">League</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet"><i class="fas fa-user-astronaut text-xl mb-1"></i><span class="text-[8px] font-black uppercase">Account</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        let uData = { balance: 0, rank: 'BRONZE' };

        async function init() {
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'Player' };
            try {
                const res = await fetch(`${WORKER_URL}/sync`, { 
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: user.id, username: user.username, firstName: user.first_name }) 
                });
                uData = await res.json();
                render();
                fetchMatches();
            } catch(e) {}
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
        }

        async function fetchMatches() {
            try {
                const res = await fetch(`${WORKER_URL}/get-matches`);
                const matches = await res.json();
                const container = document.getElementById('match-container');
                if (matches.length === 0) {
                    container.innerHTML = '<div class="py-20 text-center opacity-20 text-[10px] font-black uppercase tracking-widest">No Matches Live</div>';
                    return;
                }
                container.innerHTML = matches.map(m => `
                    <div class="dragon-card overflow-hidden border ${m.isLive ? 'border-red-600/40 animate-pulse' : 'border-white/5'}">
                        <div class="bg-white/5 px-4 py-2 flex justify-between items-center">
                            <span class="text-[7px] font-black text-red-500 uppercase tracking-tighter">${m.league}</span>
                            <span class="text-[7px] font-bold text-zinc-500 uppercase">${m.isLive ? 'In Play' : 'Scheduled'}</span>
                        </div>
                        <div class="p-6 flex items-center justify-around">
                            <div class="text-center w-24">
                                <img src="${m.logoA}" class="w-12 h-12 mx-auto mb-3 object-contain logo-glow">
                                <p class="text-[9px] font-black uppercase truncate">${m.teamA}</p>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-[10px] font-black italic text-zinc-800 mb-1">VS</span>
                                <span class="text-[11px] font-mono font-bold">${new Date(m.time).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="text-center w-24">
                                <img src="${m.logoB}" class="w-12 h-12 mx-auto mb-3 object-contain logo-glow">
                                <p class="text-[9px] font-black uppercase truncate">${m.teamB}</p>
                            </div>
                        </div>
                        <div class="px-6 pb-6">
                            ${m.canVote ? `
                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="castVote('${m.id}', 'A')" class="py-3 bg-red-600 rounded-xl text-[9px] font-black uppercase active:scale-95 transition-all">Win ${m.teamA}</button>
                                    <button onclick="castVote('${m.id}', 'B')" class="py-3 bg-blue-600 rounded-xl text-[9px] font-black uppercase active:scale-95 transition-all">Win ${m.teamB}</button>
                                </div>
                            ` : `
                                <div class="py-3 bg-zinc-900/50 text-center rounded-xl text-[8px] text-zinc-600 font-black uppercase tracking-widest">
                                    ${m.isLive ? 'Voting Closed' : 'Voting Opens 1H Before'}
                                </div>
                            `}
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        async function verify() {
            const addr = document.getElementById('bsc-address').value;
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'Player' };
            if (addr.length < 42) return tg.showAlert("Invalid Address");
            try {
                const res = await fetch(`${WORKER_URL}/check-balance`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ walletAddress: addr, userId: user.id, username: user.username, firstName: user.first_name })
                });
                uData = await res.json();
                render();
                tg.showAlert(`✅ Profile Updated: ${uData.username}`);
            } catch(e) { tg.showAlert("Network Error"); }
        }

        async function loadLB() {
            const list = document.getElementById('lb-list');
            try {
                const res = await fetch(`${WORKER_URL}/leaderboard`);
                const data = await res.json();
                list.innerHTML = data.map((u, i) => `
                    <div class="dragon-card p-4 flex justify-between items-center border ${u.userId == tg.initDataUnsafe.user?.id ? 'border-red-600/50 bg-red-600/5' : 'border-white/5'}">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-zinc-700">#${i+1}</span>
                            <span class="text-xs font-bold ${u.isDefault ? 'is-default' : ''}">${u.username}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-red-500">${Math.floor(u.balance).toLocaleString()}</p>
                            <p class="text-[7px] text-zinc-600 font-bold uppercase tracking-tighter">${u.rank}</p>
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'leaderboard') loadLB();
        }

        function render() {
            document.getElementById('user-balance').innerText = Math.floor(uData.balance || 0).toLocaleString();
            document.getElementById('rank-name').innerText = (uData.rank || 'BRONZE') + " MEMBER";
        }

        init();
        tg.expand();
    </script>
</body>
</html>
