<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon VIP Pro | Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; position: relative; overflow: hidden; transition: all 0.3s ease; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-btn { color: #444; transition: 0.3s; flex: 1; text-align: center; padding: 12px 0; border: none; background: none; outline: none; }
        .nav-btn.active { color: #ff4d4d; border-top: 3px solid #ff4d4d; background: linear-gradient(to bottom, rgba(255,77,77,0.1), transparent); }
        
        .loading-shimmer { background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; color: transparent !important; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #app-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader-dragon { font-size: 50px; animation: pulse 1.5s infinite; color: #ff4d4d; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }

        .wallet-gradient { background: linear-gradient(135deg, #1a0000 0%, #050505 100%); border: 1px solid #300; }
        
        .swap-btn { background: linear-gradient(90deg, #f3ba2f, #f0b90b); color: #000; font-weight: 900; box-shadow: 0 4px 15px rgba(243, 186, 47, 0.3); }
    </style>
</head>
<body>

    <div id="app-loader">
        <i class="fas fa-dragon loader-dragon"></i>
        <p class="mt-4 text-[10px] font-black tracking-widest uppercase text-gray-500">جاري المزامنة مع شبكة التنين...</p>
    </div>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/95 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-600/30">
                <i class="fas fa-dragon text-white text-sm"></i>
            </div>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-[11px] font-black tracking-widest text-red-600 uppercase">Dragon App</h1>
        </div>
        <button onclick="toggleLang()" id="langBtn" class="text-[9px] font-black border border-white/10 px-4 py-2 rounded-full">EN</button>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p id="live-liq" class="text-sm font-black text-green-500 loading-shimmer">$---</p>
                </div>
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase mb-1" data-ar="القيمة السوقية" data-en="Market Cap">القيمة السوقية</p>
                    <p id="live-mcap" class="text-sm font-black loading-shimmer">$---</p>
                </div>
            </div>
            
            <div class="dragon-card p-6 border-t-2 border-red-600/40">
                <div class="flex justify-between items-center mb-6 text-[10px] font-bold uppercase">
                    <span data-ar="سعر التنين" data-en="Dragon Price">سعر التنين</span>
                    <span id="live-price" class="text-sm font-mono text-red-500 loading-shimmer">$---</span>
                </div>
                <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden mb-6">
                    <div id="price-bar" class="h-full bg-red-600 shadow-[0_0_10px_#dc2626] transition-all duration-500" style="width: 50%;"></div>
                </div>

                <button onclick="openSwapWithWarning()" class="w-full py-4 rounded-2xl swap-btn flex items-center justify-center gap-2 transition-transform active:scale-95">
                    <i class="fas fa-exchange-alt"></i>
                    <span data-ar="تداول الآن على PancakeSwap" data-en="Trade on PancakeSwap">تداول الآن على PancakeSwap</span>
                </button>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="dragon-card p-3 text-center">
                    <p class="text-[7px] text-gray-500 uppercase" data-ar="تغير 24س" data-en="24h Change">تغير 24س</p>
                    <p id="change-24h" class="text-[10px] font-black tracking-tighter">--%</p>
                </div>
                <div class="dragon-card p-3 text-center">
                    <p class="text-[7px] text-gray-500 uppercase" data-ar="الحجم 24س" data-en="24h Volume">الحجم 24س</p>
                    <p id="vol-24h" class="text-[10px] font-black tracking-tighter">$---</p>
                </div>
                <div class="dragon-card p-3 text-center">
                    <p class="text-[7px] text-gray-500 uppercase" data-ar="المعاملات" data-en="TXNS">المعاملات</p>
                    <p id="txns-24h" class="text-[10px] font-black tracking-tighter">---</p>
                </div>
            </div>
        </div>

        <div id="missions" class="tab-content space-y-3">
            <div class="dragon-card p-6 border-b-4 border-yellow-500 bg-yellow-500/5">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-sm font-black uppercase" data-ar="المكافأة اليومية" data-en="Daily Reward">المكافأة اليومية</h3>
                        <p class="text-[9px] text-gray-400" data-ar="احصل على 1,000 نقطة مجاناً" data-en="Claim 1,000 free pts">احصل على 1,000 نقطة مجاناً</p>
                    </div>
                    <button onclick="claimDaily()" id="dailyBtn" class="bg-yellow-500 text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase">Claim</button>
                </div>
            </div>
            <div id="tasks-container" class="space-y-3"></div>
        </div>

        <div id="wallet" class="tab-content space-y-5">
            <div id="tier-card" class="dragon-card wallet-gradient p-8 relative border-2 border-white/5">
                <div class="relative z-10">
                    <span id="tier-badge" class="text-[8px] font-black px-3 py-1 rounded-full uppercase mb-4 inline-block">Bronze</span>
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-1" data-ar="الرصيد الكلي" data-en="Total Balance">الرصيد الكلي</p>
                    <div class="flex items-baseline gap-2 mb-6">
                        <h2 id="wallet-pts" class="text-5xl font-black tracking-tighter">0</h2>
                        <span class="text-xs text-yellow-500 font-black">PTS</span>
                    </div>
                    <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                        <div id="tier-progress-bar" class="h-full bg-red-600 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <button onclick="shareReferral()" class="w-full py-4 dragon-card border-dashed border-red-600/50 flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i class="fas fa-user-plus text-red-500"></i>
                <span class="text-[10px] font-black uppercase" data-ar="دعوة الأصدقاء (+5000)" data-en="Invite Friends (+5000)">دعوة الأصدقاء (+5000)</span>
            </button>
            <div id="ton-connect-button" class="flex justify-center"></div>
        </div>

        <div id="leaderboard" class="tab-content space-y-4">
            <div class="text-center py-6">
                <i class="fas fa-crown text-yellow-500 text-3xl mb-2"></i>
                <h2 class="text-lg font-black uppercase" data-ar="أقوى 10 تنانين" data-en="Top 10 Dragons">أقوى 10 تنانين</h2>
            </div>
            <div id="leaderboard-list" class="space-y-2"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-3 z-50 backdrop-blur-xl">
        <button onclick="showTab('home')" class="nav-btn active" id="n-home">
            <i class="fas fa-home text-sm mb-1"></i>
            <p class="text-[8px] font-black uppercase" data-ar="الرئيسية" data-en="Home">الرئيسية</p>
        </button>
        <button onclick="showTab('missions')" class="nav-btn" id="n-missions">
            <i class="fas fa-tasks text-sm mb-1"></i>
            <p class="text-[8px] font-black uppercase" data-ar="المهام" data-en="Tasks">المهام</p>
        </button>
        <button onclick="showTab('leaderboard')" class="nav-btn" id="n-leaderboard">
            <i class="fas fa-trophy text-sm mb-1"></i>
            <p class="text-[8px] font-black uppercase" data-ar="الأبطال" data-en="Top">الأبطال</p>
        </button>
        <button onclick="showTab('wallet')" class="nav-btn" id="n-wallet">
            <i class="fas fa-wallet text-sm mb-1"></i>
            <p class="text-[8px] font-black uppercase" data-ar="المحفظة" data-en="Wallet">المحفظة</p>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        const BOT_USERNAME = "Drgncoin_bot";
        // استخدام GeckoTerminal API كبديل مستقر
        const GECKO_API = "https://api.geckoterminal.com/api/v2/networks/bsc/pools/0x84606890ad8d13e5a092c25abe59e2ec8ade7805";
        const swapUrl = "https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3";
        
        let appData = { points: 0, doneTasks: [], lang: localStorage.getItem('d_lang') || 'ar' };

        function openSwapWithWarning() {
            const msg = appData.lang === 'ar' ? 
                "⚠️ تنبيه: تأكد من ضبط الإنزلاق (Slippage) لـ 12%. هل تريد المتابعة؟" : 
                "⚠️ Alert: Set Slippage to 12% to trade. Continue?";
            tg.showConfirm(msg, (ok) => { if (ok) tg.openLink(swapUrl); });
        }

        async function syncData() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;
            try {
                const res = await fetch(`${WORKER_URL}/sync`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId: user.id, username: user.first_name, referrerId: tg.initDataUnsafe.start_param })
                });
                const data = await res.json();
                appData.points = data.points;
                appData.doneTasks = data.doneTasks;
                updateUI();
                setTimeout(() => {
                    document.getElementById('app-loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('app-loader').style.display = 'none', 500);
                }, 1000);
            } catch (e) {
                document.getElementById('app-loader').style.display = 'none';
            }
        }

        async function updateMarketData() {
            try {
                const res = await fetch(GECKO_API);
                const json = await res.json();
                if (json.data && json.data.attributes) {
                    const attr = json.data.attributes;
                    
                    document.getElementById('live-price').innerText = `$${parseFloat(attr.base_token_price_usd).toFixed(10)}`;
                    document.getElementById('live-liq').innerText = `$${parseFloat(attr.reserve_in_usd).toLocaleString()}`;
                    document.getElementById('live-mcap').innerText = `$${parseFloat(attr.fdv_usd).toLocaleString()}`;
                    
                    const change = parseFloat(attr.price_change_percentage.h24);
                    const changeEl = document.getElementById('change-24h');
                    changeEl.innerText = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
                    changeEl.className = `text-[10px] font-black tracking-tighter ${change >= 0 ? 'text-green-500' : 'text-red-500'}`;
                    
                    document.getElementById('vol-24h').innerText = `$${parseFloat(attr.volume_usd.h24).toLocaleString()}`;
                    document.getElementById('txns-24h').innerText = (attr.transactions.h24.buys + attr.transactions.h24.sells).toLocaleString();

                    const barWidth = Math.min(Math.max(50 + change, 5), 100);
                    document.getElementById('price-bar').style.width = barWidth + '%';

                    ['live-price', 'live-liq', 'live-mcap', 'vol-24h', 'txns-24h'].forEach(id => {
                        document.getElementById(id).classList.remove('loading-shimmer');
                    });
                }
            } catch (e) { console.error("Market API Error"); }
        }

        // الوظائف الباقية مستمرة بنفس المنطق دون تغيير
        async function claimDaily() {
            const btn = document.getElementById('dailyBtn');
            btn.disabled = true;
            try {
                const res = await fetch(`${WORKER_URL}/daily-claim`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId: tg.initDataUnsafe.user.id })
                });
                const result = await res.json();
                if (result.success) {
                    appData.points = result.newPoints;
                    updateUI();
                    tg.showAlert(appData.lang === 'ar' ? `+${result.reward} نقطة!` : `+${result.reward} Pts!`);
                    tg.HapticFeedback.notificationOccurred('success');
                } else { tg.showAlert(result.message); }
            } catch (e) {}
            btn.disabled = false;
        }

        async function loadLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '<p class="text-center py-5 text-[10px] opacity-50">LOADING...</p>';
            try {
                const res = await fetch(`${WORKER_URL}/leaderboard`);
                const top = await res.json();
                list.innerHTML = '';
                top.forEach((u, i) => {
                    const colors = ['text-yellow-400', 'text-gray-300', 'text-orange-400'];
                    list.innerHTML += `<div class="dragon-card p-4 flex justify-between items-center ${i < 3 ? 'border-yellow-500/20 bg-yellow-500/5' : 'border-white/5'}">
                        <div class="flex items-center gap-3"><span class="text-[10px] font-black w-4 ${i < 3 ? colors[i] : 'text-gray-600'}">#${i+1}</span>
                        <span class="text-xs font-bold">${u.username}</span></div>
                        <span class="text-xs font-black">${u.points.toLocaleString()}</span></div>`;
                });
            } catch (e) {}
        }

        async function loadMissions() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '<p class="text-center py-5 opacity-50 text-[10px]">FETCHING...</p>';
            const staticTasks = [{ id: 'tg_chan', title: 'Join Channel', link: 'https://t.me/Dragon_Coin_Official', reward: 2000, icon: 'fa-telegram' }];
            const feeds = [{ id: 'X', url: "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json", icon: 'fa-twitter' }, { id: 'TikTok', url: "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json", icon: 'fa-tiktok' }];
            let dynamicTasks = [];
            for (let f of feeds) {
                try {
                    const res = await fetch(f.url);
                    const d = await res.json();
                    d.items.slice(0, 3).forEach(item => { dynamicTasks.push({ id: btoa(item.link).substring(0, 10), title: `${f.id} Mission`, link: item.link, reward: 1000, icon: f.icon }); });
                } catch (e) {}
            }
            container.innerHTML = '';
            [...staticTasks, ...dynamicTasks].forEach(t => {
                const isDone = appData.doneTasks.includes(t.id);
                container.innerHTML += `<div class="dragon-card p-4 flex justify-between items-center border-l-2 ${isDone ? 'border-gray-800 opacity-50' : 'border-red-600'}">
                    <div class="flex items-center gap-3"><i class="fab ${t.icon} text-lg ${isDone ? 'text-gray-600' : 'text-red-500'}"></i>
                    <div><p class="text-[10px] font-black uppercase">${t.title}</p><p class="text-[8px] text-yellow-500 font-bold">+${t.reward} PTS</p></div></div>
                    <button onclick="executeTask('${t.id}', '${t.link}', ${t.reward})" class="px-5 py-2 rounded-xl text-[9px] font-black ${isDone ? 'bg-black text-gray-700' : 'bg-white text-black'}">${isDone ? 'DONE' : 'GO'}</button></div>`;
            });
        }

        async function executeTask(id, url, reward) {
            if (appData.doneTasks.includes(id)) return;
            tg.openLink(url);
            setTimeout(() => {
                tg.showConfirm(appData.lang === 'ar' ? "هل أكملت المهمة؟" : "Task Done?", async (ok) => {
                    if(ok) {
                        const res = await fetch(`${WORKER_URL}/complete-task`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, taskId: id, reward: reward })
                        });
                        const r = await res.json();
                        if(r.success) { appData.points = r.newPoints; appData.doneTasks.push(id); updateUI(); loadMissions(); }
                    }
                });
            }, 3000);
        }

        function shareReferral() {
            const link = `https://t.me/${BOT_USERNAME}?start=${tg.initDataUnsafe.user?.id || "0"}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent("Join Dragon VIP! 🐲")}`);
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
            if(id === 'leaderboard') loadLeaderboard();
            if(id === 'missions') loadMissions();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateTierUI(pts) {
            const tiers = [{ name: 'Bronze', min: 0, max: 100000, color: '#b45309' }, { name: 'Silver', min: 100000, max: 500000, color: '#94a3b8' }, { name: 'Gold', min: 500000, max: 1000000, color: '#f59e0b' }, { name: 'Legend', min: 1000000, max: 10000000, color: '#6366f1' }];
            let tier = tiers.find((t, i) => pts >= t.min && (tiers[i+1] ? pts < tiers[i+1].min : true)) || tiers[0];
            document.getElementById('tier-badge').innerText = tier.name;
            document.getElementById('tier-badge').style.backgroundColor = tier.color;
            let percent = ((pts - tier.min) / (tier.max - tier.min)) * 100;
            document.getElementById('tier-progress-bar').style.width = Math.min(percent, 100) + '%';
            document.getElementById('tier-progress-bar').style.backgroundColor = tier.color;
        }

        function updateUI() {
            const isAr = appData.lang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => { el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en'); });
            document.getElementById('wallet-pts').innerText = appData.points.toLocaleString();
            updateTierUI(appData.points);
        }

        function toggleLang() {
            appData.lang = appData.lang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('d_lang', appData.lang);
            updateUI();
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/test/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        tg.expand();
        syncData();
        updateMarketData();
        setInterval(updateMarketData, 30000);
    </script>
</body>
</html>
