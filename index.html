<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Stadium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; }
        .dragon-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; overflow: hidden; }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-lg z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600"></i>
            <span style="font-family: 'Orbitron';" class="text-[10px] font-black tracking-widest text-white">DRAGON SPORTS</span>
        </div>
        <div class="text-[8px] bg-red-600/10 text-red-500 px-2 py-1 rounded-full font-bold">VIP ACCESS</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div id="matches-loader" class="text-center py-10 opacity-50 text-xs">جاري جلب المباريات المباشرة...</div>
        </div>

        <div id="leaderboard" class="tab-content">
            <div id="lb-list" class="space-y-2"></div>
        </div>

        <div id="wallet" class="tab-content space-y-4">
            <div class="dragon-card p-6 text-center">
                <p class="text-[10px] text-zinc-500 uppercase mb-2">رصيد عملاتك</p>
                <h2 id="user-balance" class="text-3xl font-black">0</h2>
                <p id="rank-name" class="text-[10px] text-red-500 font-black mt-1 italic">GUEST</p>
                <input id="bsc-address" type="text" placeholder="أدخل عنوان محفظة BSC" class="w-full mt-6 bg-white/5 border border-white/10 p-3 rounded-xl text-[10px] text-center outline-none">
                <button onclick="verify()" class="w-full mt-2 py-3 bg-white text-black text-[10px] font-black rounded-xl">تحديث الرصيد (RPC)</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 border-t border-white/5 flex justify-around p-3">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home"><i class="fas fa-field-football text-lg mb-1"></i><span class="text-[8px] font-black">الملعب</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex-1 flex flex-col items-center" id="n-leaderboard"><i class="fas fa-trophy text-lg mb-1"></i><span class="text-[8px] font-black">الدوري</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet"><i class="fas fa-user-shield text-lg mb-1"></i><span class="text-[8px] font-black">الحساب</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        let uData = { balance: 0, rank: 'BRONZE' };

        async function init() {
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'لاعب' };
            const res = await fetch(`${WORKER_URL}/sync`, { method: 'POST', body: JSON.stringify({ userId: user.id, username: user.first_name }) });
            uData = await res.json();
            render();
            fetchMatches();
        }

        async function fetchMatches() {
            const res = await fetch(`${WORKER_URL}/get-matches`);
            const matches = await res.json();
            const container = document.getElementById('home');
            
            if (matches.length === 0) {
                container.innerHTML = '<p class="text-center py-20 opacity-30 text-[10px]">لا توجد مباريات حالياً</p>';
                return;
            }

            container.innerHTML = matches.map(m => `
                <div class="dragon-card p-5">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[8px] font-black ${m.isLive ? 'text-red-500 animate-pulse' : 'text-zinc-600'}">● ${m.isLive ? 'مباشر الآن' : 'قريباً'}</span>
                        <span class="text-[8px] text-zinc-500 font-mono">${new Date(m.time).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="flex items-center justify-between gap-2 py-2">
                        <div class="text-center flex-1">
                            <img src="${m.logoA}" class="w-12 h-12 mx-auto mb-2 rounded-full bg-zinc-900 p-1">
                            <p class="text-[9px] font-black uppercase truncate">${m.teamA}</p>
                        </div>
                        <div class="text-xs font-black italic text-zinc-800">VS</div>
                        <div class="text-center flex-1">
                            <img src="${m.logoB}" class="w-12 h-12 mx-auto mb-2 rounded-full bg-zinc-900 p-1">
                            <p class="text-[9px] font-black uppercase truncate">${m.teamB}</p>
                        </div>
                    </div>
                    ${m.canVote ? `
                        <div class="mt-4 grid grid-cols-2 gap-2">
                            <button onclick="vote('${m.id}', 'A')" class="py-2 bg-red-600 rounded-lg text-[9px] font-black uppercase">فوز ${m.teamA}</button>
                            <button onclick="vote('${m.id}', 'B')" class="py-2 bg-blue-600 rounded-lg text-[9px] font-black uppercase">فوز ${m.teamB}</button>
                        </div>
                    ` : `<div class="mt-4 py-2 bg-white/5 text-center rounded-lg text-[8px] text-zinc-500 font-bold uppercase tracking-widest">
                            ${m.isLive ? 'التصويت مغلق (المباراة بدأت)' : 'يفتح التصويت قبل المباراة بساعة'}
                         </div>`}
                </div>
            `).join('');
        }

        async function vote(matchId, team) {
            if (uData.balance <= 0) return tg.showAlert("⚠️ يجب امتلاك $DRGN للتصويت!");
            const res = await fetch(`${WORKER_URL}/vote`, {
                method: 'POST',
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, matchId, voteFor: team })
            });
            const d = await res.json();
            if (d.success) tg.showConfirm("🔥 تم تسجيل صوتك بنجاح!");
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'leaderboard') loadLB();
        }

        async function verify() {
            const addr = document.getElementById('bsc-address').value;
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'لاعب' };
            const res = await fetch(`${WORKER_URL}/check-balance`, {
                method: 'POST',
                body: JSON.stringify({ walletAddress: addr, userId: user.id, username: user.first_name })
            });
            uData = await res.json();
            render();
            tg.showAlert(`✅ تم التحديث! الرصيد: ${uData.balance}`);
        }

        function render() {
            document.getElementById('user-balance').innerText = Math.floor(uData.balance).toLocaleString();
            document.getElementById('rank-name').innerText = uData.rank + " MEMBER";
        }

        init();
        tg.expand();
    </script>
</body>
</html>
