<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin Hub - Ultimate Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #ff4d4d; }
        .task-done { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 9999; pointer-events: none; transition: 0.3s; }
        #toast.show { opacity: 1; }
        .burn-bar { height: 8px; background: #111; border-radius: 10px; overflow: hidden; }
        .burn-fill { background: linear-gradient(90deg, #ff4d4d, #991b1b); width: 15%; transition: 2s ease-in-out; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-lg uppercase tracking-tighter">DRAGON<span class="text-red-600">COIN</span></h1>
                <p class="text-[10px] font-bold text-yellow-500 uppercase">POINTS: <span id="pointsHeader">0</span></p>
            </div>
        </div>
        <button onclick="toggleLang()" class="bg-white/5 text-[10px] px-3 py-2 rounded-lg font-bold border border-white/10" id="langSwitch">EN</button>
    </header>

    <div id="home-tab" class="tab-content active p-4 space-y-5">
        
        <div class="bg-red-600/10 border border-red-600/30 p-4 rounded-2xl flex gap-3 items-start animate-pulse">
            <i class="fas fa-shield-alt text-red-500 mt-1"></i>
            <div>
                <p class="text-[11px] font-black text-red-500 uppercase mb-1" data-en="Trading Security" data-ar="أمان التداول">أمان التداول</p>
                <p class="text-[10px] text-gray-300 leading-relaxed" data-en="Use 15%+ Slippage. Max buy $1-$2 per transaction." data-ar="استخدم انزلاق سعري (Slippage) بنسبة 15% أو أكثر. بحد أقصى $1-$2 لكل عملية شراء.">استخدم انزلاق سعري (Slippage) بنسبة 15% أو أكثر. بحد أقصى $1-$2 لكل عملية شراء.</p>
            </div>
        </div>

        <div class="dragon-card p-5 rounded-[2rem] border-dashed border-red-900/50">
            <h3 class="text-[11px] font-black text-red-500 uppercase mb-3" data-en="Dragon Recruitment" data-ar="تجنيد التنانين">تجنيد التنانين</h3>
            <div class="flex gap-2">
                <input id="refUrl" readonly class="bg-black/50 border border-white/5 rounded-xl px-3 py-2 text-[10px] flex-1 text-gray-400 font-mono">
                <button onclick="copyRef()" class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-bold uppercase" data-en="Copy" data-ar="نسخ">نسخ</button>
            </div>
            <p class="text-[9px] text-gray-500 mt-2" data-en="Earn 2,000 Pts for every invite!" data-ar="اكسب 2,000 نقطة لكل دعوة!"></p>
        </div>

        <div class="space-y-3">
            <h3 class="text-[11px] font-black text-gray-500 uppercase px-1" data-en="Daily Missions" data-ar="المهام اليومية">المهام اليومية</h3>
            <div id="task-tiktok" class="dragon-card p-4 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-3"><i class="fab fa-tiktok"></i><span class="text-xs font-bold">TikTok Support</span></div>
                <button onclick="executeTask('tiktok', 1000, 'https://tiktok.com/@thedragonsport')" class="bg-red-600 text-[10px] font-bold px-4 py-2 rounded-lg" data-en="GO" data-ar="نفذ">نفذ</button>
            </div>
            <div id="task-x" class="dragon-card p-4 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-3"><i class="fab fa-twitter text-blue-400"></i><span class="text-xs font-bold">X (Twitter) Support</span></div>
                <button onclick="executeTask('x', 500, 'https://x.com/XY_signals')" class="bg-blue-500 text-[10px] font-bold px-4 py-2 rounded-lg" data-en="GO" data-ar="نفذ">نفذ</button>
            </div>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-4 space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="dragon-card p-5 rounded-2xl text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold" data-en="Liquidity" data-ar="السيولة">السيولة</p>
                <p class="text-green-500 font-black text-lg">$41</p>
            </div>
            <div class="dragon-card p-5 rounded-2xl text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold" data-en="Friends" data-ar="الأصدقاء">الأصدقاء</p>
                <p id="friendsStats" class="text-white font-black text-lg">0</p>
            </div>
        </div>
        <div class="dragon-card p-5 rounded-2xl">
            <h3 class="text-[10px] font-black text-gray-400 uppercase mb-3">Live Burn 🔥</h3>
            <div class="burn-bar"><div class="burn-fill h-full"></div></div>
            <p class="text-[9px] text-gray-500 mt-2 font-mono">0.1000% Burned</p>
        </div>
    </div>

    <div id="ranks-tab" class="tab-content p-4 text-center">
        <div class="dragon-card p-12 rounded-[3rem] mt-10">
            <div id="rankIcon" class="text-8xl mb-6">🥚</div>
            <h2 id="rankTitle" class="text-2xl font-black uppercase italic" data-en="Dragon Egg" data-ar="بيضة التنين">بيضة التنين</h2>
            <p id="rankNext" class="text-gray-500 text-[10px] font-bold mt-2" data-en="Next: Young Dragon at 10,000 Pts" data-ar="التالي: تنين شاب عند 10,000 نقطة"></p>
        </div>
    </div>

    <div id="assets-tab" class="tab-content p-4 text-center">
        <div class="dragon-card p-8 rounded-[2.5rem] mt-10">
            <i class="fas fa-wallet text-4xl mb-4 text-gray-600"></i>
            <p id="walletAddrDisplay" class="text-[9px] text-gray-500 font-mono mb-4">Not Connected</p>
            <button id="connectBtn" onclick="smartConnect()" class="w-full bg-white text-black py-4 rounded-2xl text-[11px] font-black uppercase" data-en="Connect Wallet" data-ar="ربط المحفظة">ربط المحفظة</button>
            <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" target="_blank" class="block mt-4 text-[10px] text-red-500 font-bold" data-en="Buy $DRGN" data-ar="شراء $DRGN">شراء $DRGN</a>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-item flex flex-col items-center active" id="nav-home">
            <i class="fas fa-home"></i><span class="text-[8px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="switchTab('data')" class="nav-item flex flex-col items-center text-gray-600" id="nav-data">
            <i class="fas fa-chart-pie"></i><span class="text-[8px] mt-1 font-bold">STATS</span>
        </button>
        <button onclick="switchTab('ranks')" class="nav-item flex flex-col items-center text-gray-600" id="nav-ranks">
            <i class="fas fa-shield-alt"></i><span class="text-[8px] mt-1 font-bold">RANKS</span>
        </button>
        <button onclick="switchTab('assets')" class="nav-item flex flex-col items-center text-gray-600" id="nav-assets">
            <i class="fas fa-wallet"></i><span class="text-[8px] mt-1 font-bold">WALLET</span>
        </button>
    </nav>

    <div id="toast"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd-5BowYDDmT2Twc4ltAYzaQWio0_O-RGw57w4jTwUH5v0fnSh1e70cXyyvCdLx4cbMQ/exec";
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "user_test";
        const startParam = tg.initDataUnsafe.start_param || null;

        let currentLang = 'ar';
        let points = 0;
        let friends = 0;

        async function syncCloud(action, amount = 0) {
            try {
                const res = await fetch(SCRIPT_URL, {
                    redirect: "follow",
                    method: "POST",
                    body: JSON.stringify({ userId, action, amount, referrer: startParam })
                });
                const data = await res.json();
                points = data.points;
                friends = data.friends;
                updateView();
            } catch (e) { console.error(e); }
        }

        function updateView() {
            document.getElementById('pointsHeader').innerText = points.toLocaleString();
            document.getElementById('friendsStats').innerText = friends;
            updateRank();
        }

        function updateRank() {
            const icon = document.getElementById('rankIcon');
            const title = document.getElementById('rankTitle');
            if (points >= 50000) { icon.innerText = "👑"; title.innerText = currentLang === 'ar' ? "ملك التنانين" : "Dragon King"; }
            else if (points >= 10000) { icon.innerText = "🐉"; title.innerText = currentLang === 'ar' ? "تنين شاب" : "Young Dragon"; }
            else { icon.innerText = "🥚"; title.innerText = currentLang === 'ar' ? "بيضة التنين" : "Dragon Egg"; }
        }

        function executeTask(id, reward, url) {
            if(localStorage.getItem('done_'+id)) return showToast("Done!");
            window.open(url, '_blank');
            setTimeout(() => {
                syncCloud("addPoints", reward);
                localStorage.setItem('done_'+id, 'true');
                document.getElementById('task-'+id).classList.add('task-done');
                showToast(`+${reward} Points!`);
            }, 5000);
        }

        async function smartConnect() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletAddrDisplay').innerText = accounts[0];
                document.getElementById('connectBtn').innerText = "Connected";
                showToast("Wallet Linked!");
            } else { showToast("Open in DApp Browser"); }
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('refUrl').value);
            showToast("Copied!");
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            applyLang();
            updateRank();
        }

        function applyLang() {
            const isEn = currentLang === 'en';
            document.getElementById('mainHtml').dir = isEn ? 'ltr' : 'rtl';
            document.getElementById('langSwitch').innerText = isEn ? 'AR' : 'EN';
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = isEn ? el.getAttribute('data-en') : el.getAttribute('data-ar');
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-red-500'));
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('nav-' + t).classList.add('active', 'text-red-500');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Initialize
        document.getElementById('refUrl').value = `https://t.me/Drgncoin_bot?start=${userId}`;
        syncCloud("load");
        tg.expand();
        applyLang();
    </script>
</body>
</html>
