<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin - Final Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 1000; transition: 0.3s; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-dragon text-white text-sm"></i>
            </div>
            <h1 class="text-xs font-black italic uppercase">DRAGON<span class="text-red-600">COIN</span></h1>
        </div>
        <div class="text-right">
            <p id="pointsHeader" class="text-sm font-black">0</p>
            <p class="text-[8px] text-yellow-500 font-bold uppercase">RANK: EGG</p>
        </div>
    </header>

    <main class="p-4 space-y-6">
        <section>
            <h3 class="text-blue-400 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-widest"><i class="fab fa-twitter"></i> X Missions</h3>
            <div id="x-tasks" class="space-y-3">
                <div class="text-center py-4 text-[9px] text-gray-700 animate-pulse">DRAGON IS SEARCHING...</div>
            </div>
        </section>

        <section>
            <h3 class="text-pink-500 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-widest"><i class="fab fa-tiktok"></i> TikTok Missions</h3>
            <div id="tk-tasks" class="space-y-3">
                <div class="text-center py-4 text-[9px] text-gray-700 animate-pulse">DRAGON IS SEARCHING...</div>
            </div>
        </section>
    </main>

    <div id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let points = parseInt(localStorage.getItem('pts')) || 0;
        let doneTasks = JSON.parse(localStorage.getItem('done')) || [];

        const JSON_X = "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json";
        const JSON_TK = "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json";

        async function init() {
            document.getElementById('pointsHeader').innerText = points.toLocaleString();
            // استخدام وسيط مختلف فائق السرعة
            loadFeed('x', JSON_X, 'x-tasks');
            loadFeed('tk', JSON_TK, 'tk-tasks');
        }

        async function loadFeed(platform, url, containerId) {
            const container = document.getElementById(containerId);
            try {
                // وسيط AllOrigins مع معالجة الاستجابة كـ JSON مباشر
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                if (!response.ok) throw new Error('Network error');
                
                const result = await response.json();
                const data = JSON.parse(result.contents); // هنا يتم فك البيانات المستلمة

                if (data && data.items && data.items.length > 0) {
                    container.innerHTML = '';
                    data.items.slice(0, 4).forEach((item, index) => {
                        const taskId = `${platform}_${index}`;
                        const isDone = doneTasks.includes(taskId);
                        const icon = platform === 'x' ? 'fab fa-twitter text-blue-400' : 'fab fa-tiktok text-pink-500';
                        
                        container.innerHTML += `
                            <div class="dragon-card p-4 rounded-2xl flex justify-between items-center ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <i class="${icon} text-lg"></i>
                                    <div>
                                        <p class="text-[10px] font-bold uppercase">${platform} MISSION</p>
                                        <p class="text-[9px] text-yellow-500 font-black">+1,000 PTS</p>
                                    </div>
                                </div>
                                <button onclick="doTask('${taskId}', 1000, '${item.url}')" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg">GO</button>
                            </div>`;
                    });
                } else {
                    container.innerHTML = '<p class="text-center py-4 text-[9px] text-gray-800 uppercase">No Missions Today</p>';
                }
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p class="text-center py-4 text-[9px] text-red-900 uppercase">Connection Retrying...</p>';
            }
        }

        function doTask(id, reward, url) {
            window.open(url, '_blank');
            showToast("VERIFYING...");
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('pts', points);
                    localStorage.setItem('done', JSON.stringify(doneTasks));
                    init();
                    showToast("+1,000 PTS! 🔥");
                }
            }, 5000);
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
        tg.expand();
    </script>
</body>
</html>
