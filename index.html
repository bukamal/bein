<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Stadium Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { background: #050505; color: #fff; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: linear-gradient(160deg, #111, #070707); border: 1px solid #222; border-radius: 20px; transition: 0.3s; }
        .nav-btn.active { color: #ff3333; transform: translateY(-3px); }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .tab-content { display: none; animation: slideUp 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center bg-black/50 backdrop-blur-lg sticky top-0 z-[100] border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/20">
                <i class="fas fa-dragon text-white"></i>
            </div>
            <div>
                <h1 id="header-title" class="text-sm font-black tracking-tighter uppercase italic">Dragon Stadium</h1>
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span id="online-hub" class="text-[8px] text-zinc-500 font-bold uppercase">Online Hub</span>
                </div>
            </div>
        </div>
        <button onclick="toggleLang()" class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-lg text-[10px] font-bold">
            <i class="fas fa-language text-red-500"></i> <span id="btn-lang">EN</span>
        </button>
    </header>

    <main class="p-4 space-y-6">
        <section id="home" class="tab-content active space-y-4">
            <div id="match-loader" class="hidden space-y-4">
                <div class="dragon-card p-10 loading-pulse bg-zinc-900"></div>
                <div class="dragon-card p-10 loading-pulse bg-zinc-900"></div>
            </div>
            <div id="match-container" class="space-y-4"></div>
        </section>

        <section id="league" class="tab-content space-y-4">
            <div class="dragon-card p-5 border-red-900/30">
                <h2 id="leaderboard-title" class="text-center text-red-600 font-black italic mb-4">LEADERBOARD</h2>
                <div id="lb-list" class="space-y-2"></div>
            </div>
        </section>

        <section id="account" class="tab-content space-y-4">
            <div class="dragon-card p-6 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-red-600"></div>
                <p id="total-assets-label" class="text-[10px] text-zinc-500 font-black uppercase tracking-widest">Total Assets</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <h2 id="total-balance" class="text-4xl font-black italic">0</h2>
                    <span class="text-red-600 font-bold text-xs uppercase italic">DRGN</span>
                </div>
                <div id="rank-name" class="inline-block mt-3 px-4 py-1 bg-white/5 rounded-full text-[9px] font-black border border-white/10 tracking-widest">BRONZE MEMBER</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="dragon-card p-4 text-center">
                    <p id="game-wallet-label" class="text-[8px] text-zinc-500 font-bold uppercase">Game Wallet</p>
                    <p id="game-balance" class="text-lg font-black mt-1">0</p>
                </div>
                <div class="dragon-card p-4 text-center">
                    <p id="pending-label" class="text-[8px] text-zinc-500 font-bold uppercase">Pending</p>
                    <p id="pending-rewards" class="text-lg font-black mt-1 text-yellow-500">0</p>
                </div>
            </div>

            <button id="claim-btn" onclick="claimRewards()" class="w-full py-4 bg-red-600 text-white font-black rounded-2xl shadow-xl shadow-red-900/40 active:scale-95 transition-all">سحب المكافآت</button>

            <div class="dragon-card p-5 space-y-3">
                <p id="connect-wallet-label" class="text-[9px] text-zinc-500 font-bold text-center italic">ربط محفظة BSC لتحديث الرتبة والرصيد</p>
                <input id="bsc-address" type="text" placeholder="0x..." class="w-full bg-black border border-white/10 p-4 rounded-xl text-xs text-center outline-none focus:border-red-600 transition-all">
                <button onclick="updateWallet()" id="update-wallet-btn" class="w-full py-3 bg-white text-black text-[11px] font-black rounded-xl uppercase active:scale-95 transition-all">تحديث المحفظة</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-xl border-t border-white/5 flex justify-around p-3 z-[100]">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center">
            <i class="fas fa-gamepad text-xl mb-1"></i><span id="nav-stadium">الملعب</span>
        </button>
        <button onclick="showTab('league')" class="nav-btn flex-1 flex flex-col items-center">
            <i class="fas fa-trophy text-xl mb-1"></i><span id="nav-league">الدوري</span>
        </button>
        <button onclick="showTab('account')" class="nav-btn flex-1 flex flex-col items-center">
            <i class="fas fa-wallet text-xl mb-1"></i><span id="nav-account">الحساب</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev"; // ضع رابط الـ worker الخاص بك هنا
        let initDataStr = "";
        let currentLang = "ar";

        const translations = {
            ar: {
                headerTitle: "Dragon Stadium",
                onlineHub: "Online Hub",
                totalAssets: "إجمالي الأصول",
                gameWallet: "Game Wallet",
                pending: "Pending",
                claimRewards: "سحب المكافآت",
                connectWallet: "ربط محفظة BSC لتحديث الرتبة والرصيد",
                updateWallet: "تحديث المحفظة",
                leaderboardTitle: "LEADERBOARD",
                navStadium: "الملعب",
                navLeague: "الدوري",
                navAccount: "الحساب"
            },
            en: {
                headerTitle: "Dragon Stadium",
                onlineHub: "Online Hub",
                totalAssets: "Total Assets",
                gameWallet: "Game Wallet",
                pending: "Pending",
                claimRewards: "Claim Rewards",
                connectWallet: "Connect BSC Wallet to update rank and balance",
                updateWallet: "Update Wallet",
                leaderboardTitle: "LEADERBOARD",
                navStadium: "Stadium",
                navLeague: "League",
                navAccount: "Account"
            }
        };

        async function apiReq(path, method = 'GET', body = null) {
            if (!initDataStr) initDataStr = tg.initData || '';
            const options = { 
                method, 
                headers: { 
                    'Content-Type': 'application/json',
                    'x-telegram-init-data': initDataStr
                } 
            };
            if (body) options.body = JSON.stringify(body);
            const r = await fetch(API + path, options);
            return await r.json();
        }

        function applyTranslations() {
            document.getElementById('header-title').innerText = translations[currentLang].headerTitle;
            document.getElementById('online-hub').innerText = translations[currentLang].onlineHub;
            document.getElementById('total-assets-label').innerText = translations[currentLang].totalAssets;
            document.getElementById('game-wallet-label').innerText = translations[currentLang].gameWallet;
            document.getElementById('pending-label').innerText = translations[currentLang].pending;
            document.getElementById('claim-btn').innerText = translations[currentLang].claimRewards;
            document.getElementById('connect-wallet-label').innerText = translations[currentLang].connectWallet;
            document.getElementById('update-wallet-btn').innerText = translations[currentLang].updateWallet;
            document.getElementById('leaderboard-title').innerText = translations[currentLang].leaderboardTitle;
            document.getElementById('nav-stadium').innerText = translations[currentLang].navStadium;
            document.getElementById('nav-league').innerText = translations[currentLang].navLeague;
            document.getElementById('nav-account').innerText = translations[currentLang].navAccount;
        }

        async function init() {
            tg.ready(); 
            tg.expand();
            initDataStr = tg.initData || '';
            const r = await apiReq('/sync', 'POST');
            if (r.success) renderUser(r.user);
            loadMatches();
            loadLeaderboard();
            applyTranslations();
        }

        async function loadMatches() {
            document.getElementById('match-loader').classList.remove('hidden');
            const d = await apiReq('/get-matches');
            document.getElementById('match-loader').classList.add('hidden');
            const container = document.getElementById('match-container');
            container.innerHTML = '';
            if (!d.success || !d.matches || d.matches.length === 0) {
                container.innerHTML = `<div class="dragon-card p-6 text-center text-red-500">خطأ في تحميل المباريات</div>`;
                return;
            }
            let html = '';
            d.matches.forEach(m => {
                const timeStr = new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const status = m.isOpen ? `<span class="text-green-500">● LIVE VOTING</span>` : `<span>${timeStr}</span>`;
                const votingHTML = m.isOpen ? `
                    <div class="grid grid-cols-3 gap-2 mt-4" id="v-${m.id}">
                        <button onclick="vote('${m.id}','HOME',${m.time})" class="bg-white/5 py-3 rounded-xl hover:bg-red-600 transition-all font-black italic text-xs">1</button>
                        <button onclick="vote('${m.id}','DRAW',${m.time})" class="bg-white/5 py-3 rounded-xl hover:bg-red-600 transition-all font-black italic text-xs">X</button>
                        <button onclick="vote('${m.id}','AWAY',${m.time})" class="bg-white/5 py-3 rounded-xl hover:bg-red-600 transition-all font-black italic text-xs">2</button>
                    </div>` : `
                    <div class="mt-4 py-2 bg-black/40 rounded-xl text-center text-[9px] text-zinc-600 font-black italic uppercase">Voting Closed</div>`;
                html += `
                <div class="dragon-card p-4 border-l-4 ${m.isOpen ? 'border-l-green-600' : 'border-l-zinc-800'}">
                    <div class="flex justify-between items-center mb-4 text-[9px] font-bold uppercase tracking-widest text-zinc-500">
                        <span>${m.league}</span>
                        ${status}
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-1 text-center">
                            <img src="${m.logoA}" class="w-12 h-12 mx-auto mb-2 drop-shadow-lg" onerror="this.src='https://via.placeholder.com/48?text=A'">
                            <p class="text-[10px] font-black uppercase">${m.teamA}</p>
                        </div>
                        <div class="text-red-600 font-black italic text-xl">VS</div>
                        <div class="flex-1 text-center">
                            <img src="${m.logoB}" class="w-12 h-12 mx-auto mb-2 drop-shadow-lg" onerror="this.src='https://via.placeholder.com/48?text=B'">
                            <p class="text-[10px] font-black uppercase">${m.teamB}</p>
                        </div>
                    </div>
                    ${votingHTML}
                </div>`;
            });
            container.innerHTML = html;
        }

        async function vote(id, side, time) {
            tg.MainButton.setText(currentLang === 'ar' ? "جاري إرسال التصويت..." : "Sending vote...").show();
            const r = await apiReq('/vote', 'POST', { matchId: id, voteFor: side, matchTime: time });
            tg.MainButton.hide();
            if (r.success) {
                tg.HapticFeedback.notificationOccurred('success');
                const v = document.getElementById(`v-${id}`);
                if (v) v.innerHTML = `<div class="col-span-3 py-2 text-center text-green-500 font-black italic text-xs animate-bounce">تم تسجيل التصويت ✓</div>`;
            } else {
                tg.showAlert(r.message || "خطأ");
            }
        }

        function renderUser(u) {
            document.getElementById('total-balance').innerText = Math.floor((u.gameBalance || 0) + (u.tokenBalance || 0)).toLocaleString();
            document.getElementById('game-balance').innerText = Math.floor(u.gameBalance || 0).toLocaleString();
            document.getElementById('pending-rewards').innerText = Math.floor(u.pendingRewards || 0).toLocaleString();
            document.getElementById('rank-name').innerText = `${u.rank} MEMBER`;
            if (u.wallet) document.getElementById('bsc-address').value = u.wallet;
        }

        async function updateWallet() {
            const wallet = document.getElementById('bsc-address').value.trim();
            if (!wallet || !/^0x[a-fA-F0-9]{40}$/.test(wallet)) {
                tg.showAlert(currentLang === 'ar' ? "عنوان BSC غير صحيح" : "Invalid BSC address");
                return;
            }
            const r = await apiReq('/check-balance', 'POST', { wallet });
            if (r.success) {
                renderUser(r.user);
                // 🆕 إعادة تحميل لوحة المتصدرين بعد تحديث الرصيد
                await loadLeaderboard();
                tg.showAlert(currentLang === 'ar' ? "✅ تم تحديث المحفظة والرتبة!" : "✅ Wallet updated successfully!");
            } else {
                tg.showAlert(r.message || "Unauthorized");
            }
        }

        async function claimRewards() {
            const r = await apiReq('/claim-rewards', 'POST');
            if (r.success) {
                renderUser(r.user);
                // 🆕 إعادة تحميل لوحة المتصدرين بعد المطالبة
                await loadLeaderboard();
                tg.showAlert(currentLang === 'ar' ? "✅ تم سحب المكافآت!" : "✅ Rewards claimed!");
            } else {
                tg.showAlert(r.message || "Unauthorized");
            }
        }

        async function loadLeaderboard() {
            const data = await apiReq('/leaderboard');
            const list = document.getElementById('lb-list');
            if (!data || data.length === 0) {
                list.innerHTML = `<div class="text-center text-zinc-500 py-8">لا يوجد لاعبين بعد</div>`;
                return;
            }
            let html = '';
            data.forEach((p, i) => {
                html += `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-zinc-600 font-black italic text-xs">#${i + 1}</span>
                        <span class="font-bold text-xs">${p.username}</span>
                    </div>
                    <span class="font-black text-red-600 italic text-xs">${Math.floor(p.score).toLocaleString()} DRGN</span>
                </div>`;
            });
            list.innerHTML = html;
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const activeBtn = document.querySelector(`button[onclick="showTab('${id}')"]`);
            if (activeBtn) activeBtn.classList.add('active');
            // إذا تم فتح تبويب الدوري، نضمن تحميل أحدث البيانات
            if (id === 'league') {
                loadLeaderboard();
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('btn-lang').innerText = currentLang === 'ar' ? 'EN' : 'AR';
            applyTranslations();
        }

        init();
    </script>
</body>
</html>
