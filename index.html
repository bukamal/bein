<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Coin - Elite Auto Missions</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: linear-gradient(145deg, #161616, #0a0a0a); border: 1px solid #222; transition: 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4d4d; padding: 12px 25px; border-radius: 50px; font-weight: bold; opacity: 0; z-index: 1000; transition: 0.3s; pointer-events: none; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4); }
        #toast.show { opacity: 1; }
        .done-task { opacity: 0.2; filter: grayscale(1); pointer-events: none; border: 1px dashed #444; }
        .nav-btn.active { color: #ff4d4d; }
        .burn-fill { background: linear-gradient(90deg, #ff4d4d, #991b1b); width: 15.5%; }
        .glow-text { text-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
    </style>
</head>
<body class="pb-28">

    <header class="p-4 sticky top-0 bg-[#050505]/95 backdrop-blur-md z-50 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40">
                <i class="fas fa-dragon text-white text-sm"></i>
            </div>
            <h1 class="text-xs font-black italic uppercase tracking-tighter">DRAGON<span class="text-red-600">COIN</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleLang()" class="text-[9px] font-black bg-white/5 px-2.5 py-1.5 rounded border border-white/10 uppercase" id="langBtn">EN</button>
            <div class="text-right">
                <p id="pointsHeader" class="text-sm font-black text-white glow-text">0</p>
                <p id="rankLabel" class="text-[8px] text-yellow-500 font-bold uppercase tracking-widest">RANK: EGG</p>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-6">
        
        <div id="home-tab" class="tab-content active space-y-6">
            
            <div class="bg-red-600/10 border border-red-600/30 p-4 rounded-2xl flex gap-3 items-start animate-pulse">
                <i class="fas fa-shield-alt text-red-500 mt-1"></i>
                <div class="text-[10px] text-gray-300 leading-relaxed">
                    <b class="text-red-500 block mb-1 uppercase" data-ar="تنبيه الأمان" data-en="Security Alert">تنبيه الأمان</b>
                    <span data-ar="اضبط الانزلاق 15%+. الشراء بمبالغ صغيرة ($1-$2)." data-en="Set Slippage 15%+. Buy with small amounts ($1-$2).">اضبط الانزلاق 15%+. الشراء بمبالغ صغيرة ($1-$2).</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="dragon-card p-4 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold" data-ar="السعر" data-en="Price">السعر</p>
                    <p class="text-sm font-black text-green-500 font-mono italic">$0.000000412</p>
                </div>
                <div class="dragon-card p-4 rounded-2xl">
                    <p class="text-[9px] text-gray-500 uppercase font-bold" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p class="text-sm font-black text-white font-mono italic">$41</p>
                </div>
            </div>

            <div class="dragon-card p-4 rounded-2xl">
                <div class="flex justify-between items-center mb-2 text-[9px] font-bold uppercase">
                    <p data-ar="إجمالي الحرق 🔥" data-en="Total Burned 🔥">إجمالي الحرق 🔥</p>
                    <p class="text-red-500 font-black">15.5%</p>
                </div>
                <div class="h-2 bg-black border border-white/5 rounded-full overflow-hidden">
                    <div class="burn-fill h-full"></div>
                </div>
            </div>

            <section>
                <h3 class="text-blue-400 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-[0.2em]"><i class="fab fa-twitter"></i> X Feed (Latest 4)</h3>
                <div id="x-tasks" class="space-y-3">
                    <div class="text-center py-6 text-[9px] text-gray-600 animate-pulse uppercase italic">Scanning X Network...</div>
                </div>
            </section>

            <section>
                <h3 class="text-pink-500 text-[10px] font-black mb-3 flex items-center gap-2 uppercase tracking-[0.2em]"><i class="fab fa-tiktok"></i> TikTok Feed (Latest 4)</h3>
                <div id="tk-tasks" class="space-y-3">
                    <div class="text-center py-6 text-[9px] text-gray-600 animate-pulse uppercase italic">Syncing TikTok Videos...</div>
                </div>
            </section>
        </div>

        <div id="wallet-tab" class="tab-content">
            <div class="dragon-card p-8 rounded-[2.5rem] text-center">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-wallet text-2xl text-gray-700"></i>
                </div>
                <h2 class="text-xl font-black mb-2 uppercase italic" data-ar="المحفظة" data-en="Wallet">المحفظة</h2>
                <p id="walletDisplay" class="text-[9px] text-gray-500 font-mono mb-6 truncate" data-ar="غير مربوطة" data-en="Not Connected">غير مربوطة</p>
                <button onclick="connectWallet()" class="w-full bg-white text-black py-4 rounded-xl text-xs font-black uppercase mb-4 shadow-xl" data-ar="ربط المحفظة" data-en="Connect Wallet">ربط المحفظة</button>
                <a href="https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3" target="_blank" class="block w-full border border-red-600/30 text-red-500 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest italic">Buy $DRGN</a>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center gap-1 active" id="btn-home"><i class="fas fa-dragon"></i><span class="text-[8px] font-bold uppercase" data-ar="الرئيسية" data-en="Missions">المهام</span></button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-600" id="btn-wallet"><i class="fas fa-wallet"></i><span class="text-[8px] font-bold uppercase" data-ar="المحفظة" data-en="Wallet">المحفظة</span></button>
    </nav>

    <div id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentLang = localStorage.getItem('lang') || 'ar';
        let points = parseInt(localStorage.getItem('pts')) || 500;
        let doneTasks = JSON.parse(localStorage.getItem('done')) || [];

        const RSS_X = "https://rss.app/feeds/tYaEQs8TqBTzCA29.xml";
        const RSS_TK = "https://rss.app/feeds/L4M8dUSeMhVKhLS2.xml";

        async function init() {
            document.getElementById('pointsHeader').innerText = points.toLocaleString();
            document.getElementById('rankLabel').innerText = points >= 10000 ? (currentLang==='ar'?"رتبة: تنين":"RANK: DRAGON") : (currentLang==='ar'?"رتبة: بيضة":"RANK: EGG");
            updateLanguageUI();
            // جلب أحدث 4 لكل منصة
            await fetchRSS('x', RSS_X, 'x-tasks', 4);
            await fetchRSS('tk', RSS_TK, 'tk-tasks', 4);
        }

        async function fetchRSS(platform, url, containerId, count) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`);
                const data = await res.json();
                const container = document.getElementById(containerId);
                container.innerHTML = '';

                if (data.status === 'ok') {
                    // هنا تم تحديد جلب أحدث 4 منشورات (slice 0 to count)
                    data.items.slice(0, count).forEach((item, index) => {
                        const taskId = `${platform}_${item.guid || item.pubDate}`;
                        const isDone = doneTasks.includes(taskId);
                        const icon = platform === 'x' ? 'fab fa-twitter text-blue-400' : 'fab fa-tiktok text-pink-500';
                        const title = currentLang === 'ar' ? `دعم منشور ${platform.toUpperCase()} #${index+1}` : `Support ${platform.toUpperCase()} Post #${index+1}`;

                        container.innerHTML += `
                            <div class="dragon-card p-4 rounded-2xl flex justify-between items-center ${isDone ? 'done-task' : ''}">
                                <div class="flex items-center gap-3">
                                    <i class="${icon} text-lg shadow-sm"></i>
                                    <div>
                                        <p class="text-[10px] font-bold">${title}</p>
                                        <p class="text-[9px] text-yellow-500 font-black tracking-wider">+500 PTS</p>
                                    </div>
                                </div>
                                <button onclick="doTask('${taskId}', 500, '${item.link}')" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg uppercase hover:bg-red-500 hover:text-white transition">
                                    ${currentLang==='ar'?'ابدأ':'GO'}
                                </button>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<p class="text-[8px] text-gray-600 text-center uppercase">No Active Missions</p>';
                }
            } catch (e) { console.error("Feed error", e); }
        }

        function doTask(id, reward, url) {
            window.open(url, '_blank');
            showToast(currentLang==='ar'?"تحقق خلال 5 ثوانٍ...":"Checking in 5s...");
            setTimeout(() => {
                if(!doneTasks.includes(id)) {
                    points += reward;
                    doneTasks.push(id);
                    localStorage.setItem('pts', points);
                    localStorage.setItem('done', JSON.stringify(doneTasks));
                    init();
                    showToast(currentLang==='ar'?"تمت إضافة 500 نقطة! 🔥":"+500 Points Added! 🔥");
                }
            }, 5000);
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            init();
        }

        function updateLanguageUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('htmlTag').lang = currentLang;
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-600'));
            document.getElementById(t + '-tab').classList.add('active');
            document.getElementById('btn-' + t).classList.remove('text-gray-600');
            document.getElementById('btn-' + t).classList.add('active');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function connectWallet() {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletDisplay').innerText = accs[0];
                showToast("Connected!");
            } else { showToast("Use DApp Browser"); }
        }

        init();
        tg.expand();
    </script>
</body>
</html>
