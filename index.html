<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon VIP Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .dragon-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; position: relative; overflow: hidden; }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { color: #444; transition: 0.3s; flex: 1; text-align: center; padding: 10px 0; }
        .nav-btn.active { color: #ff4d4d; border-top: 3px solid #ff4d4d; background: linear-gradient(to bottom, rgba(255,77,77,0.1), transparent); }
        .burn-bar { height: 100%; background: linear-gradient(90deg, #ff4d4d, #f97316); border-radius: 20px; box-shadow: 0 0 10px #ff4d4d; }
        .wallet-card { background: linear-gradient(135deg, #1a0000 0%, #000 100%); border: 1px solid #330000; border-radius: 30px; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600 text-xl shadow-lg"></i>
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-[12px] font-black tracking-widest text-red-600">DRAGON APP</h1>
        </div>
        <button onclick="toggleLang()" id="langBtn" class="text-[10px] font-bold border border-white/20 px-4 py-1.5 rounded-full uppercase">EN</button>
    </header>

    <main class="p-4">
        
        <div id="home" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase" data-ar="السيولة" data-en="Liquidity">السيولة</p>
                    <p id="live-liq" class="text-sm font-black text-green-500">$4,930</p>
                </div>
                <div class="dragon-card p-4">
                    <p class="text-[9px] text-gray-500 font-bold uppercase" data-ar="القيمة السوقية" data-en="Market Cap">القيمة السوقية</p>
                    <p id="live-mcap" class="text-sm font-black">$30,580</p>
                </div>
            </div>
            
            <div class="dragon-card p-6 border-t-2 border-red-600/50">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] text-gray-400 font-bold uppercase" data-ar="سعر التنين المباشر" data-en="Live Dragon Price">سعر التنين المباشر</span>
                    <span id="live-price" class="text-sm font-mono font-bold text-red-500">$0.0000000305</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-orange-500 font-bold" data-ar="العملات المحروقة" data-en="Tokens Burned">العملات المحروقة</span>
                        <span class="text-[10px] font-black">458,291,000 (45.8%)</span>
                    </div>
                    <div class="w-full h-2 bg-white/5 rounded-full border border-white/10">
                        <div class="burn-bar" style="width: 45.8%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="trade" class="tab-content space-y-4">
            <div class="dragon-card p-6 bg-orange-600/5 border-orange-600/20">
                <div class="flex items-center gap-2 mb-5">
                    <i class="fas fa-shield-alt text-orange-500"></i>
                    <h3 class="text-[10px] font-black uppercase" data-ar="توصيات التداول" data-en="Trading Advice">توصيات التداول</h3>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[9px] text-gray-400 font-bold" data-ar="المبلغ المستحسن" data-en="Recommended Buy">المبلغ المستحسن</span>
                        <span id="safe-buy" class="text-xs font-black text-green-500">$147.00</span>
                    </div>
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[9px] text-gray-400 font-bold">SLIPPAGE (الانزلاق)</span>
                        <span class="text-xs font-black">12% - 15%</span>
                    </div>
                </div>
                <div class="mt-4 p-3 bg-red-900/20 border border-red-900/30 rounded-xl">
                    <p class="text-[9px] text-gray-300 italic" data-ar="⚠️ تنبيه: لا تتجاوز المبلغ المستحسن لتجنب خسارة السعر بسبب السيولة." data-en="⚠️ Alert: Don't exceed recommended buy to avoid price impact."></p>
                </div>
            </div>
            <button onclick="window.open('https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3')" class="w-full py-4 bg-white text-black rounded-2xl font-black text-[10px] uppercase shadow-xl">Swap on PancakeSwap</button>
        </div>

        <div id="wallet" class="tab-content space-y-4">
            <div class="wallet-card p-8 shadow-2xl relative overflow-hidden">
                <div class="flex justify-between mb-12">
                    <span class="bg-red-600 text-white text-[8px] px-3 py-1 rounded-full font-black">DRAGON VIP</span>
                    <i class="fas fa-signal text-green-500 text-[8px] animate-pulse"> SECURE</i>
                </div>
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1" data-ar="نقاط المهام المكتسبة" data-en="Earned Task Points">نقاط المهام المكتسبة</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="wallet-pts" class="text-5xl font-black tracking-tighter text-white">0</h2>
                    <span class="text-xs text-red-600 font-bold uppercase">Pts</span>
                </div>
            </div>
            <div id="ton-connect-button" class="flex justify-center mt-4"></div>
        </div>

        <div id="missions" class="tab-content space-y-3">
            <div id="tasks-container" class="space-y-3"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/5 flex justify-around p-2 z-50 backdrop-blur-xl">
        <button onclick="showTab('home')" class="nav-btn active" id="n-home"><i class="fas fa-home text-sm mb-1"></i><p class="text-[8px] font-bold uppercase" data-ar="الرئيسية" data-en="HOME">الرئيسية</p></button>
        <button onclick="showTab('missions')" class="nav-btn" id="n-missions"><i class="fas fa-tasks text-sm mb-1"></i><p class="text-[8px] font-bold uppercase" data-ar="المهام" data-en="TASKS">المهام</p></button>
        <button onclick="showTab('trade')" class="nav-btn" id="n-trade"><i class="fas fa-chart-line text-sm mb-1"></i><p class="text-[8px] font-black uppercase" data-ar="تداول" data-en="TRADE">تداول</p></button>
        <button onclick="showTab('wallet')" class="nav-btn" id="n-wallet"><i class="fas fa-wallet text-sm mb-1"></i><p class="text-[8px] font-bold uppercase" data-ar="المحفظة" data-en="WALLET">المحفظة</p></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const pool = "0x84606890ad8d13e5a092c25abe59e2ec8ade7805";
        let currentLang = localStorage.getItem('lang') || 'ar';

        // نظام جلب البيانات المطور
        async function updateStats() {
            try {
                // استخدام وسيط AllOrigins لكسر قيود CORS
                const proxy = "https://api.allorigins.win/get?url=";
                const api = encodeURIComponent(`https://api.dexscreener.com/latest/dex/pools/bsc/${pool}`);
                
                const response = await fetch(proxy + api);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);

                if (data.pair) {
                    const pair = data.pair;
                    document.getElementById('live-price').innerText = `$${parseFloat(pair.priceUsd).toFixed(10)}`;
                    document.getElementById('live-liq').innerText = `$${parseFloat(pair.liquidity.usd).toLocaleString()}`;
                    document.getElementById('live-mcap').innerText = `$${parseFloat(pair.fdv).toLocaleString()}`;
                    
                    const safe = parseFloat(pair.liquidity.usd) * 0.03;
                    document.getElementById('safe-buy').innerText = `$${safe.toFixed(2)}`;
                }
            } catch (e) {
                console.log("Using cached data...");
            }
        }

        async function fetchMissions() {
            const container = document.getElementById('tasks-container');
            const feeds = [
                {id: 'X', url: "https://rss.app/feeds/v1.1/tYaEQs8TqBTzCA29.json", icon: 'twitter'},
                {id: 'TikTok', url: "https://rss.app/feeds/v1.1/L4M8dUSeMhVKhLS2.json", icon: 'tiktok'}
            ];
            container.innerHTML = '';
            for(let f of feeds) {
                try {
                    const res = await fetch(f.url);
                    const d = await res.json();
                    d.items.slice(0, 3).forEach(item => {
                        container.innerHTML += `
                            <div class="dragon-card p-4 flex justify-between items-center border-l-4 border-red-600">
                                <div class="flex items-center gap-3">
                                    <i class="fab fa-${f.icon} text-red-500"></i>
                                    <div><p class="text-[10px] font-black uppercase">${f.id} MISSION</p><p class="text-[8px] text-yellow-500">+1000 PTS</p></div>
                                </div>
                                <button onclick="tg.openLink('${item.url}')" class="bg-white text-black text-[9px] font-black px-5 py-2 rounded-xl">GO</button>
                            </div>`;
                    });
                } catch(e) {}
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            updateUI();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            document.getElementById('htmlTag').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = isAr ? 'EN' : 'AR';
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/test/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        tg.expand();
        updateUI();
        updateStats();
        fetchMissions();
        setInterval(updateStats, 20000);
    </script>
</body>
</html>
