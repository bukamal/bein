<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Dragon Stadium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; user-select: none; }
        .dragon-card { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid #1a1a1a; border-radius: 24px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; }
        .is-default { color: #555 !important; font-style: italic; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <i class="fas fa-dragon text-4xl text-red-600 animate-pulse"></i>
    </div>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600"></i>
            <span style="font-family: 'Orbitron';" class="text-[9px] font-black tracking-widest uppercase text-white">THE DRAGON</span>
        </div>
        <div class="px-3 py-1 bg-red-600/10 rounded-full text-[8px] font-black text-red-500 uppercase">STADIUM-LIVE</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div id="match-container" class="space-y-4"></div>
            <button onclick="tg.openLink('https://pancakeswap.finance/swap')" class="w-full py-4 bg-yellow-500 text-black rounded-2xl text-[11px] font-black uppercase">Get $DRGN Token 👑</button>
        </div>

        <div id="leaderboard" class="tab-content space-y-2">
            <div id="lb-list" class="space-y-2"></div>
        </div>

        <div id="wallet" class="tab-content space-y-4 text-center">
            <div class="dragon-card p-8">
                <p class="text-[8px] text-zinc-500 font-bold uppercase mb-2">رصيدك الحالي</p>
                <h2 id="user-balance" class="text-4xl font-black italic">0</h2>
                <p id="rank-name" class="text-[10px] text-red-500 font-black mt-2 uppercase tracking-tighter">BRONZE MEMBER</p>
                <div class="mt-8 space-y-3">
                    <input id="bsc-address" type="text" placeholder="عنوان محفظة BSC" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] text-center outline-none">
                    <button onclick="verify()" class="w-full py-4 bg-white text-black text-[10px] font-black rounded-xl uppercase">تحديث البيانات</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/5 flex justify-around p-3 z-50">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home"><i class="fas fa-fire-alt text-lg mb-1"></i><span class="text-[8px] font-black">الملعب</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex-1 flex flex-col items-center" id="n-leaderboard"><i class="fas fa-trophy text-lg mb-1"></i><span class="text-[8px] font-black">الدوري</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet"><i class="fas fa-user-shield text-lg mb-1"></i><span class="text-[8px] font-black">الحساب</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        let uData = { balance: 0, rank: 'BRONZE' };

        async function init() {
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'Guest' };
            try {
                const res = await fetch(`${WORKER_URL}/sync`, { 
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: user.id, username: user.username, firstName: user.first_name }) 
                });
                uData = await res.json();
                render();
                fetchMatches();
            } catch(e) {}
            setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
        }

        async function fetchMatches() {
            try {
                const res = await fetch(`${WORKER_URL}/get-matches`);
                const matches = await res.json();
                const container = document.getElementById('match-container');
                if (matches.length === 0) {
                    container.innerHTML = '<p class="p-10 text-center opacity-30 text-xs">لا توجد مباريات حالياً</p>';
                    return;
                }
                container.innerHTML = matches.map(m => `
                    <div class="dragon-card p-6 border ${m.isLive ? 'border-red-900' : 'border-white/5'}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[8px] font-black uppercase ${m.isLive ? 'text-red-500 animate-pulse' : 'text-zinc-600'}">● ${m.isLive ? 'Live' : 'Upcoming'}</span>
                            <span class="text-[9px] text-zinc-500">${new Date(m.time).toLocaleTimeString('ar-EG')}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="text-center w-1/3">
                                <img src="${m.logoA}" class="w-14 h-14 mx-auto mb-2 rounded-full bg-zinc-900 p-1 border border-white/10">
                                <p class="text-[9px] font-black uppercase truncate">${m.teamA}</p>
                            </div>
                            <div class="text-xs font-black italic text-zinc-800">VS</div>
                            <div class="text-center w-1/3">
                                <img src="${m.logoB}" class="w-14 h-14 mx-auto mb-2 rounded-full bg-zinc-900 p-1 border border-white/10">
                                <p class="text-[9px] font-black uppercase truncate">${m.teamB}</p>
                            </div>
                        </div>
                        <div class="mt-4">
                            ${m.canVote ? `
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="castVote('${m.id}', 'A')" class="py-3 bg-red-600 rounded-xl text-[9px] font-black">WIN ${m.teamA}</button>
                                    <button onclick="castVote('${m.id}', 'B')" class="py-3 bg-blue-600 rounded-xl text-[9px] font-black">WIN ${m.teamB}</button>
                                </div>
                            ` : `
                                <div class="py-3 bg-white/5 text-center rounded-xl text-[8px] text-zinc-600 font-bold uppercase">
                                    ${m.isLive ? 'Voting Closed' : 'Voting opens 1h before'}
                                </div>
                            `}
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        async function verify() {
            const addr = document.getElementById('bsc-address').value;
            const user = tg.initDataUnsafe.user || { id: 0, first_name: 'Guest' };
            if (addr.length < 42) return tg.showAlert("العنوان غير صحيح");
            try {
                const res = await fetch(`${WORKER_URL}/check-balance`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ walletAddress: addr, userId: user.id, username: user.username, firstName: user.first_name })
                });
                uData = await res.json();
                render();
                tg.showAlert(`تم التحديث باسم: ${uData.username}`);
            } catch(e) { tg.showAlert("خطأ في الشبكة"); }
        }

        async function loadLB() {
            const list = document.getElementById('lb-list');
            try {
                const res = await fetch(`${WORKER_URL}/leaderboard`);
                const data = await res.json();
                list.innerHTML = data.map((u, i) => `
                    <div class="dragon-card p-4 flex justify-between items-center">
                        <span class="text-xs font-bold ${u.isDefault ? 'is-default' : ''}">${i+1}. ${u.username}</span>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-red-500">${Math.floor(u.balance).toLocaleString()}</p>
                            <p class="text-[7px] text-zinc-600 font-bold uppercase">${u.rank}</p>
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'leaderboard') loadLB();
        }

        function render() {
            document.getElementById('user-balance').innerText = Math.floor(uData.balance || 0).toLocaleString();
            document.getElementById('rank-name').innerText = (uData.rank || 'BRONZE') + " MEMBER";
        }

        init();
        tg.expand();
    </script>
</body>
</html>
