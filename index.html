<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon VIP Sports</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Tajawal:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .dragon-card { background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid #1a1a1a; border-radius: 24px; }
        .raid-active { border: 1px solid #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.1); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; padding-bottom: 100px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #ff4d4d; border-top: 2px solid #ff4d4d; background: linear-gradient(to bottom, rgba(255,77,77,0.05), transparent); }
        .prediction-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; transition: 0.2s; }
        .prediction-btn:active { background: #ff4d4d; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <i class="fas fa-dragon text-4xl text-red-600 animate-pulse"></i>
    </div>

    <header class="p-4 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-2">
            <i class="fas fa-dragon text-red-600"></i>
            <span style="font-family: 'Orbitron';" class="text-[9px] font-black tracking-widest uppercase">DRAGON SPORTS</span>
        </div>
        <div id="status-badge" class="px-3 py-1 bg-zinc-800 rounded-full text-[8px] font-black uppercase tracking-tighter">جاري الفحص</div>
    </header>

    <main class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div id="match-area" class="dragon-card p-6 text-center raid-active">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[8px] font-black text-red-500 uppercase">● البث المباشر القادم</span>
                    <span id="match-timer" style="font-family: 'Orbitron';" class="text-xs text-yellow-500">00:00:00</span>
                </div>
                <div class="flex items-center justify-around py-4">
                    <div class="text-center flex-1">
                        <div class="w-14 h-14 bg-zinc-900 rounded-full mx-auto mb-2 flex items-center justify-center border border-white/5 text-zinc-600"><i class="fas fa-shield-halved text-2xl"></i></div>
                        <p id="team-a" class="text-[10px] font-black uppercase truncate px-1">قريباً</p>
                    </div>
                    <div class="px-4 text-xl font-black italic text-zinc-800 uppercase">VS</div>
                    <div class="text-center flex-1">
                        <div class="w-14 h-14 bg-zinc-900 rounded-full mx-auto mb-2 flex items-center justify-center border border-white/5 text-zinc-600"><i class="fas fa-shield-halved text-2xl"></i></div>
                        <p id="team-b" class="text-[10px] font-black uppercase truncate px-1">قريباً</p>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-6">
                    <button onclick="predict('A')" class="prediction-btn py-4 text-[9px] font-black uppercase text-white/60">فوز A</button>
                    <button onclick="predict('D')" class="prediction-btn py-4 text-[9px] font-black uppercase text-white/60">تعادل</button>
                    <button onclick="predict('B')" class="prediction-btn py-4 text-[9px] font-black uppercase text-white/60">فوز B</button>
                </div>
            </div>
            <button onclick="tg.openLink('https://pancakeswap.finance/swap?outputCurrency=0x583787E29Bb2D92FcBc713389FD66807602c72F3')" class="w-full py-4 bg-yellow-500 text-black rounded-2xl text-[11px] font-black uppercase shadow-lg shadow-yellow-500/10 hover:bg-yellow-400 transition-colors">تفعيل رتبة VIP وشراء $DRGN 👑</button>
        </div>

        <div id="missions" class="tab-content space-y-3">
             <div class="dragon-card p-4 flex justify-between items-center">
                <div><p class="text-[10px] font-black uppercase">تابع المباراة على تيك توك</p><p class="text-[8px] text-yellow-500">+10,000 PTS</p></div>
                <button onclick="tg.openLink('https://tiktok.com')" class="bg-white text-black px-4 py-1 rounded-lg text-[9px] font-black uppercase">GO</button>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-2">
            <div id="lb-list" class="space-y-2"></div>
        </div>

        <div id="wallet" class="tab-content space-y-4 text-center">
            <div class="dragon-card p-8">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-2">رصيد النقاط</p>
                <h2 id="user-pts" class="text-4xl font-black">0</h2>
                <p id="rank-name" class="text-[10px] text-red-500 font-black mt-2 uppercase tracking-widest">BRONZE MEMBER</p>
                <div class="mt-8">
                    <input id="bsc-address" type="text" placeholder="عنوان محفظة BSC (0x...)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] text-center mb-4 outline-none focus:border-red-500 transition-all">
                    <button id="verify-btn" onclick="verify()" class="w-full py-4 bg-white text-black text-[10px] font-black rounded-xl uppercase hover:bg-gray-200 transition-all">التحقق من العضوية</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 flex justify-around p-3 z-50 backdrop-blur-xl">
        <button onclick="showTab('home')" class="nav-btn active flex-1 flex flex-col items-center" id="n-home"><i class="fas fa-volleyball-ball text-lg mb-1"></i><span class="text-[8px] font-black uppercase">الملعب</span></button>
        <button onclick="showTab('missions')" class="nav-btn flex-1 flex flex-col items-center" id="n-missions"><i class="fas fa-tasks text-lg mb-1"></i><span class="text-[8px] font-black uppercase">المهام</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex-1 flex flex-col items-center" id="n-leaderboard"><i class="fas fa-award text-lg mb-1"></i><span class="text-[8px] font-black uppercase">الدوري</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex-1 flex flex-col items-center" id="n-wallet"><i class="fas fa-id-badge text-lg mb-1"></i><span class="text-[8px] font-black uppercase">الحساب</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const WORKER_URL = "https://noisy-moon-4289.manhal-almasriiii199119.workers.dev";
        let uData = { pts: 0, rank: 'BRONZE' };

        // 1. تشغيل التطبيق
        async function init() {
            const user = tg.initDataUnsafe.user;
            if(!user) return;
            try {
                const res = await fetch(`${WORKER_URL}/sync`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: user.id, username: user.first_name }) 
                });
                const d = await res.json();
                uData = { pts: d.points, rank: d.rank };
                render();
                fetchMatch();
            } catch(e) { console.error("Init Error:", e); }
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
        }

        // 2. جلب المباراة
        async function fetchMatch() {
            try {
                const res = await fetch(`${WORKER_URL}/get-next-match`);
                const m = await res.json();
                const statusBadge = document.getElementById('status-badge');

                if (m.status === "expired" || m.startTime === 0) {
                    document.getElementById('team-a').innerText = "قريباً";
                    document.getElementById('team-b').innerText = "قريباً";
                    document.getElementById('match-timer').innerText = "--:--:--";
                    statusBadge.innerText = "في انتظار القمة";
                    return;
                }

                const teams = m.title.split(/vs|ضد/i);
                document.getElementById('team-a').innerText = teams[0] ? teams[0].trim() : "قريباً";
                document.getElementById('team-b').innerText = teams[1] ? teams[1].trim() : "قريباً";
                statusBadge.innerText = "مباراة مرتقبة";
                
                const timer = setInterval(() => {
                    const diff = m.startTime - new Date().getTime();
                    if(diff <= 0) { 
                        document.getElementById('match-timer').innerText = "LIVE NOW"; 
                        statusBadge.innerText = "مباشر الآن";
                        statusBadge.classList.add('text-red-500');
                        clearInterval(timer); 
                        return; 
                    }
                    const h = Math.floor(diff / 3600000), m_ = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('match-timer').innerText = `${String(h).padStart(2,'0')}:${String(m_).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }, 1000);
            } catch(e) { console.error("Match Error:", e); }
        }

        // 3. التحقق من المحفظة (تم الإصلاح)
        async function verify() {
            const addr = document.getElementById('bsc-address').value.trim();
            const btn = document.getElementById('verify-btn');

            if (!addr || !addr.startsWith('0x') || addr.length < 40) {
                return tg.showAlert("⚠️ يرجى إدخال عنوان محفظة BSC صحيح.");
            }

            btn.disabled = true;
            btn.innerText = "جاري الفحص...";
            btn.style.opacity = "0.5";

            try {
                const res = await fetch(`${WORKER_URL}/check-balance`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ walletAddress: addr }) 
                });
                const data = await res.json();
                const balance = data.balance || 0;

                if (balance >= 1000000) {
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert(`✅ تم التحقق! رصيدك ${balance.toLocaleString()} عملة. مبروك رتبة VIP!`);
                    uData.rank = "VIP";
                    render();
                    // مزامنة الرتبة الجديدة مع السيرفر
                    await fetch(`${WORKER_URL}/sync`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, rank: "VIP" }) 
                    });
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                    tg.showAlert(`ℹ️ رصيدك ${balance.toLocaleString()} $DRGN. تحتاج لمليون عملة للـ VIP.`);
                }
            } catch(e) {
                tg.showAlert("❌ فشل الاتصال بالخادم، حاول لاحقاً.");
            } finally {
                btn.disabled = false;
                btn.innerText = "التحقق من العضوية";
                btn.style.opacity = "1";
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            if(id === 'leaderboard') loadLB();
        }

        async function loadLB() {
            const list = document.getElementById('lb-list');
            list.innerHTML = '<p class="text-center text-[8px] py-8 uppercase opacity-50 tracking-widest">جاري جلب المتصدرين...</p>';
            try {
                const res = await fetch(`${WORKER_URL}/leaderboard`);
                const data = await res.json();
                list.innerHTML = '';
                data.forEach((u, i) => {
                    list.innerHTML += `<div class="dragon-card p-4 flex justify-between items-center ${i<3?'border-red-900/40 bg-red-950/5':''}">
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-black opacity-20">${i+1}</span>
                            <span class="text-xs font-bold uppercase tracking-tight">${u.username}</span>
                        </div>
                        <span class="text-xs font-black text-red-500">${u.points.toLocaleString()}</span>
                    </div>`;
                });
            } catch(e) { list.innerHTML = '<p class="text-center text-red-500 text-[8px]">فشل تحميل الدوري</p>'; }
        }

        function predict(c) { 
            tg.HapticFeedback.impactOccurred('medium');
            tg.showConfirm("هل أنت متأكد من توقعك؟", (ok) => { 
                if(ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert("⚽ تم تسجيل التوقع! سيتم تحديث النقاط بعد انتهاء المباراة.");
                }
            }); 
        }

        function render() { 
            document.getElementById('user-pts').innerText = uData.pts.toLocaleString(); 
            document.getElementById('rank-name').innerText = uData.rank + " MEMBER"; 
        }

        tg.expand();
        init();
    </script>
</body>
</html>
