<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dragon Stadium</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#000;
color:white;
font-family:sans-serif;
padding-bottom:80px
}

.card{
background:#111;
border-radius:16px;
padding:12px
}

</style>

</head>

<body class="p-3">

<h1 class="text-center text-xl font-bold mb-4">
🐉 Dragon Stadium
</h1>

<div id="matches"></div>

<hr class="my-4">

<h2 class="text-lg mb-2">🏆 Leaderboard</h2>

<div id="leaderboard"></div>

<hr class="my-4">

<h2 class="text-lg mb-2">👤 Account</h2>

<div class="card">

<div>Game Balance: <span id="gameBalance">0</span></div>

<div>Rewards: <span id="rewards">0</span></div>

<div>Rank: <span id="rank">BRONZE</span></div>

<input id="wallet" placeholder="BSC wallet" class="text-black p-1 mt-2 w-full">

<button onclick="updateWallet()" class="bg-red-500 p-2 mt-2 w-full">
Update Wallet
</button>

<button onclick="claim()" class="bg-green-500 p-2 mt-2 w-full">
Claim Rewards
</button>

</div>

<script>

const API="https://noisy-moon-4289.manhal-almasriiii199119.workers.dev"

async function api(p,m="GET",d=null){

let o={method:m,headers:{"Content-Type":"application/json"}}

if(d)o.body=JSON.stringify(d)

let r=await fetch(API+p,o)

return r.json()

}

/* MATCHES */

async function loadMatches(){

let d=await api("/get-matches")

if(!d.success)return

const now=Date.now()

document.getElementById("matches").innerHTML=

d.matches.map(m=>{

const canVote=now<m.time

return`

<div class="card mb-2">

${m.teamA} VS ${m.teamB}

${canVote?

`<button onclick="vote('${m.id}','HOME')" class="bg-blue-500 p-1">1</button>
<button onclick="vote('${m.id}','DRAW')" class="bg-blue-500 p-1">X</button>
<button onclick="vote('${m.id}','AWAY')" class="bg-blue-500 p-1">2</button>`
:
`<div>closed</div>`
}

</div>

`

}).join("")

}

async function vote(id,v){

let r=await api("/vote","POST",{matchId:id,voteFor:v})

alert(JSON.stringify(r))

}

/* LEADERBOARD */

async function loadLeaderboard(){

let d=await api("/leaderboard")

document.getElementById("leaderboard").innerHTML=

d.map(p=>`<div>${p.username} : ${p.score}</div>`).join("")

}

/* ACCOUNT */

async function sync(){

let r=await api("/sync","POST")

let u=r.user

document.getElementById("gameBalance").innerText=u.gameBalance
document.getElementById("rewards").innerText=u.pendingRewards
document.getElementById("rank").innerText=u.rank

}

async function updateWallet(){

let w=document.getElementById("wallet").value

let r=await api("/check-balance","POST",{wallet:w})

alert(JSON.stringify(r))

sync()

}

async function claim(){

let r=await api("/claim-rewards","POST")

alert(JSON.stringify(r))

sync()

}

/* INIT */

loadMatches()
loadLeaderboard()
sync()

</script>

</body>

</html>
